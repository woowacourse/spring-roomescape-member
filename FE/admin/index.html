<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방탈출 관리자</title>
  <link rel="stylesheet" href="../shared/css/common.css">
  <link rel="stylesheet" href="../shared/css/admin.css">
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-content">
      <div class="logo">
        <a href="../user/index.html" class="nav-logo">방탈출 예약</a>
      </div>
      <div class="nav-links">
        <a href="../user/index.html">사용자 화면</a>
        <a href="index.html">관리자</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="light">
      <div class="container">
        <h1 class="display-hero">예약 관리</h1>
        <p class="subtitle">테마, 예약 시간, 예약 내역을 한 곳에서 관리합니다.</p>
      </div>
    </section>

    <section class="white">
      <div class="container admin-container">
        <div class="admin-card">
          <h2 class="card-title">테마 관리</h2>
          <div id="theme-list" class="item-list"></div>
          <div class="add-form">
            <h3>새 테마 추가</h3>
            <div class="form-grid">
              <input type="text" id="theme-name" placeholder="테마 이름">
              <input type="text" id="theme-thumbnail" placeholder="썸네일 이미지 주소">
              <textarea id="theme-description" placeholder="테마 설명"></textarea>
            </div>
            <button id="add-theme-btn" class="btn-primary">테마 추가</button>
          </div>
        </div>

        <div class="admin-card">
          <h2 class="card-title">예약 시간 관리</h2>
          <div id="time-list" class="item-list"></div>
          <div class="add-form">
            <h3>새 시간 추가</h3>
            <div class="form-row">
              <button id="open-time-overlay" class="btn-primary">시간 선택하여 추가</button>
            </div>
          </div>
        </div>

        <div class="admin-card">
          <h2 class="card-title">예약 내역 관리</h2>
          <div id="reservation-list" class="item-list"></div>
        </div>
      </div>
    </section>

    <!-- Time Selector Overlay -->
    <div id="time-overlay" class="booking-overlay" style="display: none;">
      <div class="overlay-backdrop"></div>
      <div class="overlay-content">
        <button id="close-time-overlay" class="close-btn">&times;</button>
        <div class="theme-mini-info">
          <h2>시간 추가</h2>
          <p>시스템에 등록할 새로운 예약 시간을 선택하세요.</p>
        </div>
        <div class="time-picker-wrapper">
          <div class="time-display-header">
            <span id="display-hour" class="active">12</span>
            <span class="separator">:</span>
            <span id="display-minute">00</span>
          </div>
          
          <div class="clock-face-container">
            <div id="clock-face" class="clock-face">
              <!-- Radial numbers will be injected here -->
              <div class="clock-hand" id="clock-hand"></div>
              <div class="clock-center"></div>
            </div>
          </div>
          
          <div class="picker-mode-toggle">
            <button id="mode-hour" class="btn-mode active">시</button>
            <button id="mode-minute" class="btn-mode">분</button>
          </div>
        </div>
        <button id="confirm-time-btn" class="btn-primary full-width glow-effect">시스템에 시간 등록</button>
      </div>
    </div>
  </main>

  <script type="module" src="../shared/js/admin.js"></script>
</body>
</html>
