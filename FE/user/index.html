<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방탈출 예약</title>
  <link rel="stylesheet" href="../shared/css/common.css">
  <link rel="stylesheet" href="../shared/css/user.css">
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-content">
      <div class="logo">
        <a href="index.html" style="font-weight: 600; color: white;">방탈출 예약</a>
      </div>
      <div class="nav-links">
        <a href="index.html" style="opacity: 1;">테마 둘러보기</a>
      </div>
    </div>
  </nav>

  <main>
    <!-- Hero Section -->
    <section class="dark hero-section">
      <div class="container">
        <h1 class="display-hero">오늘 탈출할 이야기를 고르세요.</h1>
        <p class="subtitle white">실감 나는 공간, 단서, 시간 제한이 완성하는 몰입형 방탈출 예약.</p>
        <div class="hero-ctas">
          <a href="#themes" class="btn-primary btn-pill">테마 보기</a>
        </div>
      </div>
    </section>

    <section id="popular" class="popular-section">
      <div class="container">
        <div class="section-head">
          <div>
            <p class="section-kicker">이번 달 인기</p>
            <h2 class="section-title">가장 많이 예약된 테마</h2>
          </div>
          <a href="#themes" class="section-link">전체 테마 보기</a>
        </div>
        <div id="popular-theme-grid" class="popular-grid">
          <!-- Popular themes loaded here -->
        </div>
      </div>
    </section>

    <!-- Theme Grid -->
    <section id="themes" class="light">
      <div class="container">
        <div class="section-head">
          <div>
            <p class="section-kicker">전체 테마</p>
            <h2 class="section-title">예약 가능한 테마</h2>
          </div>
        </div>
        <div id="theme-grid" class="theme-grid">
          <!-- Themes loaded here -->
        </div>
      </div>
    </section>

    <!-- Unified Booking Overlay -->
    <div id="booking-overlay" class="booking-overlay" style="display: none;">
      <div class="overlay-backdrop"></div>
      <div class="overlay-content">
        <button id="close-overlay" class="close-btn">&times;</button>
        
        <div class="booking-steps">
          <div class="step active" data-step="1">1. 시간 선택</div>
          <div class="step" data-step="2">2. 예약자 정보</div>
          <div class="step" data-step="3">3. 예약 완료</div>
        </div>

        <!-- Step 1: Date & Time -->
        <div id="step-1-content" class="step-pane active">
          <div class="theme-mini-info">
            <h2 id="selected-theme-name">테마 이름</h2>
            <p id="selected-theme-desc">테마 설명</p>
          </div>
          <div class="form-group">
            <label>날짜 선택</label>
            <input type="date" id="reservation-date" min="2026-05-04">
          </div>
          <div class="form-group">
            <label>예약 가능한 시간</label>
            <div id="time-slots" class="time-slots">
              <!-- Time slots here -->
            </div>
          </div>
          <button id="next-to-step-2" class="btn-primary btn-pill full-width" disabled>다음</button>
        </div>

        <!-- Step 2: User Info -->
        <div id="step-2-content" class="step-pane">
          <h2>예약자 정보</h2>
          <p class="pane-subtitle">예약 확인에 사용할 이름을 입력해주세요.</p>
          <div class="form-group">
            <label for="reservation-name">예약자 이름</label>
            <input type="text" id="reservation-name" placeholder="예: 김민준">
          </div>
          <div class="step-actions">
            <button id="back-to-step-1" class="btn-link">이전</button>
            <button id="reserve-btn" class="btn-primary btn-pill">예약하기</button>
          </div>
        </div>

        <!-- Step 3: Success -->
        <div id="step-3-content" class="step-pane">
          <div class="success-animation">
            <div class="check-icon">✓</div>
          </div>
          <h2>예약이 완료되었습니다</h2>
          <div id="reservation-summary" class="summary-box"></div>
          <button id="finish-btn" class="btn-primary btn-pill full-width">확인</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="../shared/js/user.js"></script>
</body>
</html>
