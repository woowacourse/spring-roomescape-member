<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RoomEscape — 내 예약</title>
    <link href="style.css" rel="stylesheet">
    <style>
        .user-layout {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 36px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .top-nav-logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #5b7fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-main {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
        }

        .res-item {
            background: var(--bg-input);
            padding: 16px;
            border-radius: var(--radius);
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .res-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .res-actions {
            display: flex;
            gap: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius-lg);
            width: 400px;
            max-width: 90%;
        }
    </style>
</head>
<body>
<div class="user-layout">
    <nav class="top-nav">
        <div class="top-nav-logo" onclick="location.href='/'" style="cursor:pointer;">🔐 RoomEscape</div>
        <div class="top-nav-links">
            <a class="btn btn-ghost btn-sm" href="/">예약하기</a>
        </div>
    </nav>

    <main class="user-main">
        <h1 style="font-size: 28px; margin-bottom: 24px;">내 예약 조회</h1>
        <div class="card">
            <div style="display: flex; gap: 8px; align-items: flex-end; margin-bottom: 24px;">
                <div class="form-group" style="flex:1;">
                    <label>사용자 ID</label>
                    <input id="user-id" placeholder="사용자 ID를 입력하세요" type="number">
                </div>
                <button class="btn btn-primary" onclick="loadMyReservations()">조회</button>
            </div>

            <div id="reservation-list">
                <div class="empty-state"><p>사용자 ID를 입력하고 조회해주세요.</p></div>
            </div>
        </div>
    </main>
</div>

<!-- Modification Modal -->
<div class="modal" id="modify-modal">
    <div class="modal-content">
        <h3>예약 변경</h3>
        <p style="margin-bottom: 16px; color: var(--text-secondary); font-size: 14px;">새로운 날짜와 시간을 선택하세요.</p>

        <input id="mod-res-id" type="hidden">
        <input id="mod-theme-id" type="hidden">

        <div class="form-group">
            <label>날짜</label>
            <input id="mod-date" onchange="loadModTimes()" type="date">
        </div>

        <div class="form-group" style="margin-top: 16px;">
            <label>시간</label>
            <select class="form-control" id="mod-time"
                    style="width: 100%; padding: 10px; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: white;">
                <option value="">날짜를 먼저 선택하세요</option>
            </select>
        </div>

        <div style="display: flex; gap: 8px; margin-top: 24px; justify-content: flex-end;">
            <button class="btn btn-ghost" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="submitModify()">변경 저장</button>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script>
    function toast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const el = document.createElement('div');
        const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
        el.className = `toast toast-${type}`;
        el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3200);
    }

    async function api(method, url, body) {
        const opts = {method, headers: {'Content-Type': 'application/json'}};
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        if (!res.ok) {
            const text = await res.text().catch(() => '');
            let errorMsg = text;
            try {
                const json = JSON.parse(text);
                if (json.message) errorMsg = json.message;
            } catch (e) {
            }
            throw new Error(errorMsg || `HTTP ${res.status}`);
        }
        if (res.status === 204) return null;
        const ct = res.headers.get('Content-Type') || '';
        return ct.includes('json') ? res.json() : null;
    }

    async function loadMyReservations() {
        const userId = document.getElementById('user-id').value;
        if (!userId) {
            toast('사용자 ID를 입력해주세요.', 'error');
            return;
        }

        const container = document.getElementById('reservation-list');
        container.innerHTML = '<div class="empty-state"><div class="spinner"></div></div>';

        try {
            const res = await api('GET', `/reservations/my?userId=${userId}`);
            if (!res || res.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>예약 내역이 없습니다.</p></div>';
                return;
            }

            container.innerHTML = res.map(r => `
                <div class="res-item">
                    <div class="res-info">
                        <div style="font-weight: 700; font-size: 16px;">${r.theme}</div>
                        <div style="font-size: 14px; color: var(--text-secondary);">📅 ${r.date} ⏰ ${r.time}</div>
                    </div>
                    <div class="res-actions">
                        <button class="btn btn-ghost btn-sm" onclick="openModifyModal(${r.id}, ${r.themeId})">✏️ 변경</button>
                        <button class="btn btn-danger btn-sm" onclick="cancelReservation(${r.id})">🗑 취소</button>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = `<div class="empty-state"><p style="color:var(--danger)">조회 실패: ${e.message}</p></div>`;
            toast(e.message, 'error');
        }
    }

    async function cancelReservation(resId) {
        if (!confirm('정말로 예약을 취소하시겠습니까?')) return;
        const userId = document.getElementById('user-id').value;
        try {
            await api('DELETE', `/reservations/${resId}?userId=${userId}`);
            toast('예약이 취소되었습니다.', 'success');
            loadMyReservations();
        } catch (e) {
            toast(`취소 실패: ${e.message}`, 'error');
        }
    }

    // Modal
    function openModifyModal(resId, themeId) {
        document.getElementById('mod-res-id').value = resId;
        document.getElementById('mod-theme-id').value = themeId;
        document.getElementById('mod-date').value = '';
        document.getElementById('mod-time').innerHTML = '<option value="">날짜를 먼저 선택하세요</option>';
        document.getElementById('modify-modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modify-modal').classList.remove('active');
    }

    async function loadModTimes() {
        const date = document.getElementById('mod-date').value;
        const themeId = document.getElementById('mod-theme-id').value;
        const select = document.getElementById('mod-time');

        if (!date) {
            select.innerHTML = '<option value="">날짜를 선택하세요</option>';
            return;
        }

        select.innerHTML = '<option value="">로딩 중...</option>';
        try {
            const data = await api('GET', `/themes/${themeId}/times?date=${date}`);
            const available = data.filter(t => !t.isReserved);
            if (available.length === 0) {
                select.innerHTML = '<option value="">예약 가능한 시간이 없습니다</option>';
            } else {
                select.innerHTML = available.map(t => `<option value="${t.id}">${t.startAt}</option>`).join('');
            }
        } catch (e) {
            select.innerHTML = '<option value="">시간 목록 조회 실패</option>';
            toast(`조회 실패: ${e.message}`, 'error');
        }
    }

    async function submitModify() {
        const resId = document.getElementById('mod-res-id').value;
        const userId = document.getElementById('user-id').value;
        const date = document.getElementById('mod-date').value;
        const timeId = document.getElementById('mod-time').value;

        if (!date || !timeId) {
            toast('날짜와 시간을 모두 선택해주세요.', 'error');
            return;
        }

        try {
            await api('PATCH', `/reservations/${resId}?userId=${userId}`, {date, timeId: Number(timeId)});
            toast('예약이 변경되었습니다.', 'success');
            closeModal();
            loadMyReservations();
        } catch (e) {
            toast(`변경 실패: ${e.message}`, 'error');
        }
    }
</script>
</body>
</html>
