<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>시간 관리 - 관리자</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 2rem; background: #f8fafc; margin: 0; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #1e293b; text-align: center; margin-bottom: 2rem; font-weight: 800; }
        .nav { margin-bottom: 2rem; display: flex; justify-content: space-between; }
        .nav a { color: #4f46e5; text-decoration: none; font-weight: bold; font-size: 0.95rem; }
        .nav a:hover { text-decoration: underline; }
        
        .form-section { background: #f1f5f9; padding: 1.5rem; border-radius: 8px; margin-bottom: 2.5rem; }
        form { display: flex; align-items: flex-end; gap: 1rem; }
        .form-group { flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
        label { font-weight: bold; color: #475569; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        input[type="time"] { padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        
        button { padding: 0.8rem 1.5rem; border-radius: 6px; font-weight: bold; cursor: pointer; transition: all 0.2s; border: none; font-size: 0.95rem; }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-danger { background: #fee2e2; color: #b91c1c; padding: 0.5rem 1rem; }
        .btn-danger:hover { background: #fecaca; }

        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 1rem; }
        th, td { padding: 1.25rem 1rem; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background: #f8fafc; color: #64748b; font-size: 0.75rem; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        .empty-state { text-align: center; padding: 3rem; color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/">&larr; 홈으로</a>
            <a href="/admin-reservation.html">예약 관리 &rarr;</a>
        </div>
        <h1>예약 시간 관리</h1>
        
        <div class="form-section">
            <form id="timeForm">
                <div class="form-group">
                    <label for="timeInput">새로운 시간 추가 (HH:mm)</label>
                    <input type="time" id="timeInput" required>
                </div>
                <button type="submit" class="btn-primary">시간 추가</button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">ID</th>
                    <th>시간 (시작 시간)</th>
                    <th style="width: 100px; text-align: center;">관리</th>
                </tr>
            </thead>
            <tbody id="timeList"></tbody>
        </table>
    </div>

    <script>
        const timeForm = document.getElementById('timeForm');
        const timeList = document.getElementById('timeList');

        async function loadTimes() {
            try {
                const res = await fetch('/times');
                const times = await res.json();
                timeList.innerHTML = '';
                
                if (times.length === 0) {
                    timeList.innerHTML = '<tr><td colspan="3" class="empty-state">등록된 예약 시간이 없습니다.</td></tr>';
                    return;
                }

                times.forEach(t => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${t.id}</td>
                        <td style="font-weight: 600; font-size: 1.1rem;">${t.startAt}</td>
                        <td style="text-align: center;"><button class="btn-danger" onclick="deleteTime(${t.id})">삭제</button></td>
                    `;
                    timeList.appendChild(tr);
                });
            } catch (e) {
                console.error('시간 목록 로드 오류:', e);
            }
        }

        timeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const timeVal = document.getElementById('timeInput').value;
            try {
                const res = await fetch('/times', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ startAt: timeVal })
                });
                if (res.ok) {
                    timeForm.reset();
                    loadTimes();
                } else {
                    const error = await res.json();
                    alert(error.message || '이미 존재하는 시간이거나 추가할 수 없습니다.');
                }
            } catch (e) {
                alert('서버와 통신 중 오류가 발생했습니다.');
            }
        });

        async function deleteTime(id) {
            if (!confirm('해당 예약 시간을 정말로 삭제하시겠습니까?\n이미 이 시간을 사용하는 예약이 있다면 삭제가 불가능할 수 있습니다.')) return;
            try {
                const res = await fetch(`/times/${id}`, { method: 'DELETE' });
                if (res.ok) loadTimes();
                else alert('삭제에 실패했습니다. 사용 중인 시간일 수 있습니다.');
            } catch (e) {
                alert('서버 오류가 발생했습니다.');
            }
        }

        loadTimes();
    </script>
</body>
</html>
