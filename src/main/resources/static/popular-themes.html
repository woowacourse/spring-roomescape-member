<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 인기 테마 - Roomescape</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 2rem; background: #f1f5f9; color: #1e293b; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #4f46e5; margin-bottom: 2rem; font-size: 2rem; font-weight: 800; }
        
        .filter-section { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2.5rem; align-items: flex-end; background: #f8fafc; padding: 1.5rem; border-radius: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
        label { font-size: 0.8rem; font-weight: bold; color: #64748b; text-transform: uppercase; }
        select, input { padding: 0.6rem; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; background: white; font-weight: 600; }
        select:focus, input:focus { border-color: #4f46e5; }
        
        .rank-list { display: flex; flex-direction: column; gap: 1rem; }
        .rank-item { display: flex; align-items: center; padding: 1.25rem; background: white; border: 2px solid #f1f5f9; border-radius: 12px; transition: transform 0.2s, border-color 0.2s; position: relative; overflow: hidden; }
        .rank-item:hover { transform: scale(1.02); border-color: #e0e7ff; }
        
        .rank-num { font-size: 2rem; font-weight: 900; color: #e2e8f0; min-width: 50px; text-align: center; font-style: italic; }
        .rank-item:nth-child(1) .rank-num { color: #fbbf24; } /* Gold */
        .rank-item:nth-child(2) .rank-num { color: #94a3b8; } /* Silver */
        .rank-item:nth-child(3) .rank-num { color: #b45309; } /* Bronze */
        
        .theme-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; margin: 0 1.5rem; background: #f1f5f9; }
        .theme-info { flex: 1; }
        .theme-name { font-size: 1.25rem; font-weight: 800; color: #1e293b; margin-bottom: 0.25rem; }
        .theme-desc { font-size: 0.9rem; color: #64748b; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .nav { margin-bottom: 1.5rem; }
        .nav a { color: #64748b; text-decoration: none; font-weight: 600; font-size: 0.9rem; display: inline-flex; align-items: center; gap: 0.25rem; }
        .nav a:hover { color: #4f46e5; }
        
        .loading { text-align: center; padding: 3rem; color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav"><a href="/">&larr; 메인화면</a></div>
        <h1>실시간 인기 테마 TOP</h1>
        
        <div class="filter-section">
            <div class="form-group">
                <label>기준 기간</label>
                <select id="daysSelect">
                    <option value="1">최근 1일</option>
                    <option value="7" selected>최근 7일</option>
                    <option value="30">최근 30일</option>
                </select>
            </div>
            <div class="form-group">
                <label>노출 개수</label>
                <input type="number" id="limitInput" value="10" min="1" max="50" style="width: 60px;">
            </div>
            <button onclick="loadRankings()" style="padding: 0.6rem 1.2rem; background: #4f46e5; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">조회</button>
        </div>

        <div id="rankList" class="rank-list">
            <!-- Rankings will appear here -->
        </div>
    </div>

    <script>
        const rankList = document.getElementById('rankList');
        const daysSelect = document.getElementById('daysSelect');
        const limitInput = document.getElementById('limitInput');

        async function loadRankings() {
            const days = daysSelect.value;
            const limit = limitInput.value;
            rankList.innerHTML = '<div class="loading">데이터를 분석하고 있습니다...</div>';
            
            try {
                const res = await fetch(`/themes/rank?days=${days}&limit=${limit}`);
                const rankings = await res.json();
                rankList.innerHTML = '';
                
                if (rankings.length === 0) {
                    rankList.innerHTML = '<div class="loading">해당 기간 내 예약 데이터가 충분하지 않습니다.</div>';
                    return;
                }

                rankings.forEach(item => {
                    const theme = item.theme;
                    const div = document.createElement('div');
                    div.className = 'rank-item';
                    div.innerHTML = `
                        <div class="rank-num">${item.rank}</div>
                        <img src="${theme.imageUrl}" alt="${theme.name}" class="theme-thumb" onerror="this.src='https://placehold.co/100x100?text=No+Img'">
                        <div class="theme-info">
                            <div class="theme-name">${theme.name}</div>
                            <div class="theme-desc">${theme.description}</div>
                        </div>
                    `;
                    rankList.appendChild(div);
                });
            } catch (e) {
                rankList.innerHTML = '<div class="loading">순위 정보를 가져오는 중 오류가 발생했습니다.</div>';
            }
        }

        loadRankings();
    </script>
</body>
</html>
