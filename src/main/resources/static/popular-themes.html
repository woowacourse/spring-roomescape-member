<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 인기 테마 - Roomescape</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --bg-dark: #09090b;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            background-image: radial-gradient(circle at 85% 10%, rgba(245, 158, 11, 0.05), transparent 30%),
                              radial-gradient(circle at 10% 90%, rgba(245, 158, 11, 0.05), transparent 30%);
        }

        .nav-header {
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            background: rgba(9,9,11,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-header a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .nav-header a:hover { color: white; }

        .container {
            max-width: 1000px;
            margin: 3rem auto;
            padding: 0 2rem;
            width: 100%;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .filter-section {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            align-items: flex-end;
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-glass);
            flex-wrap: wrap;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        select, input {
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-glass);
            border-radius: 10px;
            outline: none;
            background: rgba(0,0,0,0.3);
            color: white;
            font-weight: 600;
            font-family: inherit;
            transition: all 0.2s;
            height: 46px;
        }
        
        select option { background: #1e293b; color: white; }

        select:focus, input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }

        button.filter-btn {
            padding: 0 2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: var(--bg-dark);
            border: none;
            border-radius: 10px;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
            font-family: inherit;
            height: 46px;
            text-transform: uppercase;
        }

        button.filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.4);
        }

        .rank-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .rank-item {
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .rank-item:hover {
            transform: translateY(-10px);
            border-color: rgba(245, 158, 11, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .rank-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 45px;
            height: 45px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 900;
            z-index: 10;
            border: 2px solid transparent;
        }

        /* Gold */
        .rank-item:nth-child(1) .rank-badge {
            color: #fbbf24;
            border-color: #fbbf24;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
        }

        /* Silver */
        .rank-item:nth-child(2) .rank-badge {
            color: #e2e8f0;
            border-color: #e2e8f0;
        }

        /* Bronze */
        .rank-item:nth-child(3) .rank-badge {
            color: #b45309;
            border-color: #b45309;
        }

        .theme-thumb {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-glass);
            background: #111;
        }

        .theme-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .theme-name {
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .theme-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            flex: 1;
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            font-style: italic;
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            border: 1px dashed var(--border-glass);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="nav-header">
        <a href="/">&larr; 메인으로 돌아가기</a>
    </div>

    <div class="container">
        <h1>POPULAR THEMES</h1>
        <p class="subtitle">도전자들이 가장 열광한 최고의 테마들</p>

        <div class="filter-section">
            <div class="form-group">
                <label>기준 기간</label>
                <select id="daysSelect">
                    <option value="1">최근 1일</option>
                    <option value="7" selected>최근 7일</option>
                    <option value="30">최근 30일</option>
                </select>
            </div>
            <div class="form-group">
                <label>노출 개수</label>
                <input type="number" id="limitInput" value="10" min="1" style="width: 80px;">
            </div>
            <button class="filter-btn" onclick="loadRankings()">조회</button>
        </div>

        <div id="rankList" class="rank-list">
            <!-- Rankings will appear here -->
        </div>
    </div>

<script>
    const rankList = document.getElementById('rankList');
    const daysSelect = document.getElementById('daysSelect');
    const limitInput = document.getElementById('limitInput');
    let maxLimit = 10;

    async function init() {
        try {
            const res = await fetch('/themes');
            const data = await res.json();
            const themes = data.themes || data;
            
            if (themes && themes.length > 0) {
                maxLimit = themes.length;
            }
            
            limitInput.max = maxLimit;
            if (parseInt(limitInput.value) > maxLimit) {
                limitInput.value = maxLimit;
            }
        } catch (e) {
            console.warn('테마 총 개수를 가져오지 못했습니다. 기본 최대값(10)을 사용합니다.');
        }

        limitInput.addEventListener('input', function() {
            let val = parseInt(this.value);
            if (val > maxLimit) this.value = maxLimit;
            if (val < 1 && this.value !== '') this.value = 1;
        });

        loadRankings();
    }

    async function loadRankings() {
        const days = daysSelect.value;
        const limit = limitInput.value;
        rankList.innerHTML = '<div class="loading">데이터를 분석하고 있습니다...</div>';

        try {
            const res = await fetch(`/themes/rank?days=${days}&limit=${limit}`);
            const data = await res.json();
            const rankings = data.themeRankings || data.themes || data;
            rankList.innerHTML = '';

            if (rankings.length === 0) {
                rankList.innerHTML = '<div class="loading">해당 기간 내 예약 데이터가 충분하지 않습니다.</div>';
                return;
            }

            rankings.forEach(item => {
                const theme = item.theme;
                const div = document.createElement('div');
                div.className = 'rank-item';
                div.innerHTML = `
                        <div class="rank-badge">${item.rank}</div>
                        <img src="${theme.imagePath}" alt="${theme.name}" class="theme-thumb" onerror="this.src='https://placehold.co/400x220?text=No+Img'">
                        <div class="theme-info">
                            <div class="theme-name">${theme.name}</div>
                            <div class="theme-desc">${theme.description}</div>
                        </div>
                    `;
                rankList.appendChild(div);
            });
        } catch (e) {
            rankList.innerHTML = '<div class="loading">순위 정보를 가져오는 중 오류가 발생했습니다.</div>';
        }
    }

    init();
</script>
</body>
</html>
