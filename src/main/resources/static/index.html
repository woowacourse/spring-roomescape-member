<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방탈출 카페 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --bg-dark: #09090b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Full screen hero background */
        .hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: url('https://images.unsplash.com/photo-1519074069444-1ba4fff66d16?q=80&w=2500&auto=format&fit=crop') no-repeat center center/cover;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(9, 9, 11, 0.4), rgba(9, 9, 11, 0.95));
            z-index: 1;
        }

        /* Top Navigation */
        .navbar {
            position: absolute;
            top: 0; left: 0; width: 100%;
            padding: 1.5rem 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #fff;
        }

        /* Main Content */
        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            max-width: 900px;
            padding: 2rem;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 4rem;
            font-weight: 300;
            letter-spacing: 0.05em;
        }

        .action-cards {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 280px;
            max-width: 350px;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            text-decoration: none;
            text-align: left;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: white;
        }

        .card p {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
        }

        .card::after {
            content: '→';
            position: absolute;
            bottom: 2.5rem;
            right: 2rem;
            font-size: 1.5rem;
            color: white;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card:hover::after {
            transform: translateX(5px);
        }

        .primary-card {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.8), rgba(217, 119, 6, 0.8));
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 20px 40px rgba(245, 158, 11, 0.2);
        }

        .primary-card:hover {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.95), rgba(217, 119, 6, 0.95));
            box-shadow: 0 30px 50px rgba(245, 158, 11, 0.4);
        }

        .secondary-card {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .section-title {
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .admin-cards .card {
            padding: 1.5rem 1rem;
            min-width: 150px;
            text-align: center;
        }

        .admin-cards .card h2 {
            font-size: 1.2rem;
            margin-bottom: 0;
        }

        .admin-cards .card::after {
            display: none;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .admin-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .navbar { padding: 1rem; }
            .action-cards { flex-direction: column; align-items: center; }
            .card { width: 100%; max-width: 400px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">ROOM ESCAPE</div>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1>ESCAPE THE ORDINARY</h1>
            <p class="subtitle">당신의 한계를 시험할 미스터리 속으로.</p>
            
            <h2 class="section-title">For Challengers</h2>
            <div class="action-cards" style="margin-bottom: 3rem;">
                <a href="/user-reservation.html" class="card primary-card">
                    <h2>방탈출 예약하기</h2>
                    <p>원하는 테마와 시간을 선택하고<br>도전을 시작하세요.</p>
                </a>
                <a href="/my-reservation.html" class="card secondary-card">
                    <h2>내 예약 관리</h2>
                    <p>나의 예약 내역을 조회하고<br>일정을 변경하거나 취소하세요.</p>
                </a>
                <a href="/popular-themes.html" class="card secondary-card">
                    <h2>실시간 인기 테마</h2>
                    <p>다른 도전자들이 가장 많이 선택한<br>테마의 순위를 확인하세요.</p>
                </a>
            </div>

            <h2 class="section-title">For Operators (Admin)</h2>
            <div class="action-cards admin-cards">
                <a href="/admin-reservation.html" class="card admin-card">
                    <h2>예약 현황</h2>
                </a>
                <a href="/admin-time.html" class="card admin-card">
                    <h2>시간 관리</h2>
                </a>
                <a href="/admin-theme.html" class="card admin-card">
                    <h2>테마 관리</h2>
                </a>
            </div>
        </div>
    </main>
</body>
</html>
