<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roomescape Member</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">

<nav class="bg-indigo-600 text-white shadow-lg">
    <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold tracking-tight cursor-pointer" onclick="showSection('home')">Roomescape</h1>
        <div class="space-x-6">
            <button onclick="showSection('themes')" class="hover:text-indigo-200 font-medium">테마예약</button>
            <button onclick="showSection('ranking-search')" class="hover:text-indigo-200 font-medium">인기 테마 검색</button>
            <button onclick="showSection('reservations')" class="hover:text-indigo-200 font-medium">전체 예약 현황</button>
            <button onclick="showSection('my-reservations')" class="hover:text-indigo-200 font-medium">내 예약 관리</button>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto p-6">

    <!-- [Section 1] Home: Ranking -->
    <section id="home-section" class="space-y-8">
        <h2 class="text-3xl font-extrabold text-gray-800">🔥 지금 가장 인기 있는 테마 (최근 7일)</h2>
        <div id="ranking-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </section>

    <!-- [Section 2] Themes: List & Schedule -->
    <section id="themes-section" class="hidden space-y-8">
        <h2 class="text-3xl font-extrabold text-gray-800">전체 테마</h2>
        <div id="theme-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <!-- Theme Detail Modal -->
        <div id="theme-detail-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-40">
            <div class="bg-white rounded-xl max-w-lg w-full shadow-2xl overflow-hidden">
                <img id="detail-thumbnail" src="" class="w-full h-56 object-cover">
                <div class="p-6 space-y-3">
                    <div class="flex justify-between items-start">
                        <h3 id="detail-name" class="text-2xl font-extrabold text-gray-800"></h3>
                        <button onclick="closeThemeDetail()" class="text-gray-400 hover:text-black font-bold text-xl ml-4">✕</button>
                    </div>
                    <p id="detail-description" class="text-gray-600 leading-relaxed"></p>
                    <button id="detail-book-btn" class="w-full mt-4 bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">이 테마 예약하기</button>
                </div>
            </div>
        </div>

        <div id="schedule-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-xl max-w-lg w-full p-6 space-y-4 shadow-2xl">
                <div class="flex justify-between items-center">
                    <h3 id="modal-theme-name" class="text-xl font-bold">테마 예약하기</h3>
                    <button onclick="closeModal()" class="text-gray-500 hover:text-black font-bold text-xl">✕</button>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">예약 날짜</label>
                    <input type="date" id="reservation-date" class="block w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500" onchange="loadSchedules()">
                </div>
                <div id="schedule-slots" class="grid grid-cols-3 gap-2 mt-2"></div>
                <div class="pt-4 border-t mt-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">예약자 성함</label>
                    <input type="text" id="user-name" placeholder="이름을 입력하세요" class="w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <button onclick="submitReservation()" class="w-full mt-4 bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">예약 신청하기</button>
                </div>
            </div>
        </div>
    </section>

    <!-- [Section 3] Ranking Search -->
    <section id="ranking-search-section" class="hidden space-y-6">
        <h2 class="text-3xl font-extrabold text-gray-800">🏆 인기 테마 상세 검색</h2>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">시작일</label>
                <input type="date" id="search-start" class="border border-gray-300 p-2 rounded focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">종료일</label>
                <input type="date" id="search-end" class="border border-gray-300 p-2 rounded focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button onclick="executeRankingSearch()" class="bg-indigo-600 text-white px-8 py-2 rounded font-bold hover:bg-indigo-700 transition">검색하기</button>
        </div>
        <div id="search-ranking-list" class="grid grid-cols-1 md:grid-cols-3 gap-6 pt-4">
            <div class="col-span-3 text-center text-gray-500 py-10">기간을 설정하고 검색 버튼을 눌러주세요.</div>
        </div>
    </section>

    <!-- [Section 4] All Reservations -->
    <section id="reservations-section" class="hidden space-y-8">
        <h2 class="text-3xl font-extrabold text-gray-800">📋 전체 예약 현황</h2>
        <div class="bg-white shadow rounded-lg overflow-hidden border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200 text-left">
                <thead class="bg-gray-100">
                <tr>
                    <th class="px-6 py-3 font-semibold text-gray-700">날짜</th>
                    <th class="px-6 py-3 font-semibold text-gray-700">테마</th>
                    <th class="px-6 py-3 font-semibold text-gray-700">시간</th>
                    <th class="px-6 py-3 font-semibold text-gray-700">예약자</th>
                    <th class="px-6 py-3 font-semibold text-gray-700">작업</th>
                </tr>
                </thead>
                <tbody id="all-reservation-list" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
    </section>

    <!-- [Section 5] My Reservations -->
    <section id="my-reservations-section" class="hidden space-y-6">
        <h2 class="text-3xl font-extrabold text-gray-800">👤 내 예약 관리</h2>
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex gap-4 items-end">
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 mb-1">예약자 성함</label>
                <input type="text" id="my-name" placeholder="예약 시 입력한 이름을 입력하세요"
                       class="w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500"
                       onkeydown="if(event.key==='Enter') lookupMyReservations()">
            </div>
            <button onclick="lookupMyReservations()" class="bg-indigo-600 text-white px-8 py-2 rounded font-bold hover:bg-indigo-700 transition">조회하기</button>
        </div>

        <div id="my-reservation-container" class="hidden bg-white shadow rounded-lg overflow-hidden border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200 text-left">
                <thead class="bg-gray-100">
                <tr>
                    <th class="px-6 py-3 font-semibold text-gray-700">날짜</th>
                    <th class="px-6 py-3 font-semibold text-gray-700">테마</th>
                    <th class="px-6 py-3 font-semibold text-gray-700">시간</th>
                    <th class="px-6 py-3 font-semibold text-gray-700">작업</th>
                </tr>
                </thead>
                <tbody id="my-reservation-list" class="divide-y divide-gray-200"></tbody>
            </table>
        </div>
        <div id="my-reservation-empty" class="hidden text-center text-gray-500 py-10">예약 내역이 없습니다.</div>
    </section>

    <!-- Update Modal -->
    <div id="update-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl max-w-lg w-full p-6 space-y-4 shadow-2xl">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-bold">예약 날짜·시간 변경</h3>
                <button onclick="closeUpdateModal()" class="text-gray-500 hover:text-black font-bold text-xl">✕</button>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">새 날짜</label>
                <input type="date" id="update-date" class="block w-full border border-gray-300 rounded-md p-2 focus:ring-indigo-500 focus:border-indigo-500" onchange="loadUpdateSchedules()">
            </div>
            <div id="update-schedule-slots" class="grid grid-cols-3 gap-2 mt-2"></div>
            <button onclick="submitUpdate()" class="w-full mt-4 bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">변경 확정하기</button>
        </div>
    </div>
</main>

<script>
    const API_BASE_URL = '';
    let selectedThemeId = null;
    let selectedTimeId = null;
    let themeCache = {};
    let updateReservationId = null;
    let updateThemeId = null;
    let updateUserName = null;
    let updateSelectedTimeId = null;

    document.addEventListener('DOMContentLoaded', () => {
        loadRankings();
        loadThemes();
        loadAllReservations();
        initSearchDates();
    });

    function showSection(section) {
        ['home', 'themes', 'ranking-search', 'reservations', 'my-reservations'].forEach(s => {
            document.getElementById(`${s}-section`).classList.add('hidden');
        });
        document.getElementById(`${section}-section`).classList.remove('hidden');

        if (section === 'home') loadRankings();
        else if (section === 'reservations') loadAllReservations();
    }

    // ── Ranking ──────────────────────────────────────────────────────────────

    async function loadRankings() {
        try {
            const res = await fetch(`${API_BASE_URL}/themes/rank?limit=3`);
            const data = await res.json();
            document.getElementById('ranking-list').innerHTML = data.map((theme, i) => `
                <div class="bg-white rounded-xl shadow-md overflow-hidden border-2 border-indigo-100 p-4 transform transition hover:-translate-y-1">
                    <div class="text-indigo-600 font-black text-2xl mb-2">Rank ${i + 1}</div>
                    <img src="${theme.thumbnail}" class="w-full h-40 object-cover rounded-md mb-4">
                    <h3 class="font-bold text-lg">${theme.name}</h3>
                    <p class="text-gray-500 text-sm mt-1">${theme.description}</p>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    function initSearchDates() {
        const today = new Date();
        const lastWeek = new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000);
        const fmt = d => (new Date(d - d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        document.getElementById('search-start').value = fmt(lastWeek);
        document.getElementById('search-end').value = fmt(today);
    }

    async function executeRankingSearch() {
        const start = document.getElementById('search-start').value;
        const end = document.getElementById('search-end').value;
        let url = `${API_BASE_URL}/themes/rank?limit=10`;
        if (start) url += `&startDate=${start}`;
        if (end) url += `&endDate=${end}`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            const container = document.getElementById('search-ranking-list');
            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-3 text-center text-gray-500 py-10">해당 기간 내에 예약된 테마가 없습니다.</div>`;
                return;
            }
            container.innerHTML = data.map((theme, i) => `
                <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200 p-4">
                    <div class="flex items-center justify-between mb-2">
                        <span class="bg-indigo-100 text-indigo-800 text-xs font-bold px-2.5 py-0.5 rounded border border-indigo-200">${i + 1}위</span>
                    </div>
                    <img src="${theme.thumbnail}" class="w-full h-40 object-cover rounded-md mb-4">
                    <h3 class="font-bold text-lg">${theme.name}</h3>
                    <p class="text-gray-500 text-sm mt-1">${theme.description}</p>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    // ── Themes & Booking ─────────────────────────────────────────────────────

    async function loadThemes() {
        try {
            const res = await fetch(`${API_BASE_URL}/themes`);
            const data = await res.json();
            data.forEach(t => themeCache[t.id] = t);
            document.getElementById('theme-list').innerHTML = data.map(theme => `
                <div class="bg-white rounded-xl shadow border border-gray-100 overflow-hidden cursor-pointer hover:shadow-lg transition"
                     onclick="openThemeDetail(${theme.id})">
                    <img src="${theme.thumbnail}" class="w-full h-48 object-cover">
                    <div class="p-4 space-y-2">
                        <h3 class="font-bold text-xl">${theme.name}</h3>
                        <p class="text-gray-500 text-sm line-clamp-2">${theme.description}</p>
                    </div>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    function openThemeDetail(id) {
        const theme = themeCache[id];
        if (!theme) return;
        document.getElementById('detail-thumbnail').src = theme.thumbnail;
        document.getElementById('detail-name').innerText = theme.name;
        document.getElementById('detail-description').innerText = theme.description;
        document.getElementById('detail-book-btn').onclick = () => {
            closeThemeDetail();
            openBookingModal(theme.id, theme.name);
        };
        document.getElementById('theme-detail-modal').classList.remove('hidden');
    }

    function closeThemeDetail() {
        document.getElementById('theme-detail-modal').classList.add('hidden');
    }

    function openBookingModal(id, name) {
        selectedThemeId = id;
        selectedTimeId = null;
        document.getElementById('modal-theme-name').innerText = name;
        const today = new Date();
        document.getElementById('reservation-date').value = (new Date(today - today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        document.getElementById('user-name').value = '';
        document.getElementById('schedule-modal').classList.remove('hidden');
        loadSchedules();
    }

    async function loadSchedules() {
        selectedTimeId = null;
        const date = document.getElementById('reservation-date').value;
        if (!date) return;
        const res = await fetch(`${API_BASE_URL}/times/${selectedThemeId}?date=${date}`);
        const data = await res.json();
        document.getElementById('schedule-slots').innerHTML = data.schedules.map(s => `
            <button onclick="selectTime(${s.timeId})"
                    ${!s.isAvailable ? 'disabled' : ''}
                    class="p-2 border rounded font-medium transition-colors ${!s.isAvailable ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'hover:border-indigo-600 time-btn'}"
                    id="time-slot-${s.timeId}">
                ${s.startAt.substring(0, 5)}
            </button>
        `).join('');
    }

    function selectTime(id) {
        selectedTimeId = id;
        document.querySelectorAll('.time-btn').forEach(btn => btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600'));
        document.getElementById(`time-slot-${id}`)?.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
    }

    async function submitReservation() {
        if (!selectedTimeId) { alert('예약 시간을 먼저 선택해 주세요!'); return; }
        const name = document.getElementById('user-name').value.trim();
        if (!name) { alert('예약자 성함을 입력해 주세요!'); return; }
        const date = document.getElementById('reservation-date').value;

        const res = await fetch(`${API_BASE_URL}/reservations`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ themeId: selectedThemeId, name, date, timeId: selectedTimeId })
        });

        if (res.ok) {
            alert('예약이 성공적으로 완료되었습니다!');
            closeModal();
            loadAllReservations();
            showSection('reservations');
        } else {
            const error = await res.json();
            alert(`에러 발생: ${error.message}`);
        }
    }

    function closeModal() {
        document.getElementById('schedule-modal').classList.add('hidden');
    }

    // ── All Reservations ─────────────────────────────────────────────────────

    async function loadAllReservations() {
        try {
            const res = await fetch(`${API_BASE_URL}/reservations`);
            const data = await res.json();
            document.getElementById('all-reservation-list').innerHTML = data.map(r => {
                const themeName = r.theme?.name || '테마 정보 없음';
                const startTime = r.time?.startAt ? r.time.startAt.substring(0, 5) : '시간 없음';
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4">${r.date}</td>
                        <td class="px-6 py-4 font-medium">${themeName}</td>
                        <td class="px-6 py-4">${startTime}</td>
                        <td class="px-6 py-4 font-bold text-gray-400">🔒 비공개</td>
                        <td class="px-6 py-4">
                            <button onclick="promptCancelReservation(${r.id})" class="text-red-500 font-bold hover:text-red-700 transition">취소</button>
                        </td>
                    </tr>
                `;
            }).join('');
        } catch (e) { console.error(e); }
    }

    async function promptCancelReservation(id) {
        const inputName = prompt('예약을 취소하려면 예약자 성함을 정확히 입력해주세요:');
        if (!inputName || !inputName.trim()) return;

        const res = await fetch(`${API_BASE_URL}/reservations/${id}`, {
            method: 'DELETE',
            headers: { 'X-User-Name': encodeURIComponent(inputName.trim()) }
        });

        if (res.ok) {
            alert('예약이 취소되었습니다.');
            loadAllReservations();
        } else {
            const error = await res.json();
            alert(`취소 실패: ${error.message}`);
        }
    }

    // ── My Reservations ───────────────────────────────────────────────────────

    async function lookupMyReservations() {
        const name = document.getElementById('my-name').value.trim();
        if (!name) { alert('이름을 입력해주세요.'); return; }

        const res = await fetch(`${API_BASE_URL}/reservations/my`, {
            headers: { 'X-User-Name': encodeURIComponent(name) }
        });
        const data = await res.json();

        const container = document.getElementById('my-reservation-container');
        const emptyMsg = document.getElementById('my-reservation-empty');

        if (data.length === 0) {
            container.classList.add('hidden');
            emptyMsg.classList.remove('hidden');
            return;
        }

        emptyMsg.classList.add('hidden');
        container.classList.remove('hidden');
        document.getElementById('my-reservation-list').innerHTML = data.map(r => {
            const themeName = r.theme?.name || '테마 정보 없음';
            const startTime = r.time?.startAt ? r.time.startAt.substring(0, 5) : '시간 없음';
            const safeName = encodeURIComponent(name);
            return `
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4">${r.date}</td>
                    <td class="px-6 py-4 font-medium">${themeName}</td>
                    <td class="px-6 py-4">${startTime}</td>
                    <td class="px-6 py-4 space-x-3">
                        <button onclick="openUpdateModal(${r.id}, ${r.theme.id}, '${safeName}')"
                                class="text-indigo-600 font-bold hover:text-indigo-800 transition">변경</button>
                        <button onclick="cancelMyReservation(${r.id}, '${safeName}')"
                                class="text-red-500 font-bold hover:text-red-700 transition">취소</button>
                    </td>
                </tr>
            `;
        }).join('');
    }

    async function cancelMyReservation(id, encodedName) {
        if (!confirm('예약을 취소하시겠습니까?')) return;

        const res = await fetch(`${API_BASE_URL}/reservations/${id}`, {
            method: 'DELETE',
            headers: { 'X-User-Name': encodedName }
        });

        if (res.ok) {
            alert('예약이 취소되었습니다.');
            lookupMyReservations();
        } else {
            const error = await res.json();
            alert(`취소 실패: ${error.message}`);
        }
    }

    function openUpdateModal(id, themeId, encodedName) {
        updateReservationId = id;
        updateThemeId = themeId;
        updateUserName = encodedName;
        updateSelectedTimeId = null;

        const today = new Date();
        document.getElementById('update-date').value = (new Date(today - today.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        document.getElementById('update-schedule-slots').innerHTML = '';
        document.getElementById('update-modal').classList.remove('hidden');
        loadUpdateSchedules();
    }

    async function loadUpdateSchedules() {
        updateSelectedTimeId = null;
        const date = document.getElementById('update-date').value;
        if (!date || !updateThemeId) return;

        const res = await fetch(`${API_BASE_URL}/times/${updateThemeId}?date=${date}`);
        const data = await res.json();
        document.getElementById('update-schedule-slots').innerHTML = data.schedules.map(s => `
            <button onclick="selectUpdateTime(${s.timeId})"
                    ${!s.isAvailable ? 'disabled' : ''}
                    class="p-2 border rounded font-medium transition-colors ${!s.isAvailable ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : 'hover:border-indigo-600 update-time-btn'}"
                    id="update-slot-${s.timeId}">
                ${s.startAt.substring(0, 5)}
            </button>
        `).join('');
    }

    function selectUpdateTime(id) {
        updateSelectedTimeId = id;
        document.querySelectorAll('.update-time-btn').forEach(btn => btn.classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600'));
        document.getElementById(`update-slot-${id}`)?.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');
    }

    async function submitUpdate() {
        if (!updateSelectedTimeId) { alert('변경할 시간을 선택해주세요.'); return; }
        const date = document.getElementById('update-date').value;

        const res = await fetch(`${API_BASE_URL}/reservations/${updateReservationId}`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                'X-User-Name': updateUserName
            },
            body: JSON.stringify({ date, timeId: updateSelectedTimeId })
        });

        if (res.ok) {
            alert('예약이 변경되었습니다.');
            closeUpdateModal();
            lookupMyReservations();
        } else {
            const error = await res.json();
            alert(`변경 실패: ${error.message}`);
        }
    }

    function closeUpdateModal() {
        document.getElementById('update-modal').classList.add('hidden');
        updateReservationId = null;
        updateThemeId = null;
        updateUserName = null;
        updateSelectedTimeId = null;
    }
</script>
</body>
</html>
