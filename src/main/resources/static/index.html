<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RoomEscape — 방탈출 예약</title>
    <meta content="방탈출 테마 선택 및 예약 페이지" name="description">
    <link href="style.css" rel="stylesheet">
    <style>
        /* User page specific */
        .user-layout {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 36px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .top-nav-logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, #5b7fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .top-nav-links {
            display: flex;
            gap: 8px;
        }

        .user-main {
            flex: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
        }

        /* Steps */
        .steps {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 36px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            position: relative;
        }

        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: calc(100% - 120px);
            height: 2px;
            background: var(--border);
            left: 130px;
        }

        .step.done::after {
            background: var(--accent);
        }

        .step-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            border: 2px solid var(--border);
            color: var(--text-muted);
            background: var(--bg-secondary);
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .step.active .step-num {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 16px rgba(91, 127, 255, 0.4);
        }

        .step.done .step-num {
            background: var(--success);
            border-color: var(--success);
            color: #0d0f1a;
        }

        .step-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .step.active .step-label {
            color: var(--accent);
        }

        .step.done .step-label {
            color: var(--success);
        }

        /* Section panels */
        .section-panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .section-panel.visible {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Summary box */
        .booking-summary {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 24px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .summary-key {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-val {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .summary-val.empty {
            color: var(--text-muted);
            font-weight: 400;
            font-style: italic;
        }

        /* Popular section */
        .popular-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        /* My reservation inline edit */
        .my-res-edit-row {
            background: var(--bg-input);
        }

        .my-res-edit-row td {
            padding: 14px 16px !important;
        }
    </style>
</head>
<body>
<div class="user-layout">

    <!-- Top Nav -->
    <nav class="top-nav">
        <div class="top-nav-logo">🔐 RoomEscape</div>
        <div class="top-nav-links">
            <a class="btn btn-ghost btn-sm" href="/admin/reservation.html">🛠 관리자</a>
        </div>
    </nav>

    <main class="user-main">

        <!-- Hero -->
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px;">
                방탈출 예약
            </h1>
            <p style="color: var(--text-secondary); font-size: 16px;">
                테마를 선택하고 날짜와 시간을 골라 예약하세요.
            </p>
        </div>

        <!-- Steps indicator -->
        <div class="steps" id="steps">
            <div class="step active" id="step-1">
                <div class="step-num">1</div>
                <span class="step-label">테마 선택</span>
            </div>
            <div class="step" id="step-2">
                <div class="step-num">2</div>
                <span class="step-label">날짜 · 시간</span>
            </div>
            <div class="step" id="step-3">
                <div class="step-num">3</div>
                <span class="step-label">예약 완료</span>
            </div>
        </div>

        <!-- Booking summary bar -->
        <div class="booking-summary" id="booking-summary">
            <div class="summary-item">
                <div class="summary-key">테마</div>
                <div class="summary-val empty" id="sum-theme">–</div>
            </div>
            <div class="summary-item">
                <div class="summary-key">날짜</div>
                <div class="summary-val empty" id="sum-date">–</div>
            </div>
            <div class="summary-item">
                <div class="summary-key">시간</div>
                <div class="summary-val empty" id="sum-time">–</div>
            </div>
            <div class="summary-item">
                <div class="summary-key">예약자</div>
                <div class="summary-val empty" id="sum-name">–</div>
            </div>
        </div>

        <!-- ── STEP 1: Theme selection ── -->
        <div class="section-panel visible" id="panel-1">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">🎭 테마를 선택하세요</span>
                    <button class="btn btn-ghost btn-sm" onclick="loadThemes(true)">🔄</button>
                </div>
                <div class="theme-grid" id="theme-grid">
                    <div class="empty-state">
                        <div class="spinner"></div>
                    </div>
                </div>
                <div style="text-align: center; margin-top: 16px;">
                    <button class="btn btn-ghost" id="theme-load-more-btn" onclick="loadThemeMore()" style="display:none;">
                        더 보기
                    </button>
                </div>
            </div>

            <!-- Popular themes -->
            <div class="card" style="margin-top: 20px;">
                <div class="card-header">
                    <span class="card-title">🏆 이번 주 인기 테마</span>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <input id="pop-limit" max="20" min="1" style="width:60px;" type="number" value="5">
                        <button class="btn btn-primary btn-sm" onclick="loadPopular()">조회</button>
                    </div>
                </div>
                <div id="popular-section">
                    <div class="empty-state"><p>조회 버튼을 눌러 확인하세요.</p></div>
                </div>
            </div>
        </div>

        <!-- ── STEP 2: Date & Time ── -->
        <div class="section-panel" id="panel-2">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">📅 날짜와 시간을 선택하세요</span>
                    <button class="btn btn-ghost btn-sm" onclick="goToStep(1)">← 뒤로</button>
                </div>
                <div style="display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 24px;">
                    <div class="form-group" style="flex: 1; min-width: 180px;">
                        <label for="book-date">날짜</label>
                        <input id="book-date" onchange="loadAvailableTimes()" type="date">
                    </div>
                </div>
                <div id="time-slot-container">
                    <div class="empty-state"><p>날짜를 선택하면 예약 가능한 시간이 표시됩니다.</p></div>
                </div>
                <div id="step2-next" style="margin-top: 20px;" style="display:none;">
                </div>
            </div>
        </div>

        <!-- ── STEP 3: Confirm ── -->
        <div class="section-panel" id="panel-3">
            <div class="card">
                <div class="card-header">
                    <span class="card-title">✅ 예약 정보 확인</span>
                    <button class="btn btn-ghost btn-sm" onclick="goToStep(2)">← 뒤로</button>
                </div>

                <!-- Confirm summary -->
                <div id="confirm-summary"
                     style="margin-bottom: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="book-name">예약자 이름</label>
                    <input id="book-name" placeholder="홍길동" style="max-width: 300px;" type="text">
                </div>

                <button class="btn btn-primary btn-full" onclick="submitReservation()" style="max-width: 300px;">
                    🎟 예약 확정
                </button>
            </div>
        </div>

        <!-- ── 내 예약 관리 ── -->
        <div class="card" style="margin-top: 32px;">
            <div class="card-header">
                <span class="card-title">📋 내 예약 조회 · 수정 · 취소</span>
            </div>
            <div style="display: flex; gap: 10px; align-items: flex-end; margin-bottom: 16px;">
                <div class="form-group" style="flex: 1; max-width: 280px; margin: 0;">
                    <label for="my-name">예약자 이름</label>
                    <input id="my-name" placeholder="홍길동" type="text">
                </div>
                <button class="btn btn-primary" onclick="searchMyReservations()">조회</button>
            </div>
            <div id="my-res-section">
                <div class="empty-state"><p>이름을 입력하고 조회 버튼을 누르세요.</p></div>
            </div>
        </div>

        <!-- 수정 모달 (숨김) -->
        <div id="edit-modal-backdrop"
             style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;">
            <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;width:100%;max-width:480px;margin:0 16px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                    <span style="font-size:16px;font-weight:700;">✏️ 예약 수정</span>
                    <button class="btn btn-ghost btn-sm" onclick="closeEditModal()">✕</button>
                </div>
                <input id="edit-res-id" type="hidden">
                <input id="edit-res-name" type="hidden">
                <div class="form-grid form-grid-2" style="margin-bottom:14px;">
                    <div class="form-group">
                        <label for="edit-date">날짜</label>
                        <input id="edit-date" onchange="loadEditTimes()" type="date">
                    </div>
                    <div class="form-group">
                        <label for="edit-theme">테마</label>
                        <select id="edit-theme" onchange="loadEditTimes()">
                            <option value="">테마 선택</option>
                        </select>
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1;">
                        <label for="edit-time">시간</label>
                        <select id="edit-time">
                            <option value="">시간 선택</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex;gap:10px;">
                    <button class="btn btn-primary" onclick="submitEdit()" style="flex:1;">저장</button>
                    <button class="btn btn-ghost" onclick="closeEditModal()">취소</button>
                </div>
            </div>
        </div>

    </main>
</div>

<div id="toast-container"></div>

<script>
    // ── State ─────────────────────────────────────────
    const state = {
        selectedTheme: null,
        selectedDate: null,
        selectedTime: null,
    };

    const themePageState = {page: 0, hasNext: false};

    // ── Utils ─────────────────────────────────────────
    function toast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const el = document.createElement('div');
        const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
        el.className = `toast toast-${type}`;
        el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
        container.appendChild(el);
        setTimeout(() => el.remove(), 3200);
    }

    async function api(method, url, body) {
        const opts = {method, headers: {'Content-Type': 'application/json'}};
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        if (!res.ok) {
            const text = await res.text().catch(() => '');
            let message = `오류가 발생했습니다. (HTTP ${res.status})`;
            try {
                const json = JSON.parse(text);
                if (json.message) message = json.message;
            } catch (_) {
                if (text) message = text;
            }
            throw new Error(message);
        }
        const ct = res.headers.get('Content-Type') || '';
        return ct.includes('json') ? res.json() : null;
    }

    function updateSummary() {
        const setVal = (id, val) => {
            const el = document.getElementById(id);
            if (val) {
                el.textContent = val;
                el.classList.remove('empty');
            } else {
                el.textContent = '–';
                el.classList.add('empty');
            }
        };
        setVal('sum-theme', state.selectedTheme?.name);
        setVal('sum-date', state.selectedDate);
        setVal('sum-time', state.selectedTime?.startAt);
        setVal('sum-name', document.getElementById('book-name')?.value || null);
    }

    // ── Step navigation ────────────────────────────────
    function goToStep(n) {
        for (let i = 1; i <= 3; i++) {
            document.getElementById(`panel-${i}`).classList.toggle('visible', i === n);
            const step = document.getElementById(`step-${i}`);
            step.classList.toggle('active', i === n);
            step.classList.toggle('done', i < n);
        }
        updateSummary();
    }

    // ── Theme ─────────────────────────────────────────
    async function loadThemes(reset = true) {
        if (reset) {
            themePageState.page = 0;
            const grid = document.getElementById('theme-grid');
            grid.innerHTML = `<div class="empty-state"><div class="spinner"></div></div>`;
        }

        try {
            const data = await api('GET', `/themes?page=${themePageState.page}&size=20`);
            const themes = data.themes;
            themePageState.hasNext = data.hasNext;

            const grid = document.getElementById('theme-grid');

            if (reset && !themes.length) {
                grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🎭</div><p>등록된 테마가 없습니다.</p></div>`;
                document.getElementById('theme-load-more-btn').style.display = 'none';
                return;
            }

            const cards = themes.map(t => `
                <div class="theme-card" id="theme-card-${t.id}" onclick="selectTheme(${JSON.stringify(t).replace(/"/g, '&quot;')})">
                    <div class="theme-thumbnail">
                        ${t.thumbnailImageUrl
                ? `<img src="${t.thumbnailImageUrl}" alt="${t.name}" onerror="this.parentNode.innerHTML='🎭'">`
                : '🎭'}
                    </div>
                    <div class="theme-card-body">
                        <div class="theme-card-name">${t.name}</div>
                        <div class="theme-card-desc">${t.description || '설명 없음'}</div>
                    </div>
                </div>
            `).join('');

            if (reset) {
                grid.innerHTML = cards;
            } else {
                grid.insertAdjacentHTML('beforeend', cards);
            }

            document.getElementById('theme-load-more-btn').style.display = themePageState.hasNext ? '' : 'none';
        } catch (e) {
            document.getElementById('theme-grid').innerHTML =
                `<div class="empty-state"><p style="color:var(--danger)">로드 실패: ${e.message}</p></div>`;
        }
    }

    async function loadThemeMore() {
        themePageState.page++;
        await loadThemes(false);
    }

    function selectTheme(theme) {
        state.selectedTheme = theme;
        document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
        const card = document.getElementById(`theme-card-${theme.id}`);
        if (card) card.classList.add('selected');
        updateSummary();
        setTimeout(() => goToStep(2), 300);
        const dateInput = document.getElementById('book-date');
        if (dateInput.value) loadAvailableTimes();
    }

    // ── Popular ────────────────────────────────────────
    async function loadPopular() {
        const limit = document.getElementById('pop-limit').value || 5;
        const container = document.getElementById('popular-section');
        container.innerHTML = `<div class="empty-state"><div class="spinner"></div></div>`;
        try {
            const data = (await api('GET', `/themes/popular?limit=${limit}`)).themes;
            if (!data.length) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><p>데이터가 없습니다.</p></div>`;
                return;
            }
            const medals = ['🥇', '🥈', '🥉'];
            container.innerHTML = `<div style="display:flex;flex-direction:column;gap:10px;">
                ${data.map((t, i) => `
                    <div style="display:flex;align-items:center;gap:14px;padding:12px;border-radius:var(--radius-sm);background:var(--bg-input);cursor:pointer;transition:background 0.15s;"
                         onclick="selectTheme(${JSON.stringify(t).replace(/"/g, '&quot;')})"
                         onmouseenter="this.style.background='var(--bg-card-hover)'"
                         onmouseleave="this.style.background='var(--bg-input)'"
                    >
                        <span style="font-size:20px;width:28px;text-align:center;">${medals[i] || `${i + 1}`}</span>
                        ${t.thumbnailImageUrl
                ? `<img src="${t.thumbnailImageUrl}" alt="${t.name}" style="width:44px;height:36px;object-fit:cover;border-radius:6px;" onerror="this.style.display='none'">`
                : `<div style="width:44px;height:36px;background:var(--bg-card);border-radius:6px;display:flex;align-items:center;justify-content:center;">🎭</div>`}
                        <div style="flex:1;">
                            <div style="font-weight:600;font-size:14px;">${t.name}</div>
                            <div style="font-size:12px;color:var(--text-secondary);">${t.description || ''}</div>
                        </div>
                        <span class="badge badge-yellow">🔖 ${t.reservedCount}건</span>
                    </div>
                `).join('')}
            </div>`;
        } catch (e) {
            container.innerHTML = `<div class="empty-state"><p style="color:var(--danger)">조회 실패: ${e.message}</p></div>`;
        }
    }

    // ── Time slots ────────────────────────────────────
    async function loadAvailableTimes() {
        const date = document.getElementById('book-date').value;
        state.selectedDate = date;
        state.selectedTime = null;
        updateSummary();
        const container = document.getElementById('time-slot-container');

        if (!state.selectedTheme || !date) {
            container.innerHTML = `<div class="empty-state"><p>테마와 날짜를 선택해주세요.</p></div>`;
            return;
        }

        container.innerHTML = `<div class="empty-state"><div class="spinner"></div></div>`;
        try {
            const data = (await api('GET', `/themes/${state.selectedTheme.id}/times?date=${date}`)).times;
            if (!data.length) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">⏰</div><p>가용 시간이 없습니다.</p></div>`;
                return;
            }
            container.innerHTML = `<div class="time-grid">
                ${data.map(t => `
                    <div class="time-slot ${t.isReserved ? 'reserved' : 'available'}"
                         ${!t.isReserved ? `onclick="selectTime({id:${t.id},startAt:'${t.startAt}'})"` : ''}
                         id="ts-${t.id}">
                        <div>${t.startAt}</div>
                        <div class="time-slot-label">${t.isReserved ? '예약됨' : '선택 가능'}</div>
                    </div>
                `).join('')}
            </div>`;
        } catch (e) {
            container.innerHTML = `<div class="empty-state"><p style="color:var(--danger)">조회 실패: ${e.message}</p></div>`;
        }
    }

    function selectTime(time) {
        state.selectedTime = time;
        document.querySelectorAll('.time-slot.available').forEach(el => el.classList.remove('selected'));
        const slot = document.getElementById(`ts-${time.id}`);
        if (slot) slot.classList.add('selected');
        updateSummary();
        setTimeout(() => goToStep(3), 300);
        buildConfirmSummary();
    }

    function buildConfirmSummary() {
        const t = state.selectedTheme;
        const container = document.getElementById('confirm-summary');
        container.innerHTML = `
            <div style="background:var(--bg-input);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:4px;">
                <div style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;">테마</div>
                <div style="font-size:16px;font-weight:700;">${t?.name ?? '–'}</div>
                <div style="font-size:12px;color:var(--text-secondary);">${t?.description ?? ''}</div>
            </div>
            <div style="background:var(--bg-input);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:4px;">
                <div style="font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;">일정</div>
                <div style="font-size:16px;font-weight:700;">${state.selectedDate ?? '–'}</div>
                <div style="font-size:12px;color:var(--text-secondary);">⏰ ${state.selectedTime?.startAt ?? '–'}</div>
            </div>
        `;
    }

    // ── Reservation submit ────────────────────────────
    async function submitReservation() {
        const name = document.getElementById('book-name').value.trim();
        if (!name) {
            toast('예약자 이름을 입력해주세요.', 'error');
            return;
        }
        if (!state.selectedTheme || !state.selectedDate || !state.selectedTime) {
            toast('테마, 날짜, 시간을 모두 선택해주세요.', 'error');
            return;
        }

        try {
            await api('POST', '/reservations', {
                name,
                date: state.selectedDate,
                themeId: state.selectedTheme.id,
                timeId: state.selectedTime.id,
            });
            toast(`🎉 "${state.selectedTheme.name}" 예약이 완료되었습니다!`, 'success');
            state.selectedTheme = null;
            state.selectedDate = null;
            state.selectedTime = null;
            document.getElementById('book-name').value = '';
            updateSummary();
            goToStep(1);
            await loadThemes(true);
        } catch (e) {
            toast(`예약 실패: ${e.message}`, 'error');
        }
    }

    // ── My Reservations ───────────────────────────────
    async function searchMyReservations() {
        const name = document.getElementById('my-name').value.trim();
        if (!name) {
            toast('이름을 입력해주세요.', 'error');
            return;
        }
        const section = document.getElementById('my-res-section');
        section.innerHTML = `<div class="empty-state"><div class="spinner"></div></div>`;
        try {
            const data = await api('GET', `/reservations?page=0&size=100&name=${encodeURIComponent(name)}`);
            const reservations = data.reservations;
            if (!reservations.length) {
                section.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>"${name}" 이름의 예약이 없습니다.</p></div>`;
                return;
            }
            section.innerHTML = `
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>날짜</th>
                                <th>시간</th>
                                <th>액션</th>
                            </tr>
                        </thead>
                        <tbody id="my-res-tbody">
                            ${reservations.map(r => renderMyResRow(r, name)).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        } catch (e) {
            section.innerHTML = `<div class="empty-state"><p style="color:var(--danger)">조회 실패: ${e.message}</p></div>`;
        }
    }

    function renderMyResRow(r, name) {
        return `
            <tr id="my-res-row-${r.id}">
                <td><span class="badge badge-gray">#${r.id}</span></td>
                <td>${r.date}</td>
                <td>${r.time ?? '–'}</td>
                <td style="display:flex;gap:6px;">
                    <button class="btn btn-ghost btn-sm" onclick="openEditModal(${r.id}, '${name.replace(/'/g, "\\'")}', '${r.date}')">✏️ 수정</button>
                    <button class="btn btn-danger btn-sm" onclick="cancelReservation(${r.id}, '${name.replace(/'/g, "\\'")}')">✕ 취소</button>
                </td>
            </tr>
        `;
    }

    async function cancelReservation(id, name) {
        if (!confirm(`예약 #${id}를 취소할까요?`)) return;
        try {
            await api('DELETE', `/reservations/${id}`, {name});
            toast('예약이 취소되었습니다.', 'success');
            await searchMyReservations();
        } catch (e) {
            toast(`취소 실패: ${e.message}`, 'error');
        }
    }

    // ── Edit Modal ────────────────────────────────────
    async function openEditModal(id, name, currentDate) {
        document.getElementById('edit-res-id').value = id;
        document.getElementById('edit-res-name').value = name;
        document.getElementById('edit-date').value = currentDate;

        // 테마 목록 로드
        try {
            const themes = (await api('GET', '/themes?page=0&size=100')).themes;
            document.getElementById('edit-theme').innerHTML =
                '<option value="">테마 선택</option>' +
                themes.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        } catch (e) {
            toast('테마 목록 로드 실패', 'error');
        }

        document.getElementById('edit-modal-backdrop').style.display = 'flex';
        await loadEditTimes();
    }

    function closeEditModal() {
        document.getElementById('edit-modal-backdrop').style.display = 'none';
    }

    async function loadEditTimes() {
        const themeId = document.getElementById('edit-theme').value;
        const date = document.getElementById('edit-date').value;
        const sel = document.getElementById('edit-time');

        if (themeId && date) {
            try {
                const times = (await api('GET', `/themes/${themeId}/times?date=${date}`)).times;
                sel.innerHTML = '<option value="">시간 선택</option>' +
                    times.map(t => `<option value="${t.id}" ${t.isReserved ? 'disabled' : ''}>${t.startAt}${t.isReserved ? ' (예약됨)' : ''}</option>`).join('');
                return;
            } catch (e) { /* fallback */ }
        }

        try {
            const times = (await api('GET', '/times?page=0&size=100')).times;
            sel.innerHTML = '<option value="">시간 선택</option>' +
                times.map(t => `<option value="${t.id}">${t.startAt}</option>`).join('');
        } catch (e) {
            sel.innerHTML = '<option value="">시간 선택</option>';
        }
    }

    async function submitEdit() {
        const id = document.getElementById('edit-res-id').value;
        const name = document.getElementById('edit-res-name').value;
        const date = document.getElementById('edit-date').value;
        const themeId = document.getElementById('edit-theme').value;
        const timeId = document.getElementById('edit-time').value;

        if (!date || !themeId || !timeId) {
            toast('날짜, 테마, 시간을 모두 선택해주세요.', 'error');
            return;
        }

        try {
            await api('PUT', `/reservations/${id}`, {
                name,
                date,
                themeId: Number(themeId),
                timeId: Number(timeId),
            });
            toast('예약이 수정되었습니다.', 'success');
            closeEditModal();
            await searchMyReservations();
        } catch (e) {
            toast(`수정 실패: ${e.message}`, 'error');
        }
    }

    // 모달 배경 클릭 시 닫기
    document.getElementById('edit-modal-backdrop').addEventListener('click', function (e) {
        if (e.target === this) closeEditModal();
    });

    // ── Init ─────────────────────────────────────────
    document.getElementById('book-name').addEventListener('input', updateSummary);
    document.getElementById('my-name').addEventListener('keydown', e => {
        if (e.key === 'Enter') searchMyReservations();
    });
    document.addEventListener('DOMContentLoaded', () => {
        loadThemes(true);
        document.getElementById('book-date').value = new Date().toISOString().split('T')[0];
    });
</script>
</body>
</html>
