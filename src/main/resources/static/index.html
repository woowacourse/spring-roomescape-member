<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방탈출 예약</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: #f59e0b;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 0.875rem;
            transition: color 0.15s;
        }
        nav a:hover { color: #f1f5f9; }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        section + section { margin-top: 4rem; }

        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.75rem;
        }

        .section-title {
            font-size: 1.375rem;
            font-weight: 700;
        }

        .badge {
            background: #f59e0b;
            color: #0f172a;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 0.25rem 0.6rem;
            border-radius: 999px;
            letter-spacing: 0.5px;
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
        }

        .theme-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        }
        .theme-card:hover {
            transform: translateY(-4px);
            border-color: #f59e0b55;
            box-shadow: 0 8px 32px #00000055;
        }

        .card-thumbnail {
            width: 100%;
            height: 170px;
            object-fit: cover;
            background: #334155;
            display: block;
        }

        .card-body {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 0.5rem;
        }

        .card-rank {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #475569;
            color: #f1f5f9;
            font-size: 0.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-rank.top3 { background: #f59e0b; color: #0f172a; }

        .card-name {
            font-size: 1.05rem;
            font-weight: 700;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.55;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-reserve {
            margin-top: 0.5rem;
            width: 100%;
            padding: 0.7rem;
            background: #f59e0b;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-reserve:hover { background: #d97706; }

        .state-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: #475569;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

<header>
    <a href="/" class="logo">🔐 방탈출</a>
    <nav>
        <a href="/reservation-cancel.html">예약 취소</a>
    </nav>
</header>

<main>
    <section>
        <div class="section-header">
            <h2 class="section-title">🏆 이번 주 인기 테마</h2>
            <span class="badge">TOP 10</span>
        </div>
        <div id="popular-list" class="theme-grid">
            <p class="state-msg">불러오는 중...</p>
        </div>
    </section>

    <section>
        <div class="section-header">
            <h2 class="section-title">📋 전체 테마</h2>
        </div>
        <div id="theme-list" class="theme-grid">
            <p class="state-msg">불러오는 중...</p>
        </div>
    </section>
</main>

<script>
    function goReservation(theme) {
        sessionStorage.setItem('selectedTheme', JSON.stringify(theme));
        location.href = '/reservation.html';
    }

    function createCard(theme, rank) {
        const card = document.createElement('div');
        card.className = 'theme-card';

        const rankHtml = rank != null
            ? `<div class="card-rank ${rank < 3 ? 'top3' : ''}">${rank + 1}</div>`
            : '';

        card.innerHTML = `
            <img class="card-thumbnail" src="${theme.thumbnail}" alt="${theme.name}"
                 onerror="this.style.background='#334155';this.removeAttribute('src')">
            <div class="card-body">
                ${rankHtml}
                <div class="card-name">${theme.name}</div>
                <div class="card-desc">${theme.description}</div>
                <button class="btn-reserve">예약하기</button>
            </div>
        `;

        card.querySelector('.btn-reserve').addEventListener('click', () => goReservation(theme));
        return card;
    }

    async function load(url, containerId, ranked) {
        const container = document.getElementById(containerId);
        try {
            const themes = await fetch(url).then(r => r.json());
            container.innerHTML = '';
            if (!themes.length) {
                container.innerHTML = '<p class="state-msg">데이터가 없습니다.</p>';
                return;
            }
            themes.forEach((t, i) => container.appendChild(createCard(t, ranked ? i : null)));
        } catch {
            container.innerHTML = '<p class="state-msg">불러오기에 실패했습니다.</p>';
        }
    }

    load('/themes/popular?days=7&limit=10', 'popular-list', true);
    load('/themes', 'theme-list', false);
</script>

</body>
</html>
