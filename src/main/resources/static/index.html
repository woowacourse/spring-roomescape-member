<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>방탈출 예약</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #1d1d1f;
            color: #fff;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        header a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        header a:hover {
            color: #fff;
        }

        main {
            max-width: 1080px;
            margin: 0 auto;
            padding: 40px;
        }

        section {
            margin-bottom: 56px;
        }

        section h2 {
            font-size: 20px;
            margin: 0 0 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: #ff3b30;
            color: #fff;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .card-img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: #e0e0e0;
            display: block;
        }

        .card-body {
            padding: 16px;
        }

        .card-name {
            font-weight: 600;
            font-size: 16px;
            margin: 0 0 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .count {
            background: #f0f0f3;
            color: #555;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }

        .card-desc {
            font-size: 13px;
            color: #666;
            margin: 0;
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .empty {
            color: #999;
            font-size: 14px;
            padding: 16px;
        }

        .error {
            color: #ff3b30;
            padding: 16px;
            background: #fff5f5;
            border-radius: 8px;
        }
    </style>
</head>
<body>
<header>
    <h1>🔑 방탈출 예약</h1>
    <a href="my-reservations.html">내 예약 →</a>
</header>
<main>
    <section>
        <h2>지난 일주일 인기 테마 <span class="badge">HOT</span></h2>
        <div id="popular" class="grid"></div>
    </section>
    <section>
        <h2>전체 테마</h2>
        <div id="themes" class="grid"></div>
    </section>
</main>

<script>
    function themeCard(theme, count) {
        const link = `reservation.html?themeId=${theme.id}`;
        const countBadge = count !== undefined
            ? `<span class="count">${count}건 예약</span>`
            : '';
        return `
            <a class="card" href="${link}">
                <img class="card-img" src="${theme.thumbnailUrl}"
                     onerror="this.style.background='#e0e0e0'; this.removeAttribute('src');"
                     alt="${theme.name}">
                <div class="card-body">
                    <p class="card-name">
                        <span>${theme.name}</span>
                        ${countBadge}
                    </p>
                    <p class="card-desc">${theme.description}</p>
                </div>
            </a>
        `;
    }

    async function loadPopular() {
        const container = document.getElementById('popular');
        try {
            const res = await fetch('/user/themes/popular');
            if (!res.ok) throw new Error(res.status);
            const items = await res.json();
            if (items.length === 0) {
                container.innerHTML = '<p class="empty">최근 1주일 동안 예약된 테마가 없습니다.</p>';
                return;
            }
            container.innerHTML = items.map(p => themeCard(p, p.reservationCount)).join('');
        } catch (e) {
            container.innerHTML = `<p class="error">인기 테마를 불러오지 못했습니다.</p>`;
        }
    }

    async function loadThemes() {
        const container = document.getElementById('themes');
        try {
            const res = await fetch('/user/themes');
            if (!res.ok) throw new Error(res.status);
            const items = await res.json();
            if (items.length === 0) {
                container.innerHTML = '<p class="empty">등록된 테마가 없습니다.</p>';
                return;
            }
            container.innerHTML = items.map(t => themeCard(t)).join('');
        } catch (e) {
            container.innerHTML = `<p class="error">테마 목록을 불러오지 못했습니다.</p>`;
        }
    }

    loadPopular();
    loadThemes();
</script>
</body>
</html>
