<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방탈출 예약</title>
    <style>
        :root {
            --bg: #f6f9fc;
            --panel: #ffffff;
            --line: #e5edf5;
            --text: #191f28;
            --muted: #8b95a1;
            --primary: #3182f6;
            --primary-strong: #1b64da;
            --soft: #eef5ff;
            --success-bg: #effaf3;
            --success-text: #1f8f55;
            --error-bg: #fff2f2;
            --error-text: #d14343;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Pretendard", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(49, 130, 246, 0.10), transparent 28%),
                linear-gradient(180deg, #f9fbff 0%, var(--bg) 38%, #f3f6fb 100%);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            max-width: 1120px; margin: 24px auto 0; padding: 34px 32px 28px;
            border-radius: 30px; background: linear-gradient(135deg, #ffffff 0%, #f3f8ff 100%);
            box-shadow: var(--shadow); text-align: left;
            position: relative;
        }
        header h1 { font-size: 2.3rem; line-height: 1.2; letter-spacing: -0.04em; }
        header p { margin-top: 10px; color: #5f6b7a; font-size: 1rem; }

        .topbar {
            position: absolute; top: 20px; right: 22px;
            display: flex; gap: 8px; align-items: center;
            background: rgba(255, 255, 255, 0.88); padding: 6px; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
            border: 1px solid rgba(229, 237, 245, 0.95); border-radius: 999px; backdrop-filter: blur(14px);
        }
        .topbar a {
            text-decoration: none; padding: 8px 12px; border-radius: 999px;
            border: 1px solid transparent; color: #4e5968; background: transparent; font-weight: 700; font-size: 0.83rem; transition: all 0.2s;
        }
        .topbar a.active, .topbar a:hover {
            background: var(--soft); border-color: #d9e8ff; color: var(--primary-strong);
        }

        nav {
            max-width: 1120px; margin: 16px auto 0; display: flex; justify-content: flex-start; gap: 10px; flex-wrap: wrap;
            background: transparent; padding: 0 4px;
        }
        nav button {
            padding: 12px 18px; border: 1px solid transparent; border-radius: 16px;
            background: transparent; color: #6b7684; cursor: pointer; font-size: 0.95rem; font-weight: 700;
            transition: all 0.2s;
        }
        nav button:hover, nav button.active {
            background: var(--panel); color: var(--primary-strong); box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
            border-color: var(--line);
        }

        .container { max-width: 1120px; margin: 24px auto 40px; padding: 0 16px; }

        .section { display: none; }
        .section.active { display: block; }

        .card {
            background: var(--panel); border-radius: 28px; padding: 28px;
            margin-bottom: 18px; box-shadow: var(--shadow); border: 1px solid rgba(229, 237, 245, 0.88);
        }
        .card h3 { margin-bottom: 10px; color: var(--text); font-size: 1.45rem; letter-spacing: -0.03em; }
        .card p { color: #6b7684; font-size: 0.98rem; line-height: 1.6; }

        .theme-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px;
        }
        .theme-card {
            background: var(--panel); border-radius: 24px; overflow: hidden;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06); transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(229, 237, 245, 0.9);
        }
        .theme-card:hover { transform: translateY(-6px); box-shadow: 0 22px 36px rgba(15, 23, 42, 0.09); }
        .theme-card img {
            width: 100%; height: 190px; object-fit: cover; background: #dfe9f5;
        }
        .theme-card .info { padding: 20px; }
        .theme-card .info h3 { font-size: 1.12rem; margin-bottom: 6px; }
        .theme-card .info p { font-size: 0.92rem; color: #6b7684; line-height: 1.55; }

        .rank-badge {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--soft); color: var(--primary-strong); width: 30px; height: 30px;
            border-radius: 12px; font-weight: 800; font-size: 0.85rem;
            flex-shrink: 0; margin-right: 8px;
        }
        .theme-card .info .title-row {
            display: flex; align-items: center; margin-bottom: 6px;
        }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.95rem; color: #4e5968; }
        .form-group input, .form-group select {
            width: 100%; padding: 15px 16px; border: 1px solid var(--line); border-radius: 18px;
            font-size: 0.95rem; background: #fbfdff; color: var(--text);
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.12); background: white;
        }

        .time-slots { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px; }
        .time-slot {
            padding: 14px 18px; border: 1px solid #dbe7f3; border-radius: 18px;
            background: #fbfdff; cursor: pointer; font-size: 0.95rem; font-weight: 700; color: #4e5968; transition: all 0.2s;
        }
        .time-slot:hover, .time-slot.selected {
            background: var(--soft); color: var(--primary-strong); border-color: #cfe0ff;
        }
        .time-slot.unavailable {
            border-color: #edf2f7; color: #b0b8c1; cursor: not-allowed; text-decoration: line-through; background: #f8fafc;
        }

        .btn-primary {
            padding: 16px 24px; background: var(--primary); color: white; border: none;
            border-radius: 18px; font-size: 1rem; font-weight: 800; cursor: pointer; transition: background 0.2s, transform 0.2s;
            min-width: 180px;
        }
        .btn-primary:hover { background: var(--primary-strong); transform: translateY(-1px); }
        .btn-primary:disabled { background: #c9d3df; cursor: not-allowed; transform: none; }

        .message {
            padding: 14px 16px; border-radius: 16px; margin-top: 18px; display: none; font-weight: 600;
        }
        .message.success { display: block; background: var(--success-bg); color: var(--success-text); border: 1px solid #ccefd8; }
        .message.error { display: block; background: var(--error-bg); color: var(--error-text); border: 1px solid #ffd6d6; }

        .empty { text-align: center; padding: 42px 20px; color: var(--muted); font-size: 0.96rem; }

        @media (max-width: 768px) {
            header { margin: 16px 16px 0; padding: 28px 22px 24px; border-radius: 24px; }
            header h1 { font-size: 1.9rem; }
            .topbar { top: 16px; right: 16px; }
            nav { margin-left: 16px; margin-right: 16px; }
            .card { padding: 22px; border-radius: 24px; }
            .theme-grid { grid-template-columns: 1fr; }
            .btn-primary { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <div class="topbar">
        <a href="/" class="active">사용자</a>
        <a href="/admin.html">관리자</a>
    </div>
    <h1>방탈출 예약</h1>
    <p>테마를 고르고, 탈출에 도전하세요!</p>
</header>

<nav>
    <button class="active" onclick="showSection('popular')">인기 테마</button>
    <button onclick="showSection('themes')">전체 테마</button>
    <button onclick="showSection('reservation')">예약하기</button>
</nav>

<div class="container">

    <div id="popular" class="section active">
        <div class="card">
            <h3>인기 테마</h3>
            <p>최근 7일간 예약이 가장 많았던 테마 TOP 10</p>
        </div>
        <div id="popular-grid" class="theme-grid"></div>
    </div>

    <div id="themes" class="section">
        <div class="card">
            <h3>전체 테마</h3>
            <p>운영 중인 모든 방탈출 테마를 확인하세요</p>
        </div>
        <div id="themes-grid" class="theme-grid"></div>
    </div>

    <div id="reservation" class="section">
        <div class="card">
            <h3>예약하기</h3>

            <div class="form-group">
                <label for="res-name">이름</label>
                <input type="text" id="res-name" placeholder="2~10자" minlength="2" maxlength="10">
            </div>

            <div class="form-group">
                <label for="res-date">날짜</label>
                <input type="date" id="res-date">
            </div>

            <div class="form-group">
                <label for="res-theme">테마</label>
                <select id="res-theme">
                    <option value="">-- 테마를 선택하세요 --</option>
                </select>
            </div>

            <div class="form-group">
                <label>예약 가능 시간</label>
                <div id="time-slots" class="time-slots">
                    <p class="empty">날짜와 테마를 먼저 선택해주세요</p>
                </div>
            </div>

            <button class="btn-primary" id="btn-reserve" onclick="makeReservation()" disabled>예약하기</button>

            <div id="res-message" class="message"></div>
        </div>
    </div>
</div>

<script>
    let selectedTimeId = null;

    const THEME_STYLES = [
        { keywords: ['공포', '귀신', '폐', '요람', '비명', '악몽'], palette: ['#111827', '#7f1d1d'], accent: 'MIDNIGHT HORROR' },
        { keywords: ['추리', '탐정', '미스터리', '사건', '단서'], palette: ['#1f2937', '#1d4ed8'], accent: 'MYSTERY CASE' },
        { keywords: ['우주', '행성', '은하', '미래', '실험'], palette: ['#0f172a', '#2563eb'], accent: 'SPACE MISSION' },
        { keywords: ['학교', '교실', '캠퍼스', '동아리'], palette: ['#1e3a8a', '#0f766e'], accent: 'CAMPUS QUEST' },
        { keywords: ['감옥', '탈옥', '도둑', '루팡'], palette: ['#312e81', '#7c3aed'], accent: 'ESCAPE OPERATION' },
        { keywords: ['동화', '숲', '마법', '성'], palette: ['#14532d', '#059669'], accent: 'FAIRY FOREST' }
    ];

    function extractTimeList(payload) {
        if (Array.isArray(payload)) return payload;
        if (Array.isArray(payload?.times)) return payload.times;
        if (Array.isArray(payload?.availableTimes)) return payload.availableTimes;
        if (Array.isArray(payload?.data)) return payload.data;
        return null;
    }

    function getThemeVisualStyle(theme) {
        const text = `${theme.name || ''} ${theme.description || ''}`;
        return THEME_STYLES.find((style) => style.keywords.some((keyword) => text.includes(keyword)))
            || { palette: ['#0f172a', '#3182f6'], accent: 'ROOM ESCAPE' };
    }

    function createThemePlaceholder(theme) {
        const style = getThemeVisualStyle(theme);
        const [start, end] = style.palette;
        const title = (theme.name || 'ESCAPE ROOM').slice(0, 20);
        const subtitle = (theme.description || style.accent).slice(0, 34);
        const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400">
                <defs>
                    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="${start}" />
                        <stop offset="100%" stop-color="${end}" />
                    </linearGradient>
                </defs>
                <rect width="640" height="400" rx="32" fill="url(#bg)" />
                <circle cx="560" cy="78" r="72" fill="rgba(255,255,255,0.12)" />
                <circle cx="102" cy="336" r="88" fill="rgba(255,255,255,0.08)" />
                <text x="48" y="84" fill="rgba(255,255,255,0.72)" font-size="24" font-family="Pretendard, Segoe UI, sans-serif" font-weight="700">${style.accent}</text>
                <text x="48" y="228" fill="#ffffff" font-size="44" font-family="Pretendard, Segoe UI, sans-serif" font-weight="800">${title}</text>
                <text x="48" y="274" fill="rgba(255,255,255,0.82)" font-size="22" font-family="Pretendard, Segoe UI, sans-serif">${subtitle}</text>
            </svg>
        `;
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function resolveThemeImage(theme) {
        return theme.url && theme.url.trim() ? theme.url : createThemePlaceholder(theme);
    }

    function handleThemeImageError(img, theme) {
        img.onerror = null;
        img.src = createThemePlaceholder(theme);
    }

    function getTimeId(time) {
        return time.id ?? time.timeId;
    }

    function getTimeLabel(time) {
        return time.startAt ?? time.start_at ?? time.time ?? time.startTime ?? '';
    }

    async function fetchAvailableTimes(themeId, date) {
        const urls = [
            `/times?${new URLSearchParams({ themeId, date }).toString()}`,
            `/times/${themeId}?${new URLSearchParams({ date }).toString()}`,
            `/themes/${themeId}/times?${new URLSearchParams({ date }).toString()}`
        ];

        for (const url of urls) {
            try {
                const res = await fetch(url);
                if (!res.ok) {
                    continue;
                }

                const payload = await res.json();
                const times = extractTimeList(payload);
                if (times) {
                    return times;
                }
            } catch (e) {
                // try the next known API shape
            }
        }

        throw new Error('failed to load available times');
    }

    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');

        if (id === 'popular') loadPopularThemes();
        if (id === 'themes') loadAllThemes();
        if (id === 'reservation') loadThemeOptions();
    }

    function renderThemeCard(theme, rank) {
        const card = document.createElement('div');
        card.className = 'theme-card';
        card.innerHTML = `
            <img src="${resolveThemeImage(theme)}" alt="${theme.name}">
            <div class="info">
                <div class="title-row">
                    ${rank ? `<span class="rank-badge">${rank}</span>` : ''}
                    <h3>${theme.name}</h3>
                </div>
                <p>${theme.description || ''}</p>
            </div>
        `;
        const image = card.querySelector('img');
        image.addEventListener('error', () => handleThemeImageError(image, theme));
        return card;
    }

    async function loadPopularThemes() {
        const grid = document.getElementById('popular-grid');
        grid.innerHTML = '';
        try {
            const res = await fetch('/themes/ranks');
            const themes = await res.json();
            if (themes.length === 0) {
                grid.innerHTML = '<p class="empty">아직 인기 테마가 없습니다</p>';
                return;
            }
            themes.forEach((theme, i) => grid.appendChild(renderThemeCard(theme, i + 1)));
        } catch (e) {
            grid.innerHTML = '<p class="empty">테마를 불러오지 못했습니다</p>';
        }
    }

    async function loadAllThemes() {
        const grid = document.getElementById('themes-grid');
        grid.innerHTML = '';
        try {
            const res = await fetch('/themes');
            const themes = await res.json();
            if (themes.length === 0) {
                grid.innerHTML = '<p class="empty">등록된 테마가 없습니다</p>';
                return;
            }
            themes.forEach(theme => grid.appendChild(renderThemeCard(theme)));
        } catch (e) {
            grid.innerHTML = '<p class="empty">테마를 불러오지 못했습니다</p>';
        }
    }

    async function loadThemeOptions() {
        const select = document.getElementById('res-theme');
        const current = select.value;
        select.innerHTML = '<option value="">-- 테마를 선택하세요 --</option>';
        try {
            const themes = await fetchThemes();
            themes.forEach(theme => {
                const opt = document.createElement('option');
                opt.value = theme.id;
                opt.textContent = theme.name;
                select.appendChild(opt);
            });
            if (current) select.value = current;
        } catch (e) { /* ignore */ }
    }

    async function fetchThemes() {
        const res = await fetch('/themes');
        if (!res.ok) {
            throw new Error('failed to load themes');
        }
        return res.json();
    }

    async function loadAvailableTimes() {
        const date = document.getElementById('res-date').value;
        const themeId = document.getElementById('res-theme').value;
        const container = document.getElementById('time-slots');
        selectedTimeId = null;
        document.getElementById('btn-reserve').disabled = true;

        if (!date || !themeId) {
            container.innerHTML = '<p class="empty">날짜와 테마를 먼저 선택해주세요</p>';
            return;
        }

        try {
            const times = await fetchAvailableTimes(themeId, date);

            if (times.length === 0) {
                container.innerHTML = '<p class="empty">예약 가능한 시간이 없습니다</p>';
                return;
            }
            container.innerHTML = '';
            times.forEach(time => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'time-slot';
                btn.textContent = getTimeLabel(time);
                btn.onclick = () => selectTime(getTimeId(time), btn);
                container.appendChild(btn);
            });
        } catch (e) {
            container.innerHTML = '<p class="empty">시간을 불러오지 못했습니다</p>';
        }
    }

    function selectTime(timeId, btn) {
        document.querySelectorAll('.time-slot').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTimeId = timeId;
        document.getElementById('btn-reserve').disabled = false;
    }

    async function makeReservation() {
        const name = document.getElementById('res-name').value.trim();
        const date = document.getElementById('res-date').value;
        const themeId = document.getElementById('res-theme').value;
        const msgEl = document.getElementById('res-message');

        msgEl.className = 'message';
        msgEl.style.display = 'none';

        if (!name || name.length < 2 || name.length > 10) {
            showMessage(msgEl, 'error', '이름은 2자 이상 10자 이하로 입력해주세요.');
            return;
        }
        if (!date || !themeId || !selectedTimeId) {
            showMessage(msgEl, 'error', '모든 항목을 입력해주세요.');
            return;
        }

        try {
            const res = await fetch('/reservations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, date, timeId: selectedTimeId, themeId: Number(themeId) })
            });

            if (res.ok) {
                showMessage(msgEl, 'success', `"${name}"님의 ${date} 예약이 완료되었습니다!`);
                selectedTimeId = null;
                document.getElementById('btn-reserve').disabled = true;
                loadAvailableTimes();
            } else {
                const text = await res.text();
                showMessage(msgEl, 'error', text || '예약에 실패했습니다.');
            }
        } catch (e) {
            showMessage(msgEl, 'error', '네트워크 오류가 발생했습니다. 다시 시도해주세요.');
        }
    }

    function showMessage(el, type, text) {
        el.className = `message ${type}`;
        el.textContent = text;
        el.style.display = 'block';
    }

    document.getElementById('res-date').addEventListener('change', loadAvailableTimes);
    document.getElementById('res-theme').addEventListener('change', loadAvailableTimes);

    document.getElementById('res-date').min = new Date().toISOString().split('T')[0];

    loadPopularThemes();
</script>

</body>
</html>
