<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>룸이스케이프 예약</title>
  <link rel="stylesheet" href="/css/user.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <h1 class="logo">Room Escape</h1>
      <nav class="header-nav">
        <a href="/index.html" class="nav-link active" id="nav-booking">예약</a>
        <a href="#" class="nav-link" id="nav-my">내 예약</a>
        <a href="/admin.html" class="nav-link">관리자</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <section class="popular-section" aria-labelledby="popular-title">
      <h2 id="popular-title" class="section-title">이번 주 인기 테마</h2>
      <p class="section-desc">최근 일주일 예약이 많았던 테마입니다.</p>
      <div id="popular-list" class="popular-strip"></div>
    </section>

    <section class="booking-section" aria-labelledby="booking-title">
      <h2 id="booking-title" class="section-title">예약하기</h2>
      <ol class="steps" aria-label="예약 단계">
        <li class="steps__item" data-step-indicator="1">테마 선택</li>
        <li class="steps__item" data-step-indicator="2">날짜 선택</li>
        <li class="steps__item" data-step-indicator="3">시간 · 이름</li>
      </ol>

      <div id="step-1" class="step-panel" data-step="1">
        <p class="panel-hint">원하는 테마 카드를 눌러 주세요.</p>
        <div id="theme-grid" class="theme-grid"></div>
      </div>

      <div id="step-2" class="step-panel is-hidden" data-step="2">
        <div class="step-toolbar">
          <button type="button" id="btn-back-to-themes" class="btn btn--ghost">← 테마 다시 선택</button>
          <p class="selected-theme-label">선택 테마: <strong id="selected-theme-name">—</strong></p>
        </div>
        <p class="panel-hint">예약 가능한 날짜만 선택할 수 있습니다.</p>
        <div id="calendar-loading" class="loading is-hidden">예약 가능한 날짜를 불러오는 중…</div>
        <div id="calendar-root" class="calendar"></div>
      </div>

      <div id="step-3" class="step-panel is-hidden" data-step="3">
        <div class="step-toolbar">
          <button type="button" id="btn-back-to-calendar" class="btn btn--ghost">← 날짜 변경</button>
        </div>
        <p class="summary-line">
          <span id="summary-theme">—</span>
          · <span id="summary-date">—</span>
        </p>
        <form id="reserve-form" class="reserve-form">
          <label class="field">
            <span class="field__label">시간</span>
            <select id="time-select" name="timeId" required></select>
          </label>
          <label class="field">
            <span class="field__label">예약자 이름</span>
            <input type="text" id="name-input" name="name" required autocomplete="name" />
          </label>
          <button type="submit" class="btn btn--primary">예약 완료</button>
        </form>
        <p id="reserve-message" class="message" role="status"></p>
      </div>
    </section>

    <!-- 내 예약 섹션 -->
    <section id="my-reservation-section" class="my-reservation-section is-hidden" aria-labelledby="my-res-title">
      <h2 id="my-res-title" class="section-title">내 예약</h2>
      <p class="section-desc">예약자 이름으로 예약 내역을 확인하고 변경하거나 취소할 수 있습니다.</p>

      <form id="my-search-form" class="my-search-form">
        <div class="my-search-row">
          <div class="field">
            <label class="field__label" for="my-name-input">예약자 이름</label>
            <input type="text" id="my-name-input" placeholder="홍길동" required autocomplete="name" />
          </div>
          <button type="submit" class="btn btn--primary">조회</button>
        </div>
        <p id="my-search-msg" class="message" role="status"></p>
      </form>

      <div id="my-result-area" class="my-result-area is-hidden">
        <div class="my-card">
          <div class="my-card__badge">예약 확인됨</div>
          <div class="my-card__grid">
            <div class="my-card__field">
              <span class="my-card__label">예약자</span>
              <span class="my-card__value" id="my-res-name">—</span>
            </div>
            <div class="my-card__field">
              <span class="my-card__label">테마</span>
              <span class="my-card__value" id="my-res-theme">—</span>
            </div>
            <div class="my-card__field">
              <span class="my-card__label">날짜</span>
              <span class="my-card__value" id="my-res-date">—</span>
            </div>
            <div class="my-card__field">
              <span class="my-card__label">시간</span>
              <span class="my-card__value" id="my-res-time">—</span>
            </div>
          </div>
          <div class="my-card__actions">
            <button type="button" class="btn btn--ghost" id="my-btn-edit">날짜·시간 변경</button>
            <button type="button" class="btn my-btn-danger" id="my-btn-cancel">예약 취소</button>
          </div>
        </div>

        <div id="my-edit-panel" class="my-edit-panel is-hidden">
          <h3 class="my-edit-title">날짜·시간 변경</h3>
          <form id="my-edit-form" class="my-edit-form">
            <div class="field">
              <label class="field__label" for="my-edit-date">날짜</label>
              <input type="date" id="my-edit-date" required />
            </div>
            <div class="field">
              <label class="field__label" for="my-edit-time">시간</label>
              <select id="my-edit-time" required></select>
            </div>
            <div class="my-edit-actions">
              <button type="submit" class="btn btn--primary">변경 완료</button>
              <button type="button" class="btn btn--ghost" id="my-btn-edit-cancel">취소</button>
            </div>
          </form>
          <p id="my-edit-msg" class="message" role="status"></p>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <small>Room Escape · 예약 데모</small>
  </footer>

  <script src="/js/user.js" defer></script>
</body>
</html>
