<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Roomescape</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="/styles.css" rel="stylesheet" />
</head>
<body>

<nav class="navbar">
  <a class="nav-logo" href="/">// ROOMESCAPE</a>
  <div class="nav-actions">
    <a class="nav-btn" href="/my-reservations.html">🔍 예약 조회</a>
    <a class="nav-btn primary-btn" href="/admin/index.html">⌘ 관리자</a>
  </div>
</nav>

<main class="page" style="padding-top: 0;">

  <header class="hero">
    <p class="eyebrow">// Roomescape · Booking</p>
    <h1>방을 고르고, 시간을 잡아라.</h1>
    <p>테마를 선택하면 날짜·시간 예약 페이지로 이동한다.</p>
  </header>

  <section class="panel">
    <div class="section-header">
      <div>
        <h2>전체 테마</h2>
        <p class="panel-sub" style="margin-bottom:0;">카드를 클릭하면 예약 페이지로 이동한다.</p>
      </div>
    </div>
    <div class="theme-grid" id="themeGrid">
      <p class="chip-empty">불러오는 중…</p>
    </div>
  </section>

  <section class="panel">
    <div class="section-header">
      <div>
        <h2>이번 주 인기 테마</h2>
        <p class="panel-sub" style="margin-bottom:0;">최근 7일 예약 수 기준.</p>
      </div>
      <div class="actions">
        <button class="ghost" id="refreshPopular" type="button">새로고침</button>
      </div>
    </div>
    <ol class="rank-list" id="popularThemes">
      <li><span class="rank-name muted">불러오는 중…</span></li>
    </ol>
  </section>

  <p class="message" id="message"></p>
</main>

<script src="/home.js"></script>
</body>
</html>
