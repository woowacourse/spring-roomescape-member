<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방탈출 예약</title>
    <style>
        :root {
            --bg: #171717;
            --surface: #f7f0e6;
            --surface-soft: #eee4d6;
            --text: #241f1a;
            --muted: #766b5c;
            --line: #d7c6ae;
            --accent: #9f2f24;
            --accent-strong: #6f2019;
            --accent-soft: #f2d7c6;
            --success: #2f704a;
            --success-soft: #e6f1e5;
            --danger: #9f2f24;
            --danger-soft: #f7ded5;
            --shadow: 0 24px 50px rgba(12, 10, 8, 0.26);
            --shadow-hover: 0 18px 34px rgba(111, 32, 25, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            font-family: "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
            background:
                    linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
                    radial-gradient(circle at 14% 12%, rgba(159, 47, 36, 0.28), transparent 24%),
                    radial-gradient(circle at 82% 18%, rgba(215, 198, 174, 0.12), transparent 26%),
                    linear-gradient(145deg, #101010 0%, #1e1b19 42%, #25201c 100%);
            background-size: 34px 34px, 34px 34px, auto, auto, auto;
        }

        button,
        input {
            font: inherit;
        }

        .page {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 40px 0 56px;
            animation: pageIn 360ms ease both;
        }

        .topbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 24px;
        }

        .title {
            margin: 0;
            font-size: 2rem;
            line-height: 1.2;
            letter-spacing: -0.02em;
            color: #f7f0e6;
        }

        .subtitle {
            margin: 8px 0 0;
            color: #cbbba5;
            line-height: 1.6;
        }

        .status {
            min-width: 260px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(247, 240, 230, 0.95);
            color: var(--muted);
            line-height: 1.5;
            box-shadow: 0 8px 22px rgba(31, 41, 51, 0.05);
            transition: background 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease;
        }

        .status.bump {
            animation: statusBump 260ms ease;
        }

        .status[data-tone="success"] {
            border-color: #b8d8bf;
            background: var(--success-soft);
            color: var(--success);
        }

        .status[data-tone="error"] {
            border-color: #e5b5a9;
            background: var(--danger-soft);
            color: var(--danger);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 360px;
            gap: 20px;
            align-items: start;
        }

        .section {
            border: 1px solid var(--line);
            border-radius: 10px;
            background: var(--surface);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: box-shadow 180ms ease, transform 180ms ease;
            position: relative;
        }

        .section::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                    linear-gradient(90deg, rgba(159, 47, 36, 0.08), transparent 18%),
                    linear-gradient(180deg, rgba(255, 255, 255, 0.3), transparent 42%);
        }

        .section:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 46px rgba(31, 41, 51, 0.12);
        }

        .section-header {
            padding: 20px 22px;
            border-bottom: 1px solid var(--line);
            background:
                    linear-gradient(180deg, #fff8ee, #f3e8d8);
            position: relative;
        }

        .section-title {
            margin: 0;
            font-size: 1.15rem;
            letter-spacing: -0.01em;
        }

        .section-copy {
            margin: 6px 0 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .theme-list {
            display: grid;
            gap: 0;
        }

        .theme-card {
            width: 100%;
            padding: 18px 22px;
            border: 0;
            border-bottom: 1px solid var(--line);
            background: rgba(247, 240, 230, 0.9);
            text-align: left;
            cursor: pointer;
            transition: background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
            animation: itemIn 220ms ease both;
            position: relative;
        }

        .theme-card:last-child {
            border-bottom: 0;
        }

        .theme-card:hover {
            background: #fff7eb;
            transform: translateX(2px);
        }

        .theme-card.selected {
            background: var(--accent-soft);
            box-shadow: inset 5px 0 0 var(--accent);
        }

        .theme-card strong {
            display: block;
            font-size: 1rem;
        }

        .theme-card p {
            margin: 6px 0 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .theme-meta {
            margin-top: 10px;
            color: var(--accent);
            font-size: 0.88rem;
        }

        .form {
            padding: 20px 22px 22px;
        }

        .field {
            display: grid;
            gap: 7px;
            margin-bottom: 16px;
        }

        .field label {
            color: var(--muted);
            font-size: 0.9rem;
            font-weight: 700;
        }

        .field input {
            width: 100%;
            height: 44px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fffaf2;
            color: var(--text);
            transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
        }

        .field input:focus {
            outline: 2px solid rgba(159, 47, 36, 0.18);
            border-color: var(--accent);
            box-shadow: 0 8px 18px rgba(111, 32, 25, 0.12);
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .button {
            height: 44px;
            border: 0;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, opacity 160ms ease;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: var(--shadow-hover);
        }

        .button:active:not(:disabled) {
            transform: translateY(0);
        }

        .button.primary {
            background: linear-gradient(135deg, #b43b2e, var(--accent-strong));
            color: #fff;
        }

        .button.secondary {
            background: #e5d7c5;
            color: var(--text);
        }

        .button:disabled {
            cursor: not-allowed;
            opacity: 0.48;
        }

        .summary {
            display: grid;
            gap: 10px;
            margin-top: 18px;
            padding: 14px;
            border-radius: 8px;
            background: var(--surface-soft);
            border: 1px solid rgba(215, 198, 174, 0.85);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            color: var(--muted);
        }

        .summary-row strong {
            color: var(--text);
            text-align: right;
        }

        .time-area {
            margin-top: 18px;
        }

        .time-title {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            color: var(--muted);
            font-size: 0.92rem;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .time-slot {
            min-height: 72px;
            padding: 13px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff8ee;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease, transform 160ms ease;
            animation: itemIn 220ms ease both;
        }

        .time-slot:hover:not(:disabled) {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .time-slot.selected {
            border-color: var(--accent);
            background: var(--accent-soft);
            box-shadow: inset 0 0 0 1px rgba(159, 47, 36, 0.18);
        }

        .time-slot:disabled {
            cursor: not-allowed;
            background: #e6ded2;
            color: #9b8c7b;
        }

        .time-slot strong {
            display: block;
            font-size: 1.05rem;
        }

        .time-slot small {
            display: inline-block;
            margin-top: 6px;
            font-size: 0.82rem;
        }

        .time-slot small.available {
            color: var(--success);
        }

        .time-slot small.booked {
            color: var(--danger);
        }

        .helper,
        .empty {
            margin: 14px 0 0;
            color: var(--muted);
            line-height: 1.55;
        }

        .skeleton {
            height: 82px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(90deg, #e9ddce, #fff7eb, #e9ddce);
            background-size: 200% 100%;
            animation: shimmer 1.3s linear infinite;
        }

        .hidden {
            display: none;
        }

        @keyframes shimmer {
            from {
                background-position: 200% 0;
            }
            to {
                background-position: -200% 0;
            }
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes itemIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes statusBump {
            0% {
                transform: translateY(0);
            }
            45% {
                transform: translateY(-2px);
            }
            100% {
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                scroll-behavior: auto !important;
                transition-duration: 1ms !important;
            }
        }

        @media (max-width: 820px) {
            .topbar,
            .layout {
                display: block;
            }

            .status {
                min-width: 0;
                margin-top: 16px;
            }

            .section + .section {
                margin-top: 20px;
            }

            .time-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="page">
    <header class="topbar">
        <div>
            <h1 class="title">방탈출 예약</h1>
            <p class="subtitle">테마와 날짜를 고르고 가능한 시간에 바로 예약하세요.</p>
        </div>
        <div id="statusCard" class="status" data-tone="neutral">
            <span id="statusMessage">테마 목록을 불러오는 중입니다.</span>
        </div>
    </header>

    <section class="layout">
        <section class="section">
            <div class="section-header">
                <h2 class="section-title">테마 선택</h2>
                <p class="section-copy">예약할 테마를 선택하세요.</p>
            </div>
            <div id="themeList" class="theme-list" aria-live="polite">
                <div class="skeleton"></div>
                <div class="skeleton"></div>
                <div class="skeleton"></div>
            </div>
            <p id="themeEmpty" class="empty hidden">등록된 테마가 없습니다.</p>
        </section>

        <section class="section">
            <div class="section-header">
                <h2 class="section-title">예약 정보</h2>
                <p class="section-copy">날짜를 조회한 뒤 시간을 선택하세요.</p>
            </div>

            <div class="form">
                <div class="field">
                    <label for="reservationDate">예약 날짜</label>
                    <input id="reservationDate" type="date" required>
                </div>

                <div class="field">
                    <label for="reservationName">예약자 이름</label>
                    <input id="reservationName" type="text" maxlength="255" placeholder="예: 브라운">
                </div>

                <div class="button-row">
                    <button id="loadTimesButton" class="button secondary" type="button">가능 시간 조회</button>
                    <button id="reserveButton" class="button primary" type="button" disabled>예약하기</button>
                </div>

                <div class="summary" aria-live="polite">
                    <div class="summary-row">
                        <span>테마</span>
                        <strong id="selectedThemeLabel">선택 전</strong>
                    </div>
                    <div class="summary-row">
                        <span>시간</span>
                        <strong id="selectedTimeLabel">선택 전</strong>
                    </div>
                    <div class="summary-row">
                        <span>가능 시간</span>
                        <strong id="selectedAvailabilityLabel">-</strong>
                    </div>
                </div>

                <div class="time-area">
                    <div class="time-title">
                        <span>시간 선택</span>
                        <strong id="availabilityStat">조회 전</strong>
                    </div>
                    <div id="timeGrid" class="time-grid" aria-live="polite"></div>
                    <p id="timeHelper" class="helper">테마와 날짜를 선택한 뒤 가능 시간 조회를 눌러 주세요.</p>
                </div>
            </div>
        </section>
    </section>
</main>

<script>
    const state = {
        themes: [],
        selectedThemeId: null,
        selectedTimeId: null
    };

    const themeList = document.getElementById("themeList");
    const themeEmpty = document.getElementById("themeEmpty");
    const reservationDateInput = document.getElementById("reservationDate");
    const reservationNameInput = document.getElementById("reservationName");
    const loadTimesButton = document.getElementById("loadTimesButton");
    const reserveButton = document.getElementById("reserveButton");
    const timeGrid = document.getElementById("timeGrid");
    const timeHelper = document.getElementById("timeHelper");
    const selectedThemeLabel = document.getElementById("selectedThemeLabel");
    const selectedTimeLabel = document.getElementById("selectedTimeLabel");
    const selectedAvailabilityLabel = document.getElementById("selectedAvailabilityLabel");
    const availabilityStat = document.getElementById("availabilityStat");
    const statusCard = document.getElementById("statusCard");
    const statusMessage = document.getElementById("statusMessage");

    document.addEventListener("DOMContentLoaded", () => {
        reservationDateInput.value = new Date().toISOString().slice(0, 10);
        bindEvents();
        loadThemes();
    });

    function bindEvents() {
        loadTimesButton.addEventListener("click", loadAvailableTimes);
        reserveButton.addEventListener("click", createReservation);

        reservationDateInput.addEventListener("change", () => {
            clearSelectedTime();
            selectedAvailabilityLabel.textContent = "-";
            availabilityStat.textContent = "조회 전";
            setStatus("날짜가 변경되었습니다. 가능 시간을 다시 조회해 주세요.", "neutral");
        });
    }

    async function loadThemes() {
        try {
            const response = await fetch("/api/v1/themes");
            if (!response.ok) {
                throw new Error("테마 목록을 불러오지 못했습니다.");
            }

            const themes = await response.json();
            state.themes = themes;
            renderThemes();

            if (themes.length === 0) {
                setStatus("등록된 테마가 없습니다.", "error");
                return;
            }

            selectTheme(themes[0].id);
            setStatus("테마를 선택하고 가능 시간을 조회해 주세요.", "success");
        } catch (error) {
            themeList.innerHTML = "";
            themeEmpty.classList.remove("hidden");
            setStatus(error.message, "error");
        }
    }

    function renderThemes() {
        themeList.innerHTML = "";

        if (state.themes.length === 0) {
            themeEmpty.classList.remove("hidden");
            return;
        }

        themeEmpty.classList.add("hidden");

        state.themes.forEach((theme) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "theme-card";
            button.dataset.themeId = String(theme.id);
            button.innerHTML = `
                <strong>${escapeHtml(theme.name)}</strong>
                <p>${escapeHtml(theme.description)}</p>
                <div class="theme-meta">테마 번호 ${theme.id}</div>
            `;
            button.addEventListener("click", () => selectTheme(theme.id));
            themeList.appendChild(button);
        });

        syncSelectedThemeCard();
    }

    function selectTheme(themeId) {
        state.selectedThemeId = themeId;
        clearSelectedTime();
        selectedAvailabilityLabel.textContent = "-";
        availabilityStat.textContent = "조회 전";
        syncSelectedThemeCard();

        const theme = state.themes.find((item) => item.id === themeId);
        selectedThemeLabel.textContent = theme ? theme.name : "선택 전";
        setStatus(`"${theme ? theme.name : "테마"}"을 선택했습니다.`, "neutral");
    }

    function syncSelectedThemeCard() {
        themeList.querySelectorAll(".theme-card").forEach((card) => {
            card.classList.toggle("selected", Number(card.dataset.themeId) === state.selectedThemeId);
        });
    }

    async function loadAvailableTimes() {
        if (!state.selectedThemeId) {
            setStatus("먼저 테마를 선택해 주세요.", "error");
            return;
        }

        if (!reservationDateInput.value) {
            setStatus("예약 날짜를 선택해 주세요.", "error");
            return;
        }

        renderTimeLoading();
        clearSelectedTime();
        setStatus("가능 시간을 조회하는 중입니다.", "neutral");

        const searchParams = new URLSearchParams({
            date: reservationDateInput.value,
            themeId: state.selectedThemeId
        });

        try {
            const response = await fetch(`/api/v1/times?${searchParams.toString()}`);
            if (!response.ok) {
                throw new Error("가능 시간을 불러오지 못했습니다.");
            }

            const times = await response.json();
            renderTimeSlots(times);

            const availableCount = times.filter((time) => time.available).length;
            selectedAvailabilityLabel.textContent = `${availableCount}개`;
            availabilityStat.textContent = `${availableCount}/${times.length}`;
            setStatus(`예약 가능한 시간이 ${availableCount}개 있습니다.`, "success");
        } catch (error) {
            timeGrid.innerHTML = "";
            timeHelper.textContent = "시간 정보를 불러오지 못했습니다.";
            selectedAvailabilityLabel.textContent = "-";
            availabilityStat.textContent = "실패";
            setStatus(error.message, "error");
        }
    }

    function renderTimeLoading() {
        timeGrid.innerHTML = "";
        for (let index = 0; index < 4; index += 1) {
            const skeleton = document.createElement("div");
            skeleton.className = "skeleton";
            timeGrid.appendChild(skeleton);
        }
        timeHelper.textContent = "시간 정보를 불러오는 중입니다.";
    }

    function renderTimeSlots(times) {
        timeGrid.innerHTML = "";

        if (times.length === 0) {
            timeHelper.textContent = "등록된 시간이 없습니다.";
            availabilityStat.textContent = "0/0";
            return;
        }

        timeHelper.textContent = "예약 가능한 시간만 선택할 수 있습니다.";

        times.forEach((time) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "time-slot";
            button.disabled = !time.available;
            button.dataset.timeId = String(time.id);
            button.innerHTML = `
                <strong>${escapeHtml(time.time)}</strong>
                <small class="${time.available ? "available" : "booked"}">${time.available ? "예약 가능" : "예약 완료"}</small>
            `;

            if (time.available) {
                button.addEventListener("click", () => selectTime(time));
            }

            timeGrid.appendChild(button);
        });
    }

    function selectTime(time) {
        state.selectedTimeId = time.id;
        selectedTimeLabel.textContent = time.time;
        reserveButton.disabled = false;

        timeGrid.querySelectorAll(".time-slot").forEach((slot) => {
            slot.classList.toggle("selected", Number(slot.dataset.timeId) === time.id);
        });

        setStatus(`${time.time} 시간을 선택했습니다.`, "neutral");
    }

    function clearSelectedTime() {
        state.selectedTimeId = null;
        selectedTimeLabel.textContent = "선택 전";
        reserveButton.disabled = true;

        timeGrid.querySelectorAll(".time-slot").forEach((slot) => {
            slot.classList.remove("selected");
        });
    }

    async function createReservation() {
        const name = reservationNameInput.value.trim();

        if (!state.selectedThemeId) {
            setStatus("테마를 선택해 주세요.", "error");
            return;
        }

        if (!reservationDateInput.value) {
            setStatus("예약 날짜를 선택해 주세요.", "error");
            return;
        }

        if (!state.selectedTimeId) {
            setStatus("예약할 시간을 선택해 주세요.", "error");
            return;
        }

        if (!name) {
            setStatus("예약자 이름을 입력해 주세요.", "error");
            reservationNameInput.focus();
            return;
        }

        reserveButton.disabled = true;
        setStatus("예약을 생성하는 중입니다.", "neutral");

        try {
            const response = await fetch("/api/v1/reservations", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name,
                    date: reservationDateInput.value,
                    timeId: state.selectedTimeId,
                    themeId: state.selectedThemeId
                })
            });

            if (response.status === 409) {
                throw new Error("이미 예약된 시간입니다. 다른 시간을 선택해 주세요.");
            }

            if (!response.ok) {
                throw new Error("예약 생성에 실패했습니다.");
            }

            const createdReservation = await response.json();
            reservationNameInput.value = "";
            setStatus(`예약이 완료되었습니다. 예약 번호는 ${createdReservation.id}입니다.`, "success");
            await loadAvailableTimes();
        } catch (error) {
            reserveButton.disabled = !state.selectedTimeId;
            setStatus(error.message, "error");
        }
    }

    function setStatus(message, tone) {
        statusCard.dataset.tone = tone;
        statusMessage.textContent = message;
        statusCard.classList.remove("bump");
        requestAnimationFrame(() => {
            statusCard.classList.add("bump");
        });
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
    }
</script>
</body>
</html>
