<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테마 관리 · 관리자</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
        }

        header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .logo { font-size: 1.4rem; font-weight: 800; color: #f59e0b; text-decoration: none; }
        .logo .admin-badge {
            background: #ef4444; color: #0f172a; font-size: 0.65rem; font-weight: 800;
            padding: 0.15rem 0.45rem; border-radius: 4px; margin-left: 0.5rem; vertical-align: middle;
        }
        nav a {
            color: #94a3b8; text-decoration: none; margin-left: 1.5rem;
            font-size: 0.875rem; transition: color 0.15s;
        }
        nav a:hover { color: #f1f5f9; }
        nav a.active { color: #f59e0b; font-weight: 700; }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; }
        .section-title {
            font-size: 1rem; font-weight: 600; color: #94a3b8;
            margin-bottom: 1rem;
        }
        section + section { margin-top: 2.5rem; }

        .form-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 1.5rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1.5fr auto;
            gap: 0.75rem;
            align-items: stretch;
        }
        .form-grid input {
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.9rem;
            padding: 0.7rem 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .form-grid input::placeholder { color: #475569; }
        .form-grid input:focus { border-color: #f59e0b; }

        .btn-primary {
            background: #f59e0b;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            padding: 0.7rem 1.4rem;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-primary:hover { background: #d97706; }
        .btn-primary:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }

        .field-error {
            color: #fca5a5;
            font-size: 0.8rem;
            margin-top: 0.6rem;
        }

        .toast {
            border-radius: 10px; padding: 0.85rem 1rem;
            font-size: 0.875rem; margin-bottom: 1.25rem;
        }
        .toast-success { background: #14532d33; border: 1px solid #22c55e55; color: #86efac; }
        .toast-error { background: #7f1d1d33; border: 1px solid #ef444455; color: #fca5a5; }

        /* 테이블 */
        .table-wrap {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.85rem 1rem; font-size: 0.875rem; }
        thead {
            background: #0f172a;
            border-bottom: 1px solid #334155;
        }
        thead th {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        tbody tr {
            border-bottom: 1px solid #334155;
            transition: background 0.15s;
        }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #0f172a44; }

        td.id { color: #64748b; font-family: monospace; }
        td.name { font-weight: 700; }
        td.desc { color: #94a3b8; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        td.thumb { color: #64748b; font-family: monospace; font-size: 0.75rem; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-delete {
            background: transparent;
            border: 1px solid #ef4444aa;
            color: #fca5a5;
            padding: 0.35rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-delete:hover { background: #ef4444; color: #0f172a; }
        .btn-delete:disabled { opacity: 0.5; cursor: not-allowed; }

        .state-msg {
            text-align: center;
            padding: 3rem 1rem;
            color: #475569;
            font-size: 0.95rem;
        }

        /* 모달 */
        .modal-backdrop {
            position: fixed; inset: 0;
            background: #0f172acc;
            backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center;
            z-index: 100; padding: 1rem;
        }
        .modal-backdrop.show { display: flex; }
        .modal {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 14px; width: min(420px, 100%); padding: 1.75rem;
        }
        .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
        .modal p { color: #94a3b8; font-size: 0.9rem; line-height: 1.55; margin-bottom: 1.5rem; }
        .modal p strong { color: #f1f5f9; }
        .modal-actions { display: flex; gap: 0.6rem; justify-content: flex-end; }
        .modal-actions button {
            padding: 0.6rem 1.2rem; border-radius: 8px; border: none;
            font-size: 0.875rem; font-weight: 700; cursor: pointer;
        }
        .btn-secondary { background: #334155; color: #f1f5f9; }
        .btn-secondary:hover { background: #475569; }
        .btn-danger { background: #ef4444; color: #0f172a; }
        .btn-danger:hover { background: #dc2626; }
    </style>
</head>
<body>

<header>
    <a href="/admin/index.html" class="logo">🔐 방탈출 <span class="admin-badge">ADMIN</span></a>
    <nav>
        <a href="/admin/index.html">홈</a>
        <a href="/admin/reservations.html">예약</a>
        <a href="/admin/themes.html" class="active">테마</a>
        <a href="/admin/times.html">시간</a>
        <a href="/">사용자 화면</a>
    </nav>
</header>

<main>
    <h1>🎭 테마 관리</h1>

    <div id="toast"></div>

    <section>
        <div class="section-title">신규 테마 등록</div>
        <div class="form-card">
            <div class="form-grid">
                <input type="text" id="name-input" placeholder="이름" maxlength="50" />
                <input type="text" id="desc-input" placeholder="설명" maxlength="100" />
                <input type="text" id="thumb-input" placeholder="썸네일 URL (필수)" />
                <button class="btn-primary" id="create-btn">등록</button>
            </div>
            <div class="field-error" id="form-error" style="display: none;"></div>
        </div>
    </section>

    <section>
        <div class="section-title">등록된 테마</div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th style="width: 70px;">ID</th>
                        <th style="width: 180px;">이름</th>
                        <th>설명</th>
                        <th style="width: 220px;">썸네일</th>
                        <th style="width: 80px;"></th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="5" class="state-msg">불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<div class="modal-backdrop" id="modal">
    <div class="modal">
        <h3>테마를 삭제하시겠습니까?</h3>
        <p id="modal-text"></p>
        <div class="modal-actions">
            <button class="btn-secondary" id="modal-close">닫기</button>
            <button class="btn-danger" id="modal-confirm">삭제하기</button>
        </div>
    </div>
</div>

<script>
    let pendingTheme = null;
    const $ = (id) => document.getElementById(id);

    function showToast(type, text, ms = 3000) {
        $('toast').innerHTML = `<div class="toast toast-${type}">${text}</div>`;
        if (ms) setTimeout(() => $('toast').innerHTML = '', ms);
    }
    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }
    async function parseError(res) {
        try {
            const body = await res.json();
            if (body.fieldErrors && body.fieldErrors.length) {
                return body.fieldErrors.map(fe => `${fe.field}: ${fe.message}`).join(', ');
            }
            return body.message || '요청에 실패했습니다.';
        } catch {
            return `요청에 실패했습니다 (${res.status})`;
        }
    }

    async function loadThemes() {
        const tbody = $('tbody');
        tbody.innerHTML = '<tr><td colspan="5" class="state-msg">불러오는 중...</td></tr>';
        try {
            const res = await fetch('/themes');
            const themes = await res.json();
            if (themes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="state-msg">등록된 테마가 없습니다.</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            themes.forEach(t => tbody.appendChild(createRow(t)));
        } catch {
            tbody.innerHTML = '<tr><td colspan="5" class="state-msg">불러오기에 실패했습니다.</td></tr>';
        }
    }

    function createRow(t) {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td class="id">#${t.id}</td>
            <td class="name">${escapeHtml(t.name)}</td>
            <td class="desc" title="${escapeHtml(t.description)}">${escapeHtml(t.description)}</td>
            <td class="thumb" title="${escapeHtml(t.thumbnail)}">${escapeHtml(t.thumbnail)}</td>
            <td><button class="btn-delete">삭제</button></td>
        `;
        tr.querySelector('.btn-delete').addEventListener('click', () => openModal(t));
        return tr;
    }

    async function createTheme() {
        const name = $('name-input').value.trim();
        const description = $('desc-input').value.trim();
        const thumbnail = $('thumb-input').value.trim();
        const btn = $('create-btn');

        $('form-error').style.display = 'none';
        btn.disabled = true;
        try {
            const res = await fetch('/admin/themes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, description, thumbnail }),
            });
            if (!res.ok) {
                $('form-error').textContent = await parseError(res);
                $('form-error').style.display = 'block';
                return;
            }
            $('name-input').value = '';
            $('desc-input').value = '';
            $('thumb-input').value = '';
            showToast('success', '테마가 등록되었습니다.');
            await loadThemes();
        } catch {
            showToast('error', '등록에 실패했습니다.');
        } finally {
            btn.disabled = false;
        }
    }

    function openModal(t) {
        pendingTheme = t;
        $('modal-text').innerHTML = `
            <strong>#${t.id}</strong> · ${escapeHtml(t.name)}<br>
            <span style="color: #64748b;">예약이 있는 테마는 삭제할 수 없습니다.</span>
        `;
        $('modal').classList.add('show');
    }
    function closeModal() {
        pendingTheme = null;
        $('modal').classList.remove('show');
    }

    async function confirmDelete() {
        if (!pendingTheme) return;
        const t = pendingTheme;
        const btn = $('modal-confirm');
        btn.disabled = true;
        try {
            const res = await fetch(`/admin/themes/${t.id}`, { method: 'DELETE' });
            if (!res.ok) {
                showToast('error', await parseError(res));
                closeModal();
                return;
            }
            closeModal();
            showToast('success', `#${t.id} 테마가 삭제되었습니다.`);
            await loadThemes();
        } catch {
            showToast('error', '삭제에 실패했습니다.');
            closeModal();
        } finally {
            btn.disabled = false;
        }
    }

    $('create-btn').addEventListener('click', createTheme);
    $('modal-close').addEventListener('click', closeModal);
    $('modal-confirm').addEventListener('click', confirmDelete);
    $('modal').addEventListener('click', (e) => {
        if (e.target.id === 'modal') closeModal();
    });

    loadThemes();
</script>

</body>
</html>
