<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Admin Themes - Roomescape</title>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <p class="eyebrow">ROOMESCAPE ADMIN</p>
      <h1>테마 관리</h1>
      <p><a class="admin-link" href="/admin/index.html">관리자 홈으로 이동</a></p>
    </header>

    <section class="panel">
      <form class="grid-form" id="themeForm">
        <input name="name" placeholder="테마 이름" required />
        <input name="description" placeholder="설명" required />
        <input name="thumbnailUrl" placeholder="썸네일 URL" required type="url" />
        <button type="submit">테마 추가</button>
      </form>
      <div class="cards" id="themes"></div>
    </section>

    <p class="message" id="message"></p>
  </main>
  <script src="/admin/themes.js"></script>
</body>
</html>
