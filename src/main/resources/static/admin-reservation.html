<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 현황 관리 - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --primary-hover: #d97706;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-dark: #09090b;
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
        }

        .nav-header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-glass);
            background: rgba(9,9,11,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-header a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }

        .nav-header a:hover { color: white; }

        .nav-links { display: flex; gap: 1.5rem; }
        .nav-links a.active { color: var(--primary); }

        .container {
            max-width: 1100px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 1.3rem;
            background: var(--primary);
            border-radius: 2px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            width: 100%;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1) sepia(1) saturate(5) hue-rotate(350deg);
            opacity: 0.8;
            cursor: pointer;
        }

        select option {
            background: #1e293b;
            color: white;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }

        button.btn-primary {
            padding: 1rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: var(--bg-dark);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
            font-family: inherit;
            text-transform: uppercase;
            height: 52px;
            width: 100%;
        }

        button.btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(245, 158, 11, 0.5);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            text-align: left;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        th:first-child { border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        th:last-child { border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid var(--border-glass);
            color: white;
            vertical-align: middle;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            box-shadow: none;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-danger:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 800;
            background: rgba(255,255,255,0.1);
            color: var(--text-main);
            border: 1px solid var(--border-glass);
        }

        .theme-badge {
            background: rgba(245, 158, 11, 0.1);
            color: var(--primary);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .pagination button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .pagination button:hover:not(:disabled) {
            background: rgba(245, 158, 11, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination span {
            font-weight: 600;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="/">&larr; 메인</a>
        <div class="nav-links">
            <a href="/admin-reservation.html" class="active">예약 현황</a>
            <a href="/admin-time.html">시간 관리</a>
            <a href="/admin-theme.html">테마 관리</a>
        </div>
    </div>

    <div class="container">
        <h1>RESERVATION STATUS</h1>
        <p class="subtitle">전화 및 현장 방문 예약을 수동으로 추가하고 관리하세요.</p>

        <div class="card">
            <h2>수동 예약 추가</h2>
            <form id="resForm" class="form-grid">
                <div class="form-group">
                    <label>예약자 성함</label>
                    <input type="text" id="nameInput" placeholder="이름 입력" required>
                </div>
                <div class="form-group">
                    <label>예약 날짜</label>
                    <input type="date" id="dateInput" required>
                </div>
                <div class="form-group">
                    <label>테마 선택</label>
                    <select id="themeSelect" required>
                        <option value="">테마를 선택하세요</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>시간 선택</label>
                    <select id="timeSelect" required>
                        <option value="">시간을 선택하세요</option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn-primary">예약 추가</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2>전체 예약 목록</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 60px;">ID</th>
                            <th>예약자</th>
                            <th>날짜</th>
                            <th>테마</th>
                            <th>시간</th>
                            <th style="width: 80px; text-align: center;">작업</th>
                        </tr>
                    </thead>
                    <tbody id="resList">
                        <!-- Reservations will be loaded here -->
                    </tbody>
                </table>
            </div>
            
            <div class="pagination">
                <button id="prevBtn" onclick="prevPage()">이전</button>
                <span id="pageInfo">1 페이지</span>
                <button id="nextBtn" onclick="nextPage()">다음</button>
            </div>
        </div>
    </div>

<script type="module">
    import { fetchThemes, fetchReservationTimes, fetchAdminReservations, createReservation, deleteAdminReservation } from '/js/api.js';
    import { showToast } from '/js/utils.js';

    const resForm = document.getElementById('resForm');
    const themeSelect = document.getElementById('themeSelect');
    const timeSelect = document.getElementById('timeSelect');
    const resList = document.getElementById('resList');

    let currentPage = 0;
    const pageSize = 10;
    let allReservations = [];

    window.prevPage = () => {
        if (currentPage > 0) {
            currentPage--;
            renderReservations();
        }
    };

    window.nextPage = () => {
        if ((currentPage + 1) * pageSize < allReservations.length) {
            currentPage++;
            renderReservations();
        }
    };

    window.deleteRes = async (id) => {
        if (!confirm('정말로 해당 예약을 삭제(취소)하시겠습니까?')) return;
        try {
            await deleteAdminReservation(id);
            showToast('예약이 삭제되었습니다.', 'success');
            loadReservations();
        } catch (e) {
            showToast('삭제에 실패했습니다.', 'error');
        }
    };

    async function init() {
        await Promise.all([loadThemes(), loadTimes(), loadReservations()]);
    }

    async function loadThemes() {
        try {
            const themes = await fetchThemes();
            themes.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.name;
                themeSelect.appendChild(opt);
            });
        } catch (e) {
            console.error('테마 로드 실패', e);
        }
    }

    async function loadTimes() {
        try {
            const times = await fetchReservationTimes();
            times.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t.id;
                opt.textContent = t.startAt;
                timeSelect.appendChild(opt);
            });
        } catch (e) {
            console.error('시간 로드 실패', e);
        }
    }

    async function loadReservations() {
        try {
            let page = 0;
            let rawReservations = [];
            while (true) {
                const items = await fetchAdminReservations(page, 100);
                if (!Array.isArray(items)) break;
                rawReservations = rawReservations.concat(items);
                if (items.length < 100) break;
                page++;
            }
            
            // 프론트엔드 정렬 (최신 날짜, 늦은 시간, 높은 ID 순)
            allReservations = rawReservations.sort((a, b) => {
                if (a.date !== b.date) {
                    return new Date(b.date) - new Date(a.date);
                }
                const timeA = a.time ? a.time.startAt : '';
                const timeB = b.time ? b.time.startAt : '';
                if (timeA !== timeB) {
                    return timeB.localeCompare(timeA);
                }
                return b.id - a.id;
            });
            
            renderReservations();
        } catch (e) {
            console.error('예약 로드 실패', e);
            showToast('예약 목록 로드 실패', 'error');
        }
    }

    function renderReservations() {
        resList.innerHTML = '';
        
        if (allReservations.length === 0) {
            resList.innerHTML = '<tr><td colspan="6" class="empty-state">현재 등록된 예약이 없습니다.</td></tr>';
            document.getElementById('prevBtn').disabled = true;
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('pageInfo').textContent = '1 페이지';
            return;
        }

        const startIndex = currentPage * pageSize;
        const pageData = allReservations.slice(startIndex, startIndex + pageSize);

        pageData.forEach(r => {
            const isCancelled = r.status === 'CANCELLED';
            const tr = document.createElement('tr');
            if (isCancelled) {
                tr.style.opacity = '0.5';
            }
            
            tr.innerHTML = `
                    <td style="color: var(--text-muted);">${r.id}</td>
                    <td style="font-weight: bold; font-size: 1.1rem; ${isCancelled ? 'text-decoration: line-through;' : ''}">${r.name}</td>
                    <td style="${isCancelled ? 'text-decoration: line-through;' : ''}">${r.date}</td>
                    <td><span class="badge theme-badge" style="${isCancelled ? 'background: rgba(255,255,255,0.1); color: #94a3b8; border-color: #333;' : ''}">${r.theme ? r.theme.name : '알수없음'}</span></td>
                    <td><span class="badge" style="${isCancelled ? 'background: rgba(255,255,255,0.1); color: #94a3b8; border-color: #333;' : ''}">${r.time ? r.time.startAt : '알수없음'}</span></td>
                    <td style="text-align: center;">
                        <button class="btn-danger" onclick="deleteRes(${r.id})">삭제</button>
                    </td>
                `;
            resList.appendChild(tr);
        });

        document.getElementById('prevBtn').disabled = currentPage === 0;
        document.getElementById('nextBtn').disabled = (startIndex + pageSize) >= allReservations.length;
        document.getElementById('pageInfo').textContent = `${currentPage + 1} 페이지`;
    }

    resForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            name: document.getElementById('nameInput').value,
            date: document.getElementById('dateInput').value,
            themeId: parseInt(themeSelect.value),
            timeId: parseInt(timeSelect.value)
        };
        try {
            await createReservation(payload);
            showToast('예약이 추가되었습니다.', 'success');
            resForm.reset();
            currentPage = 0;
            loadReservations();
        } catch (e) {
            showToast(e.message || '예약 추가에 실패했습니다. 이미 예약된 시간인지 확인해주세요.', 'error');
        }
    });

    init();
</script>
</body>
</html>
