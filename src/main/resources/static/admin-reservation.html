<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roomescape - 예약 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div id="password-overlay"
     style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center;">
    <div class="card shadow" style="width: 300px;">
        <div class="card-body">
            <h5 class="card-title">관리자 인증</h5>
            <p class="card-text">비밀번호를 입력하세요.</p>
            <input class="form-control mb-3" id="admin-password" onkeyup="if(event.key === 'Enter') checkPassword()"
                   placeholder="비밀번호"
                   type="password">
            <button class="btn btn-primary w-100" onclick="checkPassword()">확인</button>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Roomescape Admin</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">홈</a>
            <a class="nav-link" href="/admin-theme.html">테마 관리</a>
            <a class="nav-link" href="/admin-time.html">시간 관리</a>
            <a class="nav-link active" href="/admin-reservation.html">예약 관리</a>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h2>예약 관리</h2>

    <div class="card my-4 shadow-sm">
        <div class="card-body">
            <h5 class="card-title">새 예약 추가</h5>
            <form class="row g-3" id="reservation-form">
                <div class="col-md-3">
                    <label class="form-label" for="date">날짜</label>
                    <input class="form-control" id="date" required type="date">
                </div>
                <div class="col-md-3">
                    <label class="form-label" for="theme">테마</label>
                    <select class="form-select" id="theme" required>
                        <option disabled selected value="">테마 선택</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label" for="time">시간</label>
                    <select class="form-select" disabled id="time" required>
                        <option disabled selected value="">시간 선택</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label" for="name">예약자</label>
                    <input class="form-control" id="name" placeholder="이름" required type="text">
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100" type="submit">추가하기</button>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-hover mt-4">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>날짜</th>
            <th>시간</th>
            <th>테마</th>
            <th>예약자</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody id="reservation-table-body">
        <!-- 예약 목록 -->
        </tbody>
    </table>
</div>

<script>
    function checkPassword() {
        const password = document.getElementById('admin-password').value;
        if (password === '1234') {
            sessionStorage.setItem('admin-authorized', 'true');
            document.getElementById('password-overlay').style.display = 'none';
        } else {
            alert('비밀번호가 틀렸습니다.');
        }
    }

    if (sessionStorage.getItem('admin-authorized') === 'true') {
        document.getElementById('password-overlay').style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchReservations();
        fetchThemes();
    });

    document.getElementById('date').addEventListener('change', fetchAvailableTimes);
    document.getElementById('theme').addEventListener('change', fetchAvailableTimes);
    document.getElementById('reservation-form').addEventListener('submit', addReservation);

    function fetchReservations() {
        fetch('/reservations')
            .then(response => response.json())
            .then(reservations => {
                const tbody = document.getElementById('reservation-table-body');
                tbody.innerHTML = reservations.map(res => `
                    <tr>
                        <td>${res.id}</td>
                        <td>${res.date}</td>
                        <td>${res.time.startAt}</td>
                        <td>${res.theme.name}</td>
                        <td>${res.name}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteReservation(${res.id})">삭제</button>
                        </td>
                    </tr>
                `).join('');
            });
    }

    function fetchThemes() {
        fetch('/themes')
            .then(response => response.json())
            .then(themes => {
                const select = document.getElementById('theme');
                themes.forEach(theme => {
                    const option = document.createElement('option');
                    option.value = theme.id;
                    option.textContent = theme.name;
                    select.appendChild(option);
                });
            });
    }

    function fetchAvailableTimes() {
        const date = document.getElementById('date').value;
        const themeId = document.getElementById('theme').value;
        const timeSelect = document.getElementById('time');

        if (date && themeId) {
            fetch(`/times?themeId=${themeId}&date=${date}`)
                .then(response => response.json())
                .then(times => {
                    timeSelect.innerHTML = '<option value="" disabled selected>시간 선택</option>';
                    times.forEach(time => {
                        const option = document.createElement('option');
                        option.value = time.id;
                        option.textContent = time.startAt;
                        if (!time.isNotReserved) {
                            option.disabled = true;
                            option.textContent += ' (예약됨)';
                        }
                        timeSelect.appendChild(option);
                    });
                    timeSelect.disabled = false;
                });
        } else {
            timeSelect.disabled = true;
            timeSelect.innerHTML = '<option value="" disabled selected>시간 선택</option>';
        }
    }

    function addReservation(event) {
        event.preventDefault();
        const payload = {
            date: document.getElementById('date').value,
            themeId: document.getElementById('theme').value,
            timeId: document.getElementById('time').value,
            name: document.getElementById('name').value
        };

        fetch('/reservations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) {
                alert('예약이 추가되었습니다.');
                fetchReservations();
                document.getElementById('reservation-form').reset();
                document.getElementById('time').disabled = true;
            } else {
                alert('예약 추가 실패');
            }
        });
    }

    function deleteReservation(id) {
        if (!confirm('정말 취소하시겠습니까?')) return;
        fetch(`/reservations/${id}`, { method: 'DELETE' })
            .then(response => {
                if (response.ok) {
                    alert('예약이 취소되었습니다.');
                    fetchReservations();
                } else {
                    alert('예약 취소 실패');
                }
            });
    }
</script>
</body>
</html>
