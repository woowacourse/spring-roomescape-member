<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roomescape - 예약 관리</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div id="password-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; align-items: center; justify-content: center;">
        <div class="card shadow" style="width: 300px;">
            <div class="card-body">
                <h5 class="card-title">관리자 인증</h5>
                <p class="card-text">비밀번호를 입력하세요.</p>
                <input type="password" id="admin-password" class="form-control mb-3" placeholder="비밀번호" onkeyup="if(event.key === 'Enter') checkPassword()">
                <button onclick="checkPassword()" class="btn btn-primary w-100">확인</button>
            </div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Roomescape Admin</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">홈</a>
                <a class="nav-link" href="/admin-theme.html">테마 관리</a>
                <a class="nav-link" href="/admin-time.html">시간 관리</a>
                <a class="nav-link active" href="/admin-reservation.html">예약 관리</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2>예약 관리</h2>

        <div class="card my-4 shadow-sm">
            <div class="card-body">
                <h5 class="card-title">새 예약 추가</h5>
                <form id="reservation-form" class="row g-3">
                    <div class="col-md-3">
                        <label for="date" class="form-label font-weight-bold">날짜</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label for="theme" class="form-label font-weight-bold">테마</label>
                        <select id="theme" class="form-select" required>
                            <option value="" disabled selected>테마 선택</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="time" class="form-label font-weight-bold">시간</label>
                        <select id="time" class="form-select" required disabled>
                            <option value="" disabled selected>시간 선택</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label for="name" class="form-label font-weight-bold">예약자</label>
                        <input type="text" id="name" class="form-control" placeholder="이름" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">추가하기</button>
                    </div>
                </form>
            </div>
        </div>
        
        <table class="table table-hover mt-4">
            <thead class="table-dark text-center">
                <tr>
                    <th>ID</th>
                    <th>날짜</th>
                    <th>시간</th>
                    <th>테마</th>
                    <th>예약자</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="reservation-table-body">
                <!-- 예약 목록 -->
            </tbody>
        </table>
    </div>

    <!-- 수정 모달 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">예약 정보 수정 (관리자)</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-form" class="row g-3">
                        <input type="hidden" id="edit-id">
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">예약자 이름</label>
                            <input type="text" id="edit-name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">날짜</label>
                            <input type="date" id="edit-date" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">테마</label>
                            <select id="edit-theme" class="form-select" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">시간</label>
                            <select id="edit-time" class="form-select" required></select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary px-4" onclick="updateReservation()">수정 완료</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const editModal = new bootstrap.Modal(document.getElementById('editModal'));
        let currentReservations = [];

        function checkPassword() {
            const password = document.getElementById('admin-password').value;
            if (password === '1234') {
                sessionStorage.setItem('admin-authorized', 'true');
                document.getElementById('password-overlay').style.display = 'none';
            } else {
                alert('비밀번호가 틀렸습니다.');
            }
        }

        if (sessionStorage.getItem('admin-authorized') === 'true') {
            document.getElementById('password-overlay').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            fetchReservations();
            fetchThemes();
        });

        document.getElementById('date').addEventListener('change', () => fetchAvailableTimes('time', 'date', 'theme'));
        document.getElementById('theme').addEventListener('change', () => fetchAvailableTimes('time', 'date', 'theme'));
        document.getElementById('reservation-form').addEventListener('submit', addReservation);

        function formatTime(time) {
            if (Array.isArray(time)) {
                return String(time[0]).padStart(2, '0') + ':' + String(time[1]).padStart(2, '0');
            }
            return time;
        }

        function fetchReservations() {
            fetch('/reservations')
                .then(response => {
                    if (!response.ok) return response.json().then(error => { throw error; });
                    return response.json();
                })
                .then(reservations => {
                    currentReservations = reservations;
                    const tbody = document.getElementById('reservation-table-body');
                    if (reservations.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">예약 내역이 없습니다.</td></tr>';
                        return;
                    }
                    tbody.innerHTML = reservations.map(res => `
                        <tr class="text-center align-middle">
                            <td>${res.id}</td>
                            <td>${res.date}</td>
                            <td>${formatTime(res.time.startAt)}</td>
                            <td>${res.theme.name}</td>
                            <td>${res.name}</td>
                            <td>
                                <button class="btn btn-outline-warning btn-sm me-1" onclick="showEditModal(${res.id})">수정</button>
                                <button class="btn btn-outline-danger btn-sm" onclick="deleteReservation(${res.id})">삭제</button>
                            </td>
                        </tr>
                    `).join('');
                })
                .catch(handleError);
        }

        function showEditModal(id) {
            const res = currentReservations.find(r => r.id === id);
            if (!res) return;

            // 관리자라도 지난 날짜 예약은 수정 불가 (프론트엔드 1차 차단)
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            const localToday = new Date(today - offset).toISOString().slice(0, 10);
            
            if (res.date < localToday) {
                alert('🚫 수정 불가: 지난 날짜의 예약은 수정할 수 없습니다.');
                return;
            }

            document.getElementById('edit-id').value = res.id;
            document.getElementById('edit-name').value = res.name;
            document.getElementById('edit-date').value = res.date;

            // 수정 모달용 테마 및 시간 로드
            fetchThemes('edit-theme')
                .then(() => {
                    document.getElementById('edit-theme').value = res.theme.id;
                    return fetchAvailableTimes('edit-time', 'edit-date', 'edit-theme', res.time.id);
                })
                .then(() => {
                    editModal.show();
                })
                .catch(error => {
                    // fetchAvailableTimes 등에서 발생한 에러 처리 (이미 alert 띄웠을 것이므로 추가 조치 없이 중단만)
                    console.warn('모달 열기 중단:', error);
                });

            // 모달 내 변경 이벤트 바인딩
            document.getElementById('edit-date').onchange = () => fetchAvailableTimes('edit-time', 'edit-date', 'edit-theme').catch(() => {});
            document.getElementById('edit-theme').onchange = () => fetchAvailableTimes('edit-time', 'edit-date', 'edit-theme').catch(() => {});
        }

        function updateReservation() {
            const id = parseInt(document.getElementById('edit-id').value);
            const date = document.getElementById('edit-date').value;
            
            // 최종 수정 전 날짜 한 번 더 검증 (백엔드 update 누락 대응)
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            const localToday = new Date(today - offset).toISOString().slice(0, 10);
            
            if (date < localToday) {
                alert('🚫 수정 불가: 지난 날짜로는 예약을 수정할 수 없습니다.');
                return;
            }

            const payload = {
                name: document.getElementById('edit-name').value,
                date: date,
                themeId: parseInt(document.getElementById('edit-theme').value),
                timeId: parseInt(document.getElementById('edit-time').value)
            };

            fetch(`/reservations/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    alert('✅ 예약이 수정되었습니다.');
                    editModal.hide();
                    fetchReservations();
                } else {
                    return response.json().then(error => { throw error; });
                }
            })
            .catch(handleError);
        }

        function handleError(error) {
            console.error(error);
            const code = error.exceptionCode;
            const message = error.message;

            if (code === 'RESERVATION_ALREADY_EXISTS') {
                alert('⚠️ 중복 예약 불가: 해당 시간에는 이미 예약이 존재합니다.');
            } else if (code === 'PAST_DATE_NOT_ALLOWED') {
                alert('🚫 선택 불가: 지난 날짜는 예약할 수 없습니다.');
            } else if (code === 'RESERVATION_NOT_FOUND') {
                alert('❓ 오류: 존재하지 않는 예약입니다.');
            } else if (code === 'RESERVATION_CANCEL_DEADLINE_PASSED') {
                alert('⏰ 처리 불가: 정책상 변경/삭제가 불가능한 시간입니다.');
            } else {
                alert('❌ 오류 발생: ' + (message || '알 수 없는 오류가 발생했습니다.'));
            }
            throw error; // 다시 던져서 체인 중단
        }

        function fetchThemes(targetId = 'theme') {
            return fetch('/themes')
                .then(response => {
                    if (!response.ok) return response.json().then(error => { throw error; });
                    return response.json();
                })
                .then(themes => {
                    const select = document.getElementById(targetId);
                    select.innerHTML = (targetId === 'theme' ? '<option value="" disabled selected>테마 선택</option>' : '') + 
                        themes.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
                })
                .catch(handleError);
        }

        function fetchAvailableTimes(timeSelectId, dateInputId, themeSelectId, selectedTimeId = null) {
            const date = document.getElementById(dateInputId).value;
            const themeId = document.getElementById(themeSelectId).value;
            const timeSelect = document.getElementById(timeSelectId);

            if (date && themeId) {
                return fetch(`/times?themeId=${themeId}&date=${date}`)
                    .then(response => {
                        if (!response.ok) return response.json().then(error => { throw error; });
                        return response.json();
                    })
                    .then(times => {
                        timeSelect.innerHTML = '<option value="" disabled selected>시간 선택</option>';
                        if (times.length === 0) {
                            timeSelect.innerHTML = '<option disabled>등록된 시간이 없음</option>';
                        } else {
                            times.forEach(time => {
                                const option = document.createElement('option');
                                option.value = time.id;
                                option.textContent = formatTime(time.startAt);
                                if (time.reserved && time.id !== selectedTimeId) {
                                    option.disabled = true;
                                    option.textContent += ' (예약됨)';
                                }
                                if (time.id === selectedTimeId) option.selected = true;
                                timeSelect.appendChild(option);
                            });
                        }
                        timeSelect.disabled = false;
                    })
                    .catch(handleError);
            } else {
                timeSelect.disabled = true;
                timeSelect.innerHTML = '<option value="" disabled selected>시간 선택</option>';
                return Promise.resolve();
            }
        }

        function addReservation(event) {
            event.preventDefault();
            const payload = {
                date: document.getElementById('date').value,
                themeId: document.getElementById('theme').value,
                timeId: document.getElementById('time').value,
                name: document.getElementById('name').value
            };

            fetch('/reservations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    alert('✅ 예약이 추가되었습니다.');
                    fetchReservations();
                    document.getElementById('reservation-form').reset();
                    document.getElementById('time').disabled = true;
                } else {
                    return response.json().then(error => { throw error; });
                }
            })
            .catch(handleError);
        }

        function deleteReservation(id) {
            if (!confirm('정말 삭제하시겠습니까?')) return;
            fetch(`/reservations/${id}`, { method: 'DELETE' })
                .then(response => {
                    if (response.ok) {
                        alert('✅ 예약이 삭제되었습니다.');
                        fetchReservations();
                    } else {
                        return response.json().then(error => { throw error; });
                    }
                })
                .catch(handleError);
        }
    </script>
</body>
</html>
