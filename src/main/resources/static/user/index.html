<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방탈출 예약</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: #f8fafc; color: #1e293b; }

        /* ── Header ── */
        header {
            background: linear-gradient(135deg, #1e1b4b 0%, #4f46e5 100%);
            color: white;
            padding: 20px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header .logo { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; }
        header .logo span { color: #a5b4fc; }

        /* ── Nav ── */
        .nav {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 0 32px;
            display: flex;
            gap: 4px;
        }
        .nav-item {
            padding: 14px 18px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }
        .nav-item:hover { color: #4f46e5; }
        .nav-item.active { color: #4f46e5; border-bottom-color: #4f46e5; }

        /* ── Layout ── */
        .container { max-width: 880px; margin: 36px auto; padding: 0 20px; }
        .section { display: none; }
        .section.active { display: block; }

        /* ── Card ── */
        .card {
            background: white;
            border-radius: 12px;
            padding: 28px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .card-title {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #94a3b8;
            margin-bottom: 16px;
        }

        /* ── Step badge ── */
        .step-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .step-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #4f46e5;
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .step-title { font-size: 1rem; font-weight: 600; color: #1e293b; }

        /* ── Form ── */
        label { display: block; font-size: 0.82rem; font-weight: 500; color: #475569; margin-bottom: 6px; }
        input[type="date"], input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1e293b;
            margin-bottom: 16px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); }

        /* ── Buttons ── */
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            transition: background 0.15s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: #4f46e5; color: white; }
        .btn-primary:hover { background: #4338ca; }
        .btn-success { background: #059669; color: white; }
        .btn-success:hover { background: #047857; }

        /* ── Theme grid ── */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .theme-card {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .theme-card:hover { border-color: #818cf8; box-shadow: 0 4px 12px rgba(79,70,229,0.12); }
        .theme-card.selected { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }
        .theme-card img { width: 100%; height: 100px; object-fit: cover; display: block; }
        .theme-card-body { padding: 8px 10px; }
        .theme-card-body .name { font-size: 0.85rem; font-weight: 600; margin-bottom: 2px; }
        .theme-card-body .desc { font-size: 0.75rem; color: #94a3b8; line-height: 1.4; }

        /* ── Time buttons ── */
        .time-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .time-btn {
            padding: 9px 18px;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: white;
            color: #475569;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.15s;
        }
        .time-btn:hover { border-color: #818cf8; color: #4f46e5; background: #f5f3ff; }
        .time-btn.selected { border-color: #4f46e5; background: #4f46e5; color: white; }

        /* ── Alert ── */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.88rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
        .alert-error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

        /* ── Popular ── */
        .popular-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 16px;
        }
        .popular-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            transition: box-shadow 0.15s;
        }
        .popular-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .popular-card img { width: 100%; height: 120px; object-fit: cover; display: block; }
        .popular-card-body { padding: 10px 14px; }
        .popular-card-body .name { font-size: 0.9rem; font-weight: 600; margin-bottom: 4px; }
        .popular-card-body .desc { font-size: 0.78rem; color: #94a3b8; line-height: 1.4; }
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: #4f46e5;
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .rank-badge.top3 { background: #f59e0b; }

        .hidden { display: none; }
        .empty-text { color: #94a3b8; font-size: 0.88rem; padding: 8px 0; }
    </style>
</head>
<body>

<header>
    <div class="logo">🔐 방탈출 <span>예약</span></div>
</header>

<nav class="nav">
    <div class="nav-item active" onclick="showTab('reservation')">예약하기</div>
    <div class="nav-item" onclick="showTab('myreservation')">내 예약 조회</div>
    <div class="nav-item" onclick="showTab('popular')">인기 테마</div>
</nav>

<div class="container">

    <!-- 예약하기 -->
    <div class="section active" id="section-reservation">
        <div class="card">
            <div class="step-header">
                <div class="step-badge">1</div>
                <div class="step-title">날짜와 테마를 선택하세요</div>
            </div>

            <label for="date">예약 날짜</label>
            <input type="date" id="date">

            <label>테마</label>
            <div class="theme-grid" id="themeGrid"></div>

            <button class="btn-primary" onclick="loadAvailableTimes()">예약 가능한 시간 조회</button>
        </div>

        <div class="card hidden" id="step2">
            <div class="step-header">
                <div class="step-badge">2</div>
                <div class="step-title">시간을 선택하고 이름을 입력하세요</div>
            </div>

            <label>예약 가능한 시간</label>
            <div class="time-list" id="timeList"></div>

            <label for="name">예약자 이름</label>
            <input type="text" id="name" placeholder="이름을 입력하세요">

            <div id="alertBox"></div>

            <button class="btn-success" onclick="submitReservation()">예약 완료</button>
        </div>
    </div>

    <!-- 내 예약 조회 -->
    <div class="section" id="section-myreservation">
        <div class="card">
            <div class="card-title">이름으로 예약 조회</div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="search-name" placeholder="예약자 이름을 입력하세요" style="margin-bottom: 0;">
                <button class="btn-primary" style="white-space: nowrap;" onclick="searchReservations()">조회</button>
            </div>
            <div id="search-result"></div>
        </div>
    </div>

    <!-- 인기 테마 -->
    <div class="section" id="section-popular">
        <div class="card">
            <div class="card-title">최근 1주 인기 테마 TOP 10</div>
            <div class="popular-grid" id="popularGrid"></div>
        </div>
    </div>

</div>

<script>
    let selectedTimeId = null;
    let selectedThemeId = null;

    function showTab(name) {
        document.querySelectorAll('.nav-item').forEach((t, i) => {
            t.classList.toggle('active', ['reservation', 'myreservation', 'popular'][i] === name);
        });
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');
        if (name === 'popular') loadPopularThemes();
    }

    async function searchReservations() {
        const name = document.getElementById('search-name').value.trim();
        const resultEl = document.getElementById('search-result');

        if (!name) {
            resultEl.innerHTML = '<div class="alert alert-error"><span>✕</span>이름을 입력해주세요.</div>';
            return;
        }

        const res = await fetch(`/reservations?name=${encodeURIComponent(name)}`);
        if (!res.ok) {
            const err = await res.json().catch(() => null);
            resultEl.innerHTML = `<div class="alert alert-error"><span>✕</span>${err?.message ?? '조회에 실패했습니다.'}</div>`;
            return;
        }

        const list = await res.json();

        if (list.length === 0) {
            resultEl.innerHTML = '<p class="empty-text">예약 내역이 없습니다.</p>';
            return;
        }

        resultEl.innerHTML = `
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px;">
                ${list.map(r => `
                    <div style="border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; background: #f8fafc;">
                        <div style="font-size: 0.78rem; font-weight: 600; color: #4f46e5; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;">${r.theme.name}</div>
                        <div style="font-size: 0.88rem; color: #475569; margin-bottom: 4px;">📅 ${r.date}</div>
                        <div style="font-size: 0.88rem; color: #475569;">🕐 ${r.time.startAt}</div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    async function loadThemes() {
        const res = await fetch('/themes');
        const themes = await res.json();
        const grid = document.getElementById('themeGrid');
        grid.innerHTML = themes.map(t => `
            <div class="theme-card" data-id="${t.id}" onclick="selectTheme(this, ${t.id})">
                <img src="${t.thumbnailUrl}" alt="${t.name}">
                <div class="theme-card-body">
                    <div class="name">${t.name}</div>
                    <div class="desc">${t.description}</div>
                </div>
            </div>
        `).join('');
    }

    function selectTheme(el, themeId) {
        document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedThemeId = themeId;
    }

    async function loadAvailableTimes() {
        const date = document.getElementById('date').value;
        if (!date || !selectedThemeId) {
            alert('날짜와 테마를 모두 선택해주세요.');
            return;
        }
        const res = await fetch(`/times?date=${date}&themeId=${selectedThemeId}`);
        const times = await res.json();
        const list = document.getElementById('timeList');
        list.innerHTML = '';
        selectedTimeId = null;

        if (times.length === 0) {
            list.innerHTML = '<p class="empty-text">예약 가능한 시간이 없습니다.</p>';
        } else {
            times.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'time-btn';
                btn.textContent = t.startAt;
                btn.onclick = () => selectTime(btn, t.id);
                list.appendChild(btn);
            });
        }

        document.getElementById('step2').classList.remove('hidden');
        clearAlert();
    }

    function selectTime(btn, timeId) {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTimeId = timeId;
    }

    async function submitReservation() {
        const name = document.getElementById('name').value.trim();
        const date = document.getElementById('date').value;

        if (!selectedTimeId) { showAlert('시간을 선택해주세요.', 'error'); return; }
        if (!name) { showAlert('이름을 입력해주세요.', 'error'); return; }

        const res = await fetch('/reservations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, date, timeId: selectedTimeId, themeId: Number(selectedThemeId) })
        });

        if (res.ok) {
            showAlert('예약이 완료되었습니다!', 'success');
            loadAvailableTimes();
            document.getElementById('name').value = '';
        } else {
            const errorData = await res.json().catch(() => null);
            const message = errorData?.message ?? '예약에 실패했습니다.';
            showAlert(message, 'error');
        }
    }

    async function loadPopularThemes() {
        const today = new Date();
        const endDate = new Date(today);
        endDate.setDate(today.getDate() - 1);
        const startDate = new Date(today);
        startDate.setDate(today.getDate() - 7);
        const endAt = endDate.toISOString().slice(0, 10);
        const startAt = startDate.toISOString().slice(0, 10);

        const res = await fetch(`/themes/popular?startAt=${startAt}&endAt=${endAt}&limit=10`);
        const themes = await res.json();
        const grid = document.getElementById('popularGrid');
        grid.innerHTML = themes.map((t, i) => `
            <div class="popular-card">
                <img src="${t.thumbnailUrl}" alt="${t.name}">
                <div class="popular-card-body">
                    <div class="rank-badge ${i < 3 ? 'top3' : ''}">${i + 1}</div>
                    <div class="name">${t.name}</div>
                    <div class="desc">${t.description}</div>
                </div>
            </div>
        `).join('');
    }

    function showAlert(msg, type) {
        const icon = type === 'success' ? '✓' : '✕';
        document.getElementById('alertBox').innerHTML =
            `<div class="alert alert-${type}"><span>${icon}</span>${msg}</div>`;
    }

    function clearAlert() {
        document.getElementById('alertBox').innerHTML = '';
    }

    loadThemes();
</script>
</body>
</html>
