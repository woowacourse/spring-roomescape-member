<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방탈출 관리자</title>
  <link rel="stylesheet" href="/style.css?v=6">
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="logo">⚙️ RoomEscape Admin</a>
      <nav class="nav-links">
        <a href="/">홈</a>
        <a href="/reservation.html">예약하기</a>
        <a href="/admin.html" class="active">관리자 모드</a>
      </nav>
    </header>

    <div class="page-tabs" aria-label="관리자 메뉴">
      <button type="button" class="page-tab active" data-tab-target="theme-management">테마 관리</button>
      <button type="button" class="page-tab" data-tab-target="reservation-management">예약 관리</button>
      <button type="button" class="page-tab" data-tab-target="time-management">예약 시간 관리</button>
    </div>

    <main>
    <!-- Theme Management -->
    <section id="theme-management" class="glass-card tab-panel active">
      <div class="section-header compact">
        <div>
          <h2 class="section-title">테마 관리</h2>
          <p class="section-subtitle">방탈출 테마를 추가하고 삭제합니다.</p>
        </div>
      </div>
      <form id="theme-form" class="flex-row" style="margin-bottom: 15px;">
        <input type="text" id="theme-name" class="form-control" placeholder="테마명" required>
        <input type="text" id="theme-desc" class="form-control" placeholder="설명" required>
        <input type="url" id="theme-thumb" class="form-control" placeholder="썸네일 URL" required>
        <button type="submit" class="btn-primary" style="width: auto; padding: 0.8rem 1.5rem;">추가</button>
      </form>
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr><th>ID</th><th>이름</th><th>설명</th><th style="width:80px">작업</th></tr>
          </thead>
          <tbody id="theme-list"></tbody>
        </table>
      </div>
    </section>

    <!-- Reservation Management -->
    <section id="reservation-management" class="glass-card tab-panel">
      <div class="section-header compact">
        <div>
          <h2 class="section-title">예약 관리</h2>
          <p class="section-subtitle">예약 목록을 조회하고 관리자 권한으로 삭제합니다.</p>
        </div>
      </div>
      <!-- Reservation form removed to simplify UI as requested -->
      
      <!-- Search Filters -->
      <div class="filter-group flex-row" style="margin-bottom: 15px; padding: 10px; background: rgba(0, 88, 255, 0.05); border-radius: 8px;">
        <input type="text" id="filter-name" class="form-control" placeholder="🔍 예약자명 검색">
        <input type="date" id="filter-date" class="form-control">
        <select id="filter-theme" class="form-control"><option value="">모든 테마</option></select>
        <select id="filter-time" class="form-control"><option value="">모든 시간</option></select>
      </div>
      
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr><th>ID</th><th>예약자</th><th>날짜</th><th>시간</th><th>테마</th><th style="width:80px">작업</th></tr>
          </thead>
          <tbody id="reservation-list"></tbody>
        </table>
      </div>
    </section>

    <!-- Time Management -->
    <section id="time-management" class="glass-card tab-panel">
      <div class="section-header compact">
        <div>
          <h2 class="section-title">예약 시간 관리</h2>
          <p class="section-subtitle">예약 가능한 시작 시간을 추가하고 삭제합니다.</p>
        </div>
      </div>
      <form id="time-form" class="flex-row" style="margin-bottom: 15px;">
        <input type="time" id="time-val" class="form-control" required>
        <button type="submit" class="btn-primary" style="width: auto; padding: 0.8rem 1.5rem;">추가</button>
      </form>
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr><th>ID</th><th>시작 시간</th><th style="width:80px">작업</th></tr>
          </thead>
          <tbody id="time-list"></tbody>
        </table>
      </div>
    </section>
    </main>
  </div>
  <script src="/admin.js?v=6"></script>
</body>
</html>
