<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Escape Admin</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="app-header">
    <a class="brand" href="/">
        <span class="brand-mark">RE</span>
        <span>Room Escape</span>
    </a>
    <nav class="nav-links" aria-label="주요 메뉴">
        <a href="/">예약</a>
        <a class="active" href="/admin.html">관리자</a>
    </nav>
</header>

<main class="shell">
    <div class="section-heading">
        <div>
            <p class="eyebrow">Admin</p>
            <h1>테마와 시간 관리</h1>
        </div>
        <p id="status" class="status" role="status"></p>
    </div>

    <section class="layout-grid admin-layout">
        <form id="theme-form" class="panel form-panel">
            <div class="panel-heading">
                <h3>테마 등록</h3>
            </div>
            <label>
                <span>이름</span>
                <input id="theme-name" name="name" type="text" placeholder="테마 이름" required>
            </label>
            <label>
                <span>설명</span>
                <textarea id="theme-description" name="description" placeholder="테마 설명" rows="5"></textarea>
            </label>
            <label>
                <span>이미지 URL</span>
                <input id="theme-image" name="image" type="url" placeholder="https://example.com/image.jpg">
            </label>
            <button class="primary-button" type="submit">등록하기</button>
        </form>

        <section class="panel">
            <div class="panel-heading">
                <h3>등록된 테마</h3>
                <button id="reload-themes" class="ghost-button" type="button">새로고침</button>
            </div>
            <div id="theme-grid" class="theme-grid admin-theme-grid"></div>
        </section>
    </section>

    <section class="panel table-panel">
        <div class="panel-heading">
            <h3>예약 시간 관리</h3>
            <form id="time-form" class="inline-form">
                <input id="start-at" name="startAt" type="time" required>
                <button class="primary-button compact-button" type="submit">추가</button>
            </form>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>시작 시간</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="time-rows"></tbody>
            </table>
        </div>
    </section>
</main>

<script>
    const statusEl = document.querySelector('#status');
    const themeForm = document.querySelector('#theme-form');
    const themeGrid = document.querySelector('#theme-grid');
    const timeForm = document.querySelector('#time-form');
    const timeRows = document.querySelector('#time-rows');

    function setStatus(message, isError = false) {
        statusEl.textContent = message;
        statusEl.classList.toggle('error', isError);
    }

    async function requestJson(url, options = {}) {
        const response = await fetch(url, {
            headers: {'Content-Type': 'application/json'},
            ...options,
        });

        if (!response.ok) {
            const message = await response.text();
            throw new Error(message || `요청 실패: ${response.status}`);
        }

        if (response.status === 204) {
            return null;
        }
        return response.json();
    }

    function createFallback(name) {
        const fallback = document.createElement('div');
        fallback.className = 'image-fallback';
        fallback.textContent = name.slice(0, 1);
        return fallback;
    }

    function createThemeCard(theme) {
        const article = document.createElement('article');
        article.className = 'theme-card';

        if (theme.image?.startsWith('http')) {
            const image = document.createElement('img');
            image.src = theme.image;
            image.alt = theme.name;
            image.loading = 'lazy';
            image.addEventListener('error', () => image.replaceWith(createFallback(theme.name)));
            article.append(image);
        } else {
            article.append(createFallback(theme.name));
        }

        const body = document.createElement('div');
        body.className = 'theme-body';
        const title = document.createElement('h3');
        title.textContent = theme.name;
        const description = document.createElement('p');
        description.textContent = theme.description || '설명이 없습니다.';
        const actions = document.createElement('div');
        actions.className = 'theme-actions';
        const button = document.createElement('button');
        button.className = 'danger-button';
        button.type = 'button';
        button.dataset.themeId = theme.id;
        button.textContent = '삭제';
        actions.append(button);
        body.append(title, description, actions);
        article.append(body);
        return article;
    }

    function renderThemes(themes) {
        themeGrid.innerHTML = '';
        if (themes.length === 0) {
            themeGrid.innerHTML = '<p class="empty">등록된 테마가 없습니다.</p>';
            return;
        }
        themes.forEach((theme) => themeGrid.append(createThemeCard(theme)));
    }

    function renderTimes(times) {
        timeRows.innerHTML = '';
        if (times.length === 0) {
            timeRows.innerHTML = '<tr><td class="empty" colspan="3">등록된 시간이 없습니다.</td></tr>';
            return;
        }

        times.forEach((time) => {
            const row = document.createElement('tr');
            const idCell = document.createElement('td');
            idCell.textContent = time.id;
            const startAtCell = document.createElement('td');
            startAtCell.textContent = time.startAt;
            const actionCell = document.createElement('td');
            const button = document.createElement('button');
            button.className = 'danger-button';
            button.type = 'button';
            button.dataset.timeId = time.id;
            button.textContent = '삭제';
            actionCell.append(button);
            row.append(idCell, startAtCell, actionCell);
            timeRows.append(row);
        });
    }

    async function loadThemes() {
        renderThemes(await requestJson('/themes'));
    }

    async function loadTimes() {
        renderTimes(await requestJson('/times/reservation-time'));
    }

    themeForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
            await requestJson('/admin/themes', {
                method: 'POST',
                body: JSON.stringify({
                    name: document.querySelector('#theme-name').value.trim(),
                    description: document.querySelector('#theme-description').value.trim(),
                    image: document.querySelector('#theme-image').value.trim(),
                }),
            });
            themeForm.reset();
            setStatus('테마를 등록했습니다.');
            await loadThemes();
        } catch (error) {
            setStatus(error.message, true);
        }
    });

    themeGrid.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-theme-id]');
        if (!button) {
            return;
        }

        try {
            await requestJson(`/admin/themes/${button.dataset.themeId}`, {method: 'DELETE'});
            setStatus('테마를 삭제했습니다.');
            await loadThemes();
        } catch (error) {
            setStatus(error.message, true);
        }
    });

    timeForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
            await requestJson('/admin/times', {
                method: 'POST',
                body: JSON.stringify({startAt: document.querySelector('#start-at').value}),
            });
            timeForm.reset();
            setStatus('예약 시간을 추가했습니다.');
            await loadTimes();
        } catch (error) {
            setStatus(error.message, true);
        }
    });

    timeRows.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-time-id]');
        if (!button) {
            return;
        }

        try {
            await requestJson(`/admin/times/${button.dataset.timeId}`, {method: 'DELETE'});
            setStatus('예약 시간을 삭제했습니다.');
            await loadTimes();
        } catch (error) {
            setStatus(error.message, true);
        }
    });

    document.querySelector('#reload-themes').addEventListener('click', loadThemes);

    (async function init() {
        try {
            await Promise.all([loadThemes(), loadTimes()]);
        } catch (error) {
            setStatus(error.message, true);
        }
    })();
</script>
</body>
</html>
