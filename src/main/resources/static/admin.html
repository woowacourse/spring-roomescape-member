<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우테코 방탈출 관리자</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 관리자 페이지 전용 추가 스타일 */
        .admin-header {
            background-color: #2c3e50;
            color: white;
        }
        .data-list {
            margin-top: 1rem;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1rem;
            background: #fafafa;
        }
        .data-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }
        .data-item:last-child {
            border-bottom: none;
        }
        .badge {
            background-color: var(--secondary-color);
            color: white;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<header class="admin-header">
    <h1>⚙️ 우테코 방탈출 관리자 시스템</h1>
    <p>테마, 예약 시간, 전체 예약 내역을 관리합니다.</p>
</header>

<main>
    <section class="card">
        <h2>테마 관리</h2>
        <form id="form-add-theme" class="form-group row">
            <input type="text" id="theme-name" placeholder="테마 이름 (예: 공포의 병원)" required style="flex: 1; min-width: 150px;">
            <input type="text" id="theme-desc" placeholder="테마 설명" required style="flex: 2; min-width: 200px;">
            <input type="url" id="theme-thumb" placeholder="썸네일 URL" required style="flex: 1; min-width: 150px;">
            <button type="submit" class="btn btn-primary">추가</button>
        </form>
        <div id="admin-theme-list" class="data-list">
        </div>
    </section>

    <section class="card">
        <h2>예약 시간 관리</h2>
        <form id="form-add-time" class="form-group row">
            <input type="time" id="time-start" step="1" required style="flex: 1;">
            <button type="submit" class="btn btn-primary">시간 추가</button>
        </form>
        <div id="admin-time-list" class="data-list">
        </div>
    </section>

    <section class="card">
        <h2>전체 예약 관리</h2>
        <p>관리자 권한으로 예약을 강제로 생성하거나 취소할 수 있습니다.</p>

        <form id="form-admin-reservation" class="form-group row" style="flex-wrap: nowrap; gap: 0.5rem;">

            <input type="text" id="admin-res-name" placeholder="예약자 이름" required style="flex: 1; min-width: 0;">
            <input type="date" id="admin-res-date" required style="flex: 1; min-width: 0;">

            <select id="admin-res-theme" required style="flex: 1; min-width: 0;">
                <option value="">테마 선택</option>
            </select>

            <select id="admin-res-time" required style="flex: 1; min-width: 0;">
                <option value="">시간 선택</option>
            </select>

            <button type="submit" class="btn btn-danger" style="flex-shrink: 0; white-space: nowrap;">강제 예약</button>
        </form>

        <div id="admin-reservation-list" class="data-list" style="max-height: 500px;">
        </div>
    </section>
</main>

<script src="admin.js"></script>
</body>
</html>
