<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방탈출 관리자</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="logo">⚙️ RoomEscape Admin</a>
      <nav class="nav-links">
        <a href="/">사용자 화면</a>
        <a href="/admin.html" class="active">관리자 모드</a>
      </nav>
    </header>

    <!-- Theme Management -->
    <section class="glass-card">
      <h2 class="section-title">🎭 테마 관리</h2>
      <form id="theme-form" class="flex-row" style="margin-bottom: 1.5rem;">
        <div class="form-group" style="flex:1.5; margin-bottom: 0;">
          <label class="form-label">테마명</label>
          <input type="text" id="theme-name" class="form-control" placeholder="예: 공포의 방" required>
        </div>
        <div class="form-group" style="flex:2; margin-bottom: 0;">
          <label class="form-label">설명</label>
          <input type="text" id="theme-desc" class="form-control" placeholder="테마 설명" required>
        </div>
        <div class="form-group" style="flex:2; margin-bottom: 0;">
          <label class="form-label">썸네일 URL</label>
          <input type="url" id="theme-thumb" class="form-control" placeholder="https://..." required>
        </div>
        <div style="padding-bottom: 2px;">
          <button type="submit" class="btn-primary" style="padding: 0.8rem 1.5rem; width: auto;">추가</button>
        </div>
      </form>
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>테마명</th>
              <th>설명</th>
              <th style="width: 80px;">작업</th>
            </tr>
          </thead>
          <tbody id="theme-list"></tbody>
        </table>
      </div>
    </section>

    <!-- Time Management -->
    <section class="glass-card">
      <h2 class="section-title">⏰ 예약 시간 관리</h2>
      <form id="time-form" class="flex-row" style="margin-bottom: 1.5rem;">
        <div class="form-group" style="flex:1; max-width: 200px; margin-bottom: 0;">
          <label class="form-label">예약 시간 (HH:mm)</label>
          <input type="time" id="time-val" class="form-control" required>
        </div>
        <div style="padding-bottom: 2px;">
          <button type="submit" class="btn-primary" style="padding: 0.8rem 1.5rem; width: auto;">추가</button>
        </div>
      </form>
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>시간</th>
              <th style="width: 80px;">작업</th>
            </tr>
          </thead>
          <tbody id="time-list"></tbody>
        </table>
      </div>
    </section>

    <!-- Reservation Management -->
    <section class="glass-card">
      <h2 class="section-title">📋 전체 예약 내역 관리</h2>
      <div style="overflow-x: auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>예약자명</th>
              <th>날짜</th>
              <th>시간</th>
              <th>테마</th>
              <th style="width: 80px;">작업</th>
            </tr>
          </thead>
          <tbody id="reservation-list"></tbody>
        </table>
      </div>
    </section>

  </div>
  <script src="/admin.js"></script>
</body>
</html>
