<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>관리자 · RoomEscape</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="/styles/common.css" rel="stylesheet" />
  <link href="/styles/admin.css" rel="stylesheet" />
</head>
<body>
  <nav class="top-nav">
    <div class="nav-inner">
      <a class="nav-logo" href="/">RoomEscape</a>
      <div class="nav-links">
        <a href="/">홈</a>
        <a href="/reserve">예약하기</a>
        <a href="/search">예약확인</a>
        <a class="active" href="/admin">관리자</a>
      </div>
    </div>
  </nav>

  <header class="admin-header">
    <h1 class="admin-title">관리자</h1>
    <p class="admin-sub">테마, 예약, 시간을 관리합니다</p>
  </header>

  <div class="tab-bar" data-role="tab-bar">
    <button class="tab-btn active" data-tab="theme" type="button">테마</button>
    <button class="tab-btn" data-tab="reservation" type="button">예약</button>
    <button class="tab-btn" data-tab="time" type="button">시간</button>
  </div>

  <main class="tab-content">
    <section class="tab-panel active" data-panel="theme">
      <div class="section-wrap">
        <div class="card">
          <h2 class="card-title">테마 추가</h2>
          <form data-role="theme-form">
            <div class="form-group">
              <label class="form-label" for="themeName">이름</label>
              <input class="form-input" id="themeName" maxlength="20" name="name" placeholder="테마 이름" type="text" />
            </div>
            <div class="form-group">
              <label class="form-label" for="themeDescription">설명</label>
              <input class="form-input" id="themeDescription" maxlength="255" name="description" placeholder="테마 설명" type="text" />
            </div>
            <div class="form-group">
              <label class="form-label" for="themeThumbnail">썸네일 URL</label>
              <input class="form-input" id="themeThumbnail" name="thumbnailImageUrl" placeholder="https://..." type="text" />
            </div>
            <button class="btn-primary" type="submit">추가하기</button>
          </form>
        </div>
        <div class="card">
          <h2 class="card-title">테마 목록</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>이름</th>
                  <th>설명</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-role="theme-table">
                <tr class="loading-row"><td colspan="4">불러오는 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <section class="tab-panel" data-panel="reservation">
      <div class="section-wrap">
        <div class="card">
          <h2 class="card-title">예약 추가</h2>
          <form data-role="reservation-form">
            <div class="form-group">
              <label class="form-label" for="reservationName">예약자 이름</label>
              <input class="form-input" id="reservationName" maxlength="20" name="name" placeholder="이름" type="text" />
            </div>
            <div class="form-group">
              <label class="form-label" for="reservationDate">날짜</label>
              <input class="form-input" id="reservationDate" name="date" type="date" />
            </div>
            <div class="form-group">
              <label class="form-label" for="reservationTheme">테마</label>
              <select class="form-input" id="reservationTheme" name="themeId">
                <option value="">테마 선택</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="reservationTime">시간</label>
              <select class="form-input" id="reservationTime" name="timeId">
                <option value="">시간 선택</option>
              </select>
            </div>
            <button class="btn-primary" type="submit">예약하기</button>
          </form>
        </div>
        <div class="card">
          <h2 class="card-title">예약 목록</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>예약자</th>
                  <th>날짜</th>
                  <th>시간</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-role="reservation-table">
                <tr class="loading-row"><td colspan="5">불러오는 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <section class="tab-panel" data-panel="time">
      <div class="section-wrap">
        <div class="card">
          <h2 class="card-title">시간 추가</h2>
          <form data-role="time-form">
            <div class="form-group">
              <label class="form-label" for="timeStartAt">시작 시간</label>
              <input class="form-input" id="timeStartAt" name="startAt" type="time" />
            </div>
            <button class="btn-primary" type="submit">추가하기</button>
          </form>
        </div>
        <div class="card">
          <h2 class="card-title">시간 목록</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>시작 시간</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-role="time-table">
                <tr class="loading-row"><td colspan="3">불러오는 중...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" data-role="toast"></div>

  <script src="/js/admin/main.js" type="module"></script>
</body>
</html>
