<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roomescape - 내 예약 조회</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 900px; margin-top: 3rem; }
        .notice-card { background-color: #fff3cd; border-left: 5px solid #ffecb5; }
        .reservation-card { transition: all 0.2s; border-left: 5px solid #0d6efd; overflow: hidden; }
        .reservation-card:hover { transform: translateY(-5px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.1); }
        .theme-thumb { width: 120px; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Roomescape</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">홈</a>
                <a class="nav-link" href="/reservation.html">예약하기</a>
                <a class="nav-link active" href="/my-reservation.html">내 예약 조회</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <h2 class="text-center mb-4">내 예약 내역 확인</h2>
        
        <div class="card notice-card p-3 mb-4 shadow-sm">
            <div class="d-flex align-items-center">
                <span class="fs-4 me-3">⚠️</span>
                <div>
                    <strong>안내 사항:</strong> 예약 변경 및 취소는 <strong>방탈출 게임 시작 24시간 전</strong>까지만 가능합니다.
                </div>
            </div>
        </div>

        <div class="card mb-5 shadow-sm">
            <div class="card-body">
                <div class="row g-3 align-items-center">
                    <div class="col-md-9">
                        <label class="form-label d-none">이름</label>
                        <input type="text" id="user-name" class="form-control form-control-lg" placeholder="예약하실 때 사용한 이름을 입력하세요">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-primary btn-lg w-100" onclick="fetchMyReservations()">조회하기</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="reservation-results" class="row g-4">
            <p class="text-center text-muted py-5">조회 버튼을 눌러 예약 내역을 확인하세요.</p>
        </div>
    </div>

    <!-- 수정 모달 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">예약 정보 수정</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-form" class="row g-3">
                        <input type="hidden" id="edit-id">
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">예약자 이름</label>
                            <input type="text" id="edit-name" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">날짜</label>
                            <input type="date" id="edit-date" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">테마</label>
                            <select id="edit-theme" class="form-select" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label font-weight-bold">시간</label>
                            <select id="edit-time" class="form-select" required></select>
                        </div>
                        <div class="col-12 text-muted">
                            <small>* 변경 사항은 즉시 반영되며, 24시간 이내인 경우 수정이 제한될 수 있습니다.</small>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">닫기</button>
                    <button type="button" class="btn btn-primary px-4" onclick="updateReservation()">수정 완료</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const editModal = new bootstrap.Modal(document.getElementById('editModal'));
        let currentReservations = [];

        function formatTime(time) {
            if (Array.isArray(time)) {
                return String(time[0]).padStart(2, '0') + ':' + String(time[1]).padStart(2, '0');
            }
            return time;
        }

        function fetchMyReservations() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) {
                alert('조회할 이름을 입력해주세요.');
                return;
            }

            fetch(`/reservations?name=${encodeURIComponent(name)}`)
                .then(response => {
                    if (!response.ok) return response.json().then(error => { throw error; });
                    return response.json();
                })
                .then(reservations => {
                    currentReservations = reservations;
                    const resultsContainer = document.getElementById('reservation-results');
                    if (reservations.length === 0) {
                        resultsContainer.innerHTML = '<div class="col-12 text-center text-muted py-5">해당 이름으로 조회된 예약 내역이 없습니다.</div>';
                        return;
                    }

                    resultsContainer.innerHTML = reservations.map(res => `
                        <div class="col-12">
                            <div class="card reservation-card shadow-sm h-100 flex-row">
                                <img src="${res.theme.thumbnail}" class="theme-thumb d-none d-md-block" alt="${res.theme.name}" onerror="this.src='https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=200&h=150&auto=format&fit=crop'">
                                <div class="card-body d-flex justify-content-between align-items-center">
                                    <div>
                                        <h5 class="card-title text-primary mb-1">${res.theme.name}</h5>
                                        <div class="mb-2">
                                            <span class="badge bg-secondary me-2">${res.date}</span>
                                            <span class="badge bg-info text-dark">${formatTime(res.time.startAt)}</span>
                                        </div>
                                        <small class="text-muted d-block">예약자: ${res.name}</small>
                                    </div>
                                    <div class="d-flex flex-column flex-sm-row gap-2">
                                        <button class="btn btn-outline-warning btn-sm px-3" onclick="showEditModal(${res.id})">수정</button>
                                        <button class="btn btn-outline-danger btn-sm px-3" onclick="deleteReservation(${res.id})">취소</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                })
                .catch(handleError);
        }

        async function showEditModal(id) {
            const res = currentReservations.find(r => r.id === id);
            if (!res) return;

            document.getElementById('edit-id').value = res.id;
            document.getElementById('edit-name').value = res.name;
            document.getElementById('edit-date').value = res.date;

            // 테마 목록 및 시간 목록 로드
            await loadThemesForEdit(res.theme.id);
            await loadTimesForEdit(res.theme.id, res.date, res.time.id);

            // 이벤트 바인딩
            document.getElementById('edit-date').onchange = () => loadTimesForEdit();
            document.getElementById('edit-theme').onchange = () => loadTimesForEdit();

            editModal.show();
        }

        async function loadThemesForEdit(selectedThemeId) {
            const response = await fetch('/themes');
            const themes = await response.json();
            const select = document.getElementById('edit-theme');
            select.innerHTML = themes.map(t => `<option value="${t.id}" ${t.id === selectedThemeId ? 'selected' : ''}>${t.name}</option>`).join('');
        }

        async function loadTimesForEdit(themeId, date, selectedTimeId) {
            const tId = themeId || document.getElementById('edit-theme').value;
            const d = date || document.getElementById('edit-date').value;
            const timeSelect = document.getElementById('edit-time');

            if (!tId || !d) return;

            const response = await fetch(`/times?themeId=${tId}&date=${d}`);
            const times = await response.json();
            
            timeSelect.innerHTML = times.map(t => {
                const isCurrent = t.id === selectedTimeId;
                const disabled = t.reserved && !isCurrent;
                return `<option value="${t.id}" ${isCurrent ? 'selected' : ''} ${disabled ? 'disabled' : ''}>
                    ${formatTime(t.startAt)} ${t.reserved && !isCurrent ? '(마감)' : ''}
                </option>`;
            }).join('');
        }

        function updateReservation() {
            const id = parseInt(document.getElementById('edit-id').value);
            const name = document.getElementById('edit-name').value;
            const date = document.getElementById('edit-date').value;
            const themeId = parseInt(document.getElementById('edit-theme').value);
            const timeId = parseInt(document.getElementById('edit-time').value);

            const payload = { name, date, themeId, timeId };

            fetch(`/reservations/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    alert('✅ 예약 정보가 수정되었습니다.');
                    editModal.hide();
                    fetchMyReservations();
                } else {
                    return response.json().then(error => { throw error; });
                }
            })
            .catch(handleError);
        }

        function deleteReservation(id) {
            if (!confirm('정말 예약을 취소하시겠습니까? (취소는 24시간 전까지만 가능합니다)')) return;

            fetch(`/reservations/${id}`, { method: 'DELETE' })
                .then(response => {
                    if (response.ok) {
                        alert('✅ 예약이 취소되었습니다.');
                        fetchMyReservations();
                    } else {
                        return response.json().then(error => { throw error; });
                    }
                })
                .catch(handleError);
        }

        function handleError(error) {
            console.error(error);
            const code = error.exceptionCode;
            const message = error.message;

            if (code === 'RESERVATION_CANCEL_DEADLINE_PASSED') {
                alert('⏰ 처리 실패: 방탈출 게임 시작 24시간 전까지만 변경 및 취소가 가능합니다.');
            } else if (code === 'RESERVATION_NOT_FOUND') {
                alert('❓ 오류: 존재하지 않는 예약입니다.');
            } else if (code === 'RESERVATION_ALREADY_EXISTS') {
                alert('⚠️ 중복 예약: 해당 시간에는 이미 예약이 존재합니다.');
            } else {
                alert('❌ 오류 발생: ' + (message || '알 수 없는 오류가 발생했습니다.'));
            }
        }
    </script>
</body>
</html>
