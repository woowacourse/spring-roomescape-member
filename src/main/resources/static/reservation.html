<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>방탈출 예약하기</title>
    <link href="/style.css?v=3" rel="stylesheet">
</head>
<body>
<div class="container">
    <header>
        <a class="logo" href="/">RoomEscape</a>
        <nav class="nav-links">
            <a href="/">홈</a>
            <a class="active" href="/reservation.html">예약하기</a>
            <a href="/my-reservation.html">내 예약 조회</a>
            <a href="/admin.html">관리자 모드</a>
        </nav>
    </header>

    <section class="glass-card" style="max-width: 600px; margin: 0 auto;">
        <h2 class="section-title" style="text-align:center; font-size: 1.8rem; margin-bottom: 2rem;">🗓️ 방문하실 테마와 날짜를
            골라주세요</h2>
        <form id="reservation-form">
            <div class="form-group">
                <label class="form-label">테마 선택</label>
                <select class="form-control" id="res-theme" required></select>
            </div>
            <div class="form-group">
                <label class="form-label">예약 날짜</label>
                <input class="form-control" id="res-date" required type="date">
            </div>
            <div class="form-group">
                <label class="form-label">예약 시간</label>
                <select class="form-control" disabled id="res-time" required>
                    <option value="">날짜와 테마를 먼저 선택하세요</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">예약자 이름</label>
                <input class="form-control" id="res-name" maxlength="10" minlength="2" placeholder="예약자명 (2~10자)"
                       required type="text">
            </div>
            <button class="btn-primary" style="margin-top: 1rem;" type="submit">예약 완료하기</button>
        </form>
    </section>
</div>
<script src="/reservation.js?v=3"></script>
</body>
</html>
