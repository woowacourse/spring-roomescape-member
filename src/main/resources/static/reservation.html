<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roomescape - 예약하기</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }

        .reservation-container {
            max-width: 800px;
            margin: 3rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }

        .theme-selected {
            border: 3px solid #0d6efd !important;
            transform: scale(1.02);
            z-index: 1;
        }

        .theme-item {
            transition: all 0.2s;
            border: 1px solid #dee2e6;
        }

        .theme-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .time-slot {
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #dee2e6;
        }

        .time-slot:not(.disabled):hover {
            background-color: #e9ecef;
            border-color: #0d6efd;
        }

        .time-slot.selected {
            background-color: #0d6efd !important;
            color: white !important;
            border-color: #0d6efd !important;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Roomescape</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">홈</a>
            <a class="nav-link active" href="/reservation.html">예약하기</a>
            <a class="nav-link" href="/my-reservation.html">내 예약 조회</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="reservation-container shadow">
        <h2 class="text-center mb-4">방탈출 예약</h2>

        <div class="mb-4">
            <h5>1. 테마 선택</h5>
            <div id="theme-list" class="row g-3 mt-1">
                <!-- 테마 목록 -->
            </div>
        </div>

        <div class="mb-4">
            <h5>2. 날짜 선택</h5>
            <input type="date" id="reservation-date" class="form-control" min="">
        </div>

        <div class="mb-4">
            <h5>3. 시간 선택</h5>
            <div id="time-list" class="row g-2 mt-1">
                <p class="text-muted">테마와 날짜를 먼저 선택해주세요.</p>
            </div>
        </div>

        <div class="mb-4">
            <h5>4. 예약자 정보</h5>
            <input type="text" id="reservation-name" class="form-control" placeholder="이름을 입력하세요">
        </div>

        <button id="submit-reservation" class="btn btn-primary w-100 btn-lg" disabled>예약 완료</button>
    </div>
</div>

<script>
    let selectedThemeId = null;
    let selectedTimeId = null;

    document.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('reservation-date');

        const now = new Date();
        const offset = now.getTimezoneOffset() * 60000;
        const localISOTime = new Date(now - offset).toISOString().slice(0, 10);

        dateInput.min = localISOTime;
        dateInput.value = localISOTime;

        fetchThemes();

        dateInput.addEventListener('change', fetchTimes);
        document.getElementById('submit-reservation').addEventListener('click', submitReservation);
        document.getElementById('reservation-name').addEventListener('input', checkValidation);
    });

    function fetchThemes() {
        fetch('/themes')
            .then(response => {
                if (!response.ok) {
                    return response.json().then(error => {
                        throw error;
                    });
                }
                return response.json();
            })
            .then(themes => {
                const themeList = document.getElementById('theme-list');

                themeList.innerHTML = themes.map(theme => `
                    <div class="col-md-4">
                        <div class="card h-100 theme-item shadow-sm" data-id="${theme.id}" style="cursor: pointer;">
                            <img src="${theme.thumbnail}"
                                 class="card-img-top"
                                 alt="${theme.name}"
                                 height="150"
                                 style="object-fit: cover;"
                                 onerror="this.onerror=null; this.src='https://picsum.photos/seed/no-image/300/200'">
                            <div class="card-body p-2 text-center bg-light">
                                <h6 class="card-title mb-0 font-weight-bold">${theme.name}</h6>
                            </div>
                        </div>
                    </div>
                `).join('');

                document.querySelectorAll('.theme-item').forEach(item => {
                    item.addEventListener('click', function () {
                        document.querySelectorAll('.theme-item').forEach(i => i.classList.remove('theme-selected'));
                        this.classList.add('theme-selected');

                        selectedThemeId = this.dataset.id;
                        selectedTimeId = null;

                        fetchTimes();
                        checkValidation();
                    });
                });
            })
            .catch(handleError);
    }

    function formatTime(time) {
        if (Array.isArray(time)) {
            return String(time[0]).padStart(2, '0') + ':' + String(time[1]).padStart(2, '0');
        }

        return time;
    }

    function fetchTimes() {
        const date = document.getElementById('reservation-date').value;

        if (!selectedThemeId || !date) {
            return;
        }

        fetch(`/times?themeId=${selectedThemeId}&date=${date}`)
            .then(response => {
                if (!response.ok) {
                    return response.json().then(error => {
                        throw error;
                    });
                }
                return response.json();
            })
            .then(times => {
                const timeList = document.getElementById('time-list');

                if (times.length === 0) {
                    timeList.innerHTML = '<p class="text-danger">등록된 예약 시간이 없습니다. 관리자 페이지에서 시간을 먼저 등록해주세요.</p>';
                    return;
                }

                selectedTimeId = null;
                checkValidation();

                timeList.innerHTML = '';

                times.forEach(time => {
                    const isReserved = time.reserved === true;

                    const slot = document.createElement('div');
                    slot.className = 'col-4';
                    slot.innerHTML = `
                        <div class="border rounded p-2 text-center time-slot ${!isReserved ? 'bg-white' : 'disabled bg-light text-muted'}"
                             data-id="${time.id}"
                             style="${isReserved ? 'pointer-events: none; opacity: 0.6;' : 'cursor: pointer;'}">
                            <strong>${formatTime(time.startAt)}</strong>
                            ${isReserved ? '<br><small class="text-danger">(마감)</small>' : '<br><small class="text-primary">(가능)</small>'}
                        </div>
                    `;

                    if (!isReserved) {
                        slot.querySelector('.time-slot').addEventListener('click', function () {
                            document.querySelectorAll('.time-slot').forEach(s => {
                                s.classList.remove('selected', 'btn-primary', 'text-white');
                                s.classList.add('bg-white');
                            });

                            this.classList.remove('bg-white');
                            this.classList.add('selected', 'btn-primary', 'text-white');

                            selectedTimeId = this.dataset.id;
                            checkValidation();
                        });
                    }

                    timeList.appendChild(slot);
                });
            })
            .catch(handleError);
    }

    function handleError(error) {
        console.error(error);

        const code = error.exceptionCode;
        const message = error.message;

        if (code === 'RESERVATION_ALREADY_EXISTS') {
            alert('⚠️ 이미 예약된 시간입니다. 다른 시간을 선택해주세요.');
        } else if (code === 'PAST_DATE_NOT_ALLOWED') {
            alert('🚫 지난 날짜는 예약할 수 없습니다.');
        } else if (code === 'THEME_NOT_FOUND') {
            alert('❓ 존재하지 않는 테마입니다.');
        } else if (code === 'RESERVATION_TIME_NOT_FOUND') {
            alert('❓ 존재하지 않는 예약 시간입니다.');
        } else {
            alert('❌ 예약 중 오류가 발생했습니다: ' + (message || '알 수 없는 오류'));
        }
    }

    function checkValidation() {
        const name = document.getElementById('reservation-name').value;
        document.getElementById('submit-reservation').disabled = !(selectedThemeId && selectedTimeId && name);
    }

    function submitReservation() {
        const name = document.getElementById('reservation-name').value;
        const date = document.getElementById('reservation-date').value;

        const payload = {
            name: name,
            date: date,
            timeId: parseInt(selectedTimeId),
            themeId: parseInt(selectedThemeId)
        };

        fetch('/reservations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
            .then(response => {
                if (response.ok) {
                    alert('🎉 예약이 완료되었습니다!');
                    location.href = '/';
                    return;
                }

                return response.json().then(error => {
                    throw error;
                });
            })
            .catch(handleError);
    }
</script>
</body>
</html>
