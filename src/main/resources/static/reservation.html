<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Roomescape - 예약하기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .reservation-container { max-width: 800px; margin: 3rem auto; padding: 2rem; background: white; border-radius: 10px; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); }
        .theme-selected { border: 2px solid #0d6efd !important; }
        .time-slot { cursor: pointer; transition: all 0.2s; }
        .time-slot:not(.disabled):hover { background-color: #e9ecef; }
        .time-slot.selected { background-color: #0d6efd; color: white; border-color: #0d6efd; }
    </style>
</head>
<body>
<div class="modal fade" id="successModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">예약이 등록되었습니다.</h5>
                <button class="btn-close btn-close-white" data-bs-dismiss="modal" type="button"></button>
            </div>
            <div class="modal-body">
                <table class="table table-bordered mb-0">
                    <tbody>
                    <tr>
                        <th class="table-secondary" style="width: 40%">예약 ID</th>
                        <td id="modal-reservation-id"></td>
                    </tr>
                    <tr>
                        <th class="table-secondary">예약자</th>
                        <td id="modal-reservation-name"></td>
                    </tr>
                    <tr>
                        <th class="table-secondary">날짜</th>
                        <td id="modal-reservation-date"></td>
                    </tr>
                    <tr>
                        <th class="table-secondary">시간</th>
                        <td id="modal-reservation-time"></td>
                    </tr>
                    <tr>
                        <th class="table-secondary">테마</th>
                        <td id="modal-reservation-theme"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="location.href='/'" type="button">홈으로</button>
                <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">닫기</button>
            </div>
        </div>
    </div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Roomescape</a>
        <div class="navbar-nav">
            <a class="nav-link" href="/">홈</a>
            <a class="nav-link active" href="/reservation.html">예약하기</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="reservation-container">
        <h2 class="text-center mb-4">방탈출 예약</h2>

        <div class="mb-4">
            <h5>1. 테마 선택</h5>
            <div class="row g-3 mt-1" id="theme-list"></div>
        </div>

        <div class="mb-4">
            <h5>2. 날짜 선택</h5>
            <input class="form-control" id="reservation-date" min="" type="date">
        </div>

        <div class="mb-4">
            <h5>3. 시간 선택</h5>
            <div class="row g-2 mt-1" id="time-list">
                <p class="text-muted">테마와 날짜를 먼저 선택해주세요.</p>
            </div>
        </div>

        <div class="mb-4">
            <h5>4. 예약자 정보</h5>
            <input class="form-control" id="reservation-name" placeholder="이름을 입력하세요" type="text">
        </div>

        <button class="btn btn-primary w-100 btn-lg" disabled id="submit-reservation">예약 완료</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let selectedThemeId = null;
    let selectedTimeId = null;

    document.addEventListener('DOMContentLoaded', () => {
        const dateInput = document.getElementById('reservation-date');
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;
        dateInput.value = today;

        fetchThemes();

        dateInput.addEventListener('change', fetchTimes);
        document.getElementById('submit-reservation').addEventListener('click', submitReservation);
    });

    function fetchThemes() {
        fetch('/themes')
            .then(response => response.json())
            .then(themes => {
                const themeList = document.getElementById('theme-list');
                themeList.innerHTML = themes.map(theme => `
                    <div class="col-md-4">
                        <div class="card h-100 theme-item" data-id="${theme.id}" style="cursor: pointer;">
                            <img src="${theme.thumbnail}" class="card-img-top" alt="${theme.name}" height="100" style="object-fit: cover;" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                            <div class="card-body p-2 text-center">
                                <h6 class="card-title mb-0">${theme.name}</h6>
                            </div>
                        </div>
                    </div>
                `).join('');

                document.querySelectorAll('.theme-item').forEach(item => {
                    item.addEventListener('click', function() {
                        document.querySelectorAll('.theme-item').forEach(i => i.classList.remove('theme-selected'));
                        this.classList.add('theme-selected');
                        selectedThemeId = this.dataset.id;
                        fetchTimes();
                    });
                });
            });
    }

    function fetchTimes() {
        const date = document.getElementById('reservation-date').value;
        if (!selectedThemeId || !date) return;

        fetch(`/times?themeId=${selectedThemeId}&date=${date}`)
            .then(response => response.json())
            .then(times => {
                const timeList = document.getElementById('time-list');
                if (times.length === 0) {
                    timeList.innerHTML = '<p class="text-danger">해당 날짜에 가능한 시간이 없습니다.</p>';
                    return;
                }
                timeList.innerHTML = times.map(time => `
                    <div class="col-4">
                        <div class="border rounded p-2 text-center time-slot ${time.isNotReserved ? '' : 'disabled bg-light text-muted'}"
                             data-id="${time.id}"
                             ${!time.isNotReserved ? 'style="pointer-events: none;"' : ''}>
                            ${time.startAt}
                        </div>
                    </div>
                `).join('');

                document.querySelectorAll('.time-slot:not(.disabled)').forEach(slot => {
                    slot.addEventListener('click', function() {
                        document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                        this.classList.add('selected');
                        selectedTimeId = this.dataset.id;
                        checkValidation();
                    });
                });
            });
    }

    function checkValidation() {
        const name = document.getElementById('reservation-name').value;
        document.getElementById('submit-reservation').disabled = !(selectedThemeId && selectedTimeId && name);
    }

    document.getElementById('reservation-name').addEventListener('input', checkValidation);

    function submitReservation() {
        const name = document.getElementById('reservation-name').value;
        const date = document.getElementById('reservation-date').value;

        const payload = {
            name: name,
            date: date,
            timeId: parseInt(selectedTimeId),
            themeId: parseInt(selectedThemeId)
        };

        fetch('/reservations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(response => {
            if (response.ok) return response.json();
            return response.json().then(err => { throw new Error(err.message || '예약 실패'); });
        })
        .then(data => {
            document.getElementById('modal-reservation-id').textContent = data.id;
            document.getElementById('modal-reservation-name').textContent = data.name;
            document.getElementById('modal-reservation-date').textContent = data.date;
            document.getElementById('modal-reservation-time').textContent = data.time.startAt;
            document.getElementById('modal-reservation-theme').textContent = data.theme.name;
            new bootstrap.Modal(document.getElementById('successModal')).show();
        })
        .catch(error => alert(error.message));
    }
</script>
</body>
</html>
