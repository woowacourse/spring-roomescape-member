<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 예약</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            background: #f5f5f7;
            color: #1d1d1f;
        }

        header {
            background: #1d1d1f;
            color: #fff;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
        }

        header a {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
        }

        header a:hover {
            color: #fff;
        }

        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 40px;
        }

        .search-box {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            display: flex;
            gap: 8px;
        }

        input[type="date"], input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            outline: none;
            font-family: inherit;
        }

        input[type="date"]:focus, input[type="text"]:focus {
            border-color: #007aff;
        }

        .step-label {
            font-size: 13px;
            font-weight: 600;
            color: #007aff;
            margin: 16px 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 8px;
        }

        .time-btn {
            padding: 12px;
            background: #f0f0f3;
            border: 2px solid transparent;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }

        .time-btn:hover {
            background: #e8e8ed;
        }

        .time-btn.selected {
            background: #007aff;
            color: #fff;
        }

        .btn {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
        }

        .btn-primary {
            background: #007aff;
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            background: #0066cc;
        }

        .btn-primary:disabled {
            background: #d2d2d7;
            cursor: not-allowed;
        }

        .btn-light {
            background: #f0f0f3;
            color: #1d1d1f;
        }

        .btn-light:hover {
            background: #e8e8ed;
        }

        .btn-danger {
            background: #fff0f0;
            color: #ff3b30;
        }

        .btn-danger:hover {
            background: #ffe0e0;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #007aff;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            margin-top: 16px;
        }

        .submit-btn:hover:not(:disabled) {
            background: #0066cc;
        }

        .submit-btn:disabled {
            background: #d2d2d7;
            cursor: not-allowed;
        }

        .res-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 16px;
        }

        .res-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }

        .res-theme {
            margin: 0 0 6px;
            font-size: 17px;
            font-weight: 600;
        }

        .res-when {
            margin: 0;
            color: #666;
            font-size: 14px;
        }

        .res-actions {
            display: flex;
            gap: 8px;
        }

        .res-edit {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #ececec;
        }

        .empty, .error {
            color: #999;
            font-size: 14px;
            padding: 16px 0;
        }

        .error {
            color: #ff3b30;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<header>
    <h1>🔑 내 예약</h1>
    <a href="index.html">← 메인으로</a>
</header>
<main>
    <div class="search-box">
        <input id="name-input" maxlength="30" placeholder="예약자 이름을 입력하세요" type="text">
        <button class="btn btn-primary" id="search-btn">조회</button>
    </div>
    <div id="results">
        <p class="empty">이름으로 본인의 예약을 조회하세요.</p>
    </div>
</main>

<script>
    let currentName = '';

    document.getElementById('search-btn').addEventListener('click', search);
    document.getElementById('name-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') search();
    });

    async function errorMessage(res) {
        const body = await res.json().catch(() => ({}));
        return body.message || `서버 오류 (${res.status})`;
    }

    async function search() {
        const name = document.getElementById('name-input').value.trim();
        const container = document.getElementById('results');
        if (!name) {
            container.innerHTML = '<p class="empty">이름을 입력하세요.</p>';
            return;
        }
        currentName = name;
        container.innerHTML = '<p class="empty">불러오는 중...</p>';
        try {
            const res = await fetch(`/user/reservations?name=${encodeURIComponent(name)}`);
            if (!res.ok) throw new Error(await errorMessage(res));
            render(await res.json());
        } catch (e) {
            container.innerHTML = `<p class="error">예약을 불러오지 못했습니다. ${e.message}</p>`;
        }
    }

    function render(reservations) {
        const container = document.getElementById('results');
        if (reservations.length === 0) {
            container.innerHTML = `<p class="empty">${currentName} 님의 예약이 없습니다.</p>`;
            return;
        }
        container.innerHTML = reservations.map(cardHtml).join('');
        container.querySelectorAll('.res-card').forEach(setupCard);
    }

    function cardHtml(r) {
        return `
            <div class="res-card" data-id="${r.id}" data-theme-id="${r.theme.id}">
                <div class="res-head">
                    <div>
                        <p class="res-theme">${r.theme.name}</p>
                        <p class="res-when">${r.date} · ${r.time.startAt}</p>
                    </div>
                    <div class="res-actions">
                        <button class="btn btn-light btn-edit">변경</button>
                        <button class="btn btn-danger btn-cancel">취소</button>
                    </div>
                </div>
                <div class="res-edit hidden">
                    <p class="step-label">새 날짜</p>
                    <input type="date" class="edit-date">
                    <p class="step-label">새 시간</p>
                    <div class="edit-times time-grid">
                        <p class="empty">날짜를 먼저 선택하세요.</p>
                    </div>
                    <button class="submit-btn btn-save" disabled>변경 저장</button>
                </div>
            </div>
        `;
    }

    function setupCard(card) {
        card.querySelector('.btn-cancel').addEventListener('click', () => cancel(card.dataset.id));
        card.querySelector('.btn-edit').addEventListener('click', () => {
            card.querySelector('.res-edit').classList.toggle('hidden');
        });

        const dateInput = card.querySelector('.edit-date');
        dateInput.min = new Date().toISOString().split('T')[0];
        dateInput.addEventListener('change', () => loadEditTimes(card));

        card.querySelector('.btn-save').addEventListener('click', () => saveEdit(card));
    }

    async function cancel(id) {
        if (!confirm('이 예약을 취소하시겠습니까?')) return;
        try {
            const res = await fetch(`/user/reservations/${id}?name=${encodeURIComponent(currentName)}`, {
                method: 'DELETE'
            });
            if (!res.ok) throw new Error(await errorMessage(res));
            search();
        } catch (e) {
            alert('취소에 실패했습니다. ' + e.message);
        }
    }

    async function loadEditTimes(card) {
        const themeId = card.dataset.themeId;
        const date = card.querySelector('.edit-date').value;
        const grid = card.querySelector('.edit-times');
        const saveBtn = card.querySelector('.btn-save');

        delete card.dataset.selectedTimeId;
        saveBtn.disabled = true;

        if (!date) {
            grid.innerHTML = '<p class="empty">날짜를 먼저 선택하세요.</p>';
            return;
        }
        grid.innerHTML = '<p class="empty">불러오는 중...</p>';

        try {
            const res = await fetch(`/user/themes/${themeId}/available-times?date=${date}`);
            if (!res.ok) throw new Error(await errorMessage(res));
            const times = await res.json();

            if (times.length === 0) {
                grid.innerHTML = '<p class="empty">예약 가능한 시간이 없습니다.</p>';
                return;
            }
            grid.innerHTML = times.map(t =>
                `<button class="time-btn" data-id="${t.id}">${t.startAt}</button>`
            ).join('');

            grid.querySelectorAll('.time-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    grid.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    card.dataset.selectedTimeId = btn.dataset.id;
                    saveBtn.disabled = false;
                });
            });
        } catch (e) {
            grid.innerHTML = `<p class="error">시간을 불러오지 못했습니다. ${e.message}</p>`;
        }
    }

    async function saveEdit(card) {
        const id = card.dataset.id;
        const date = card.querySelector('.edit-date').value;
        const timeId = card.dataset.selectedTimeId;
        if (!date || !timeId) return;

        const saveBtn = card.querySelector('.btn-save');
        saveBtn.disabled = true;

        try {
            const res = await fetch(`/user/reservations/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: currentName,
                    date: date,
                    timeId: Number(timeId)
                })
            });
            if (!res.ok) throw new Error(await errorMessage(res));
            alert('예약이 변경되었습니다.');
            search();
        } catch (e) {
            alert('변경에 실패했습니다. ' + e.message);
            saveBtn.disabled = false;
        }
    }
</script>
</body>
</html>
