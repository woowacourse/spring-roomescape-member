<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>내 예약 취소 - Roomescape</title>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="/styles.css" rel="stylesheet" />
</head>
<body>
<main class="page">
  <header class="hero">
    <p class="eyebrow">ROOMESCAPE</p>
    <h1>내 예약 취소</h1>
    <p>본인 인증용 이름을 입력한 뒤 최종 삭제를 진행해 주세요.</p>
    <p><a class="admin-link" href="/index.html">사용자 예약 페이지로 돌아가기</a></p>
  </header>

  <section class="panel">
    <h2>예약 취소 확인</h2>
    <p id="reservationInfo">삭제할 예약 정보를 불러오는 중입니다.</p>
    <form class="grid-form" id="cancelForm">
      <input id="authName" maxlength="10" name="authName" placeholder="인증용 이름" required />
      <button class="danger" id="cancelReservation" type="submit">최종 삭제</button>
    </form>
  </section>

  <p class="message" id="message"></p>
</main>
<script src="/reservation-cancel.js"></script>
</body>
</html>
