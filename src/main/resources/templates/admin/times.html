<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>시간 관리 - 방탈출</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5">
    <h2 class="fw-bold mb-4">시간 관리</h2>

    <!-- 추가 폼 -->
    <div class="card shadow-sm mb-4">
        <div class="card-header fw-semibold">시간 추가</div>
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label">시작 시간</label>
                    <input type="time" id="startAt" class="form-control">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="addTime()">추가</button>
                </div>
            </div>
            <div id="add-error" class="alert alert-danger mt-3 d-none"></div>
        </div>
    </div>

    <!-- 목록 -->
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>시작 시간</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="time-list"></tbody>
            </table>
        </div>
    </div>

    <div id="empty-msg" class="text-center text-muted py-4 d-none">등록된 시간이 없습니다.</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadTimes() {
        const res = await fetch('/times');
        const times = await res.json();
        const tbody = document.getElementById('time-list');
        tbody.innerHTML = '';

        if (times.length === 0) {
            document.getElementById('empty-msg').classList.remove('d-none');
            return;
        }
        document.getElementById('empty-msg').classList.add('d-none');

        times.forEach(t => {
            tbody.innerHTML += `
                <tr>
                    <td class="align-middle">${t.id}</td>
                    <td class="align-middle">${t.startAt}</td>
                    <td class="align-middle text-end">
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteTime(${t.id})">삭제</button>
                    </td>
                </tr>`;
        });
    }

    async function addTime() {
        const startAt = document.getElementById('startAt').value;
        if (!startAt) { showAddError('시작 시간을 입력해주세요.'); return; }

        const res = await fetch('/times?role=admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ startAt })
        });

        if (res.ok) {
            document.getElementById('startAt').value = '';
            document.getElementById('add-error').classList.add('d-none');
            loadTimes();
        } else {
            const err = await res.json();
            showAddError(Array.isArray(err.message) ? err.message.join(', ') : err.message);
        }
    }

    async function deleteTime(id) {
        if (!confirm('시간을 삭제하시겠습니까?')) return;
        await fetch(`/times/${id}?role=admin`, { method: 'DELETE' });
        loadTimes();
    }

    function showAddError(msg) {
        const el = document.getElementById('add-error');
        el.textContent = msg;
        el.classList.remove('d-none');
    }

    loadTimes();
</script>
</body>
</html>
