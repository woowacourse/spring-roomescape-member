<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('예약 관리')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <h1>예약 관리</h1>

    <div class="form-inline">
        <div class="form-row">
            <label for="r-name">이름</label>
            <input type="text" id="r-name"/>
        </div>
        <div class="form-row">
            <label for="r-date">날짜</label>
            <input type="date" id="r-date"/>
        </div>
        <div class="form-row">
            <label for="r-time">시간</label>
            <select id="r-time">
                <option value="">선택</option>
                <option th:each="t : ${times}" th:value="${t.id()}" th:text="${t.startAt()}"></option>
            </select>
        </div>
        <div class="form-row">
            <label for="r-theme">테마</label>
            <select id="r-theme">
                <option value="">선택</option>
                <option th:each="th : ${themes}" th:value="${th.id()}" th:text="${th.name()}"></option>
            </select>
        </div>
        <button id="add-btn" class="btn" type="button">추가</button>
    </div>

    <table class="data-table">
        <thead>
        <tr><th>번호</th><th>이름</th><th>날짜</th><th>시간</th><th>테마</th><th></th></tr>
        </thead>
        <tbody id="rows">
        <tr th:each="r : ${reservations}" th:attr="data-id=${r.id()}">
            <td th:text="${r.id()}"></td>
            <td th:text="${r.name()}"></td>
            <td th:text="${r.date()}"></td>
            <td th:text="${r.time().startAt()}"></td>
            <td th:text="${r.theme().name()}"></td>
            <td><button class="btn btn-danger btn-sm delete-btn" type="button">삭제</button></td>
        </tr>
        </tbody>
    </table>
</main>

<script th:src="@{/js/admin-reservation.js}"></script>
</body>
</html>
