<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 페이지</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .management-header { border-bottom: 1px solid #dee2e6; }
    .section-title { font-size: 1.5rem; font-weight: 600; }
    .table img { width: 72px; height: 48px; object-fit: cover; border-radius: 5px; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Roomescape</a>
    <div class="navbar-nav">
      <a class="nav-link" href="/">테마예약</a>
      <a class="nav-link active" href="/admin">관리자패널</a>
    </div>
  </div>
</nav>

<header class="management-header bg-white py-4">
  <div class="container d-flex justify-content-between align-items-center gap-3">
    <div>
      <h1 class="h2 mb-1">관리자 페이지</h1>
      <p class="text-muted mb-0">예약, 테마, 예약 시간을 관리합니다.</p>
    </div>
    <button type="button" class="btn btn-outline-dark" onclick="location.href='/'">뒤로가기</button>
  </div>
</header>

<main class="container my-5">
  <section class="mb-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="section-title mb-0">전체 예약 관리</h2>
      <button type="button" class="btn btn-outline-secondary btn-sm" onclick="loadReservations()">새로고침</button>
    </div>
    <form id="reservationForm" class="row g-2 bg-white border rounded p-3 mb-3">
      <div class="col-md-3">
        <label for="reservationName" class="form-label">예약자 이름</label>
        <input type="text" id="reservationName" class="form-control" required>
      </div>
      <div class="col-md-3">
        <label for="reservationDate" class="form-label">날짜</label>
        <input type="date" id="reservationDate" class="form-control" required>
      </div>
      <div class="col-md-3">
        <label for="reservationThemeId" class="form-label">테마</label>
        <select id="reservationThemeId" class="form-select" required>
          <option value="">테마를 선택하세요</option>
        </select>
      </div>
      <div class="col-md-2">
        <label for="reservationTimeId" class="form-label">시간</label>
        <select id="reservationTimeId" class="form-select" required>
          <option value="">날짜와 테마를 선택하세요</option>
        </select>
      </div>
      <div class="col-md-1 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100">추가</button>
      </div>
    </form>
    <div class="table-responsive bg-white border rounded">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
        <tr>
          <th>ID</th><th>이름</th><th>날짜</th><th>테마</th><th>시간</th><th>삭제</th>
        </tr>
        </thead>
        <tbody id="reservationList">
        <tr><td colspan="6" class="text-center text-muted py-4">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <section class="mb-5">
    <h2 class="section-title mb-3">테마 관리</h2>
    <form id="themeForm" class="row g-2 bg-white border rounded p-3 mb-3">
      <div class="col-md-2">
        <label for="themeName" class="form-label">이름</label>
        <input type="text" id="themeName" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label for="themeDescription" class="form-label">설명</label>
        <input type="text" id="themeDescription" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label for="themeImageUrl" class="form-label">이미지 URL</label>
        <input type="url" id="themeImageUrl" class="form-control" required>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100">테마 추가</button>
      </div>
    </form>
    <div class="table-responsive bg-white border rounded">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
        <tr>
          <th>ID</th><th>이미지</th><th>이름</th><th>설명</th><th>삭제</th>
        </tr>
        </thead>
        <tbody id="themeList">
        <tr><td colspan="5" class="text-center text-muted py-4">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <section>
    <h2 class="section-title mb-3">예약 시간 관리</h2>
    <form id="timeForm" class="row g-2 bg-white border rounded p-3 mb-3">
      <div class="col-md-10">
        <label for="startAt" class="form-label">시작 시간</label>
        <input type="time" id="startAt" class="form-control" required>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button type="submit" class="btn btn-primary w-100">시간 추가</button>
      </div>
    </form>
    <div class="table-responsive bg-white border rounded">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light">
        <tr>
          <th>ID</th><th>시작 시간</th><th>삭제</th>
        </tr>
        </thead>
        <tbody id="timeList">
        <tr><td colspan="3" class="text-center text-muted py-4">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<script>
  function emptyRow(colspan, message) {
    return `<tr><td colspan="${colspan}" class="text-center text-muted py-4">${message}</td></tr>`;
  }

  async function requestJson(url, options = {}) {
    const response = await fetch(url, options);
    if (!response.ok) {
      throw new Error('요청 처리에 실패했습니다.');
    }
    if (response.status === 204 || response.headers.get('content-length') === '0') {
      return null;
    }
    return response.json();
  }

  async function requestOk(url, options = {}) {
    const response = await fetch(url, options);
    if (!response.ok) {
      throw new Error('요청 처리에 실패했습니다.');
    }
  }

  async function loadReservations() {
    try {
      const data = await requestJson('/api/admin/reservations');
      const list = document.getElementById('reservationList');

      if (data.length === 0) {
        list.innerHTML = emptyRow(6, '등록된 예약이 없습니다.');
        return;
      }

      list.innerHTML = data.map(res => `
          <tr>
              <td>${res.id}</td>
              <td>${res.name}</td>
              <td>${res.date}</td>
              <td>${res.theme.name}</td>
              <td>${res.time.startAt}</td>
              <td><button class="btn btn-danger btn-sm" onclick="deleteReservation(${res.id})">삭제</button></td>
          </tr>
      `).join('');
    } catch (error) {
      document.getElementById('reservationList').innerHTML = emptyRow(6, '예약 목록을 불러오지 못했습니다.');
    }
  }

  async function deleteReservation(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    try {
      await requestOk(`/api/admin/reservations/${id}`, { method: 'DELETE' });
      await loadReservations();
      await loadAvailableReservationTimes();
    } catch (error) {
      alert('예약 삭제에 실패했습니다.');
    }
  }

  async function loadThemes() {
    try {
      const themes = await requestJson('/api/themes');
      const list = document.getElementById('themeList');
      const reservationThemeSelect = document.getElementById('reservationThemeId');

      reservationThemeSelect.innerHTML = '<option value="">테마를 선택하세요</option>' +
          themes.map(theme => `<option value="${theme.id}">${theme.name}</option>`).join('');

      if (themes.length === 0) {
        list.innerHTML = emptyRow(5, '등록된 테마가 없습니다.');
        return;
      }

      list.innerHTML = themes.map(theme => `
          <tr>
              <td>${theme.id}</td>
              <td><img src="${theme.imageUrl}" alt="${theme.name}"></td>
              <td>${theme.name}</td>
              <td>${theme.description}</td>
              <td><button class="btn btn-danger btn-sm" onclick="deleteTheme(${theme.id})">삭제</button></td>
          </tr>
      `).join('');
    } catch (error) {
      document.getElementById('themeList').innerHTML = emptyRow(5, '테마 목록을 불러오지 못했습니다.');
    }
  }

  async function loadAvailableReservationTimes() {
    const date = document.getElementById('reservationDate').value;
    const themeId = document.getElementById('reservationThemeId').value;
    const timeSelect = document.getElementById('reservationTimeId');

    if (!date || !themeId) {
      timeSelect.innerHTML = '<option value="">날짜와 테마를 선택하세요</option>';
      return;
    }

    try {
      const params = new URLSearchParams({ date, themeId });
      const times = await requestJson(`/api/times?${params.toString()}`);

      if (times.length === 0) {
        timeSelect.innerHTML = '<option value="">예약 가능한 시간이 없습니다</option>';
        return;
      }

      timeSelect.innerHTML = '<option value="">시간을 선택하세요</option>' +
          times.map(time => `<option value="${time.id}">${time.startAt}</option>`).join('');
    } catch (error) {
      timeSelect.innerHTML = '<option value="">시간을 불러오지 못했습니다</option>';
    }
  }

  async function createReservation(event) {
    event.preventDefault();

    const body = {
      name: document.getElementById('reservationName').value,
      date: document.getElementById('reservationDate').value,
      themeId: document.getElementById('reservationThemeId').value,
      timeId: document.getElementById('reservationTimeId').value
    };

    try {
      await requestJson('/api/reservations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      event.target.reset();
      document.getElementById('reservationTimeId').innerHTML = '<option value="">날짜와 테마를 선택하세요</option>';
      await loadReservations();
    } catch (error) {
      alert('예약 추가에 실패했습니다.');
    }
  }

  async function createTheme(event) {
    event.preventDefault();

    const body = {
      name: document.getElementById('themeName').value,
      description: document.getElementById('themeDescription').value,
      imageUrl: document.getElementById('themeImageUrl').value
    };

    try {
      await requestJson('/api/admin/themes', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      event.target.reset();
      await loadThemes();
    } catch (error) {
      alert('테마 추가에 실패했습니다.');
    }
  }

  async function deleteTheme(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    try {
      await requestOk(`/api/admin/themes/${id}`, { method: 'DELETE' });
      await loadThemes();
    } catch (error) {
      alert('테마 삭제에 실패했습니다.');
    }
  }

  async function loadTimes() {
    try {
      const times = await requestJson('/api/admin/times');
      const list = document.getElementById('timeList');

      if (times.length === 0) {
        list.innerHTML = emptyRow(3, '등록된 시간이 없습니다.');
        return;
      }

      list.innerHTML = times.map(time => `
          <tr>
              <td>${time.id}</td>
              <td>${time.startAt}</td>
              <td><button class="btn btn-danger btn-sm" onclick="deleteTime(${time.id})">삭제</button></td>
          </tr>
      `).join('');
    } catch (error) {
      document.getElementById('timeList').innerHTML = emptyRow(3, '시간 목록을 불러오지 못했습니다.');
    }
  }

  async function createTime(event) {
    event.preventDefault();

    try {
      await requestJson('/api/admin/times', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ startAt: document.getElementById('startAt').value })
      });
      event.target.reset();
      await loadTimes();
      await loadAvailableReservationTimes();
    } catch (error) {
      alert('시간 추가에 실패했습니다.');
    }
  }

  async function deleteTime(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    try {
      await requestOk(`/api/admin/times/${id}`, { method: 'DELETE' });
      await loadTimes();
      await loadAvailableReservationTimes();
    } catch (error) {
      alert('시간 삭제에 실패했습니다.');
    }
  }

  document.getElementById('reservationForm').addEventListener('submit', createReservation);
  document.getElementById('reservationDate').addEventListener('change', loadAvailableReservationTimes);
  document.getElementById('reservationThemeId').addEventListener('change', loadAvailableReservationTimes);
  document.getElementById('themeForm').addEventListener('submit', createTheme);
  document.getElementById('timeForm').addEventListener('submit', createTime);

  window.onload = () => {
    loadReservations();
    loadThemes();
    loadTimes();
  };
</script>
</body>
</html>
