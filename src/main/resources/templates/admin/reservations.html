<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>관리자 페이지</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>전체 예약 관리</h2>
<table class="table mt-4">
  <thead>
  <tr>
    <th>ID</th><th>이름</th><th>날짜</th><th>테마</th><th>시간</th><th>삭제</th>
  </tr>
  </thead>
  <tbody id="reservationList">
  <!-- JavaScript로 데이터를 채움 -->
  </tbody>
</table>

<script>
  async function loadReservations() {
    const response = await fetch('/api/admin/reservations');
    const data = await response.json();
    const list = document.getElementById('reservationList');

    list.innerHTML = data.map(res => `
                <tr>
                    <td>${res.id}</td>
                    <td>${res.name}</td>
                    <td>${res.date}</td>
                    <td>${res.theme.name}</td>
                    <td>${res.time.startAt}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteRes(${res.id})">삭제</button></td>
                </tr>
            `).join('');
  }

  async function deleteRes(id) {
    if (!confirm('정말 삭제하시겠습니까?')) return;
    const response = await fetch(`/api/admin/reservations/${id}`, { method: 'DELETE' });
    if (response.ok) loadReservations();
  }

  window.onload = loadReservations;
</script>
</body>
</html>
