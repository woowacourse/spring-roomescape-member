<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>예약 관리 - 관리자 페이지</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<!-- 공통 네비게이션 바 -->
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">예약 관리</h2>
        <span class="badge bg-secondary">Admin Mode</span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">ID</th>
                    <th>예약자</th>
                    <th>날짜</th>
                    <th>시간</th>
                    <th>테마</th>
                    <th class="text-end pe-4">관리</th>
                </tr>
                </thead>
                <tbody id="reservation-list">
                <!-- 데이터가 자바스크립트에 의해 여기에 삽입됩니다 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 데이터가 없을 때 표시될 메시지 -->
    <div id="empty-msg" class="text-center text-muted py-5 d-none">
        <p class="fs-5 mb-0">조회된 예약 내역이 없습니다.</p>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    /**
     * 전체 예약 목록 로드
     */
    async function loadReservations() {
        try {
            const res = await fetch('/reservations');
            if (!res.ok) throw new Error("데이터를 불러오는데 실패했습니다.");

            const data = await res.json();

            // 💡 백엔드 DTO 구조 반영: data가 아닌 data.reservations 배열 사용
            const reservations = data.reservations || [];
            const tbody = document.getElementById('reservation-list');
            const emptyMsg = document.getElementById('empty-msg');

            tbody.innerHTML = '';

            if (reservations.length === 0) {
                emptyMsg.classList.remove('d-none');
                return;
            }
            emptyMsg.classList.add('d-none');

            reservations.forEach(r => {
                tbody.innerHTML += `
                    <tr>
                        <td class="align-middle ps-4">${r.id}</td>
                        <td class="align-middle fw-semibold">${r.name}</td>
                        <td class="align-middle">${r.date}</td>
                        <td class="align-middle">${r.time.startAt}</td>
                        <td class="align-middle">
                            <span class="badge bg-outline-primary text-primary border border-primary">${r.theme.name}</span>
                        </td>
                        <td class="align-middle text-end pe-4">
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteReservation(${r.id})">삭제</button>
                        </td>
                    </tr>`;
            });
        } catch (error) {
            console.error("Error:", error);
            alert("예약 목록을 불러오는 중 오류가 발생했습니다.");
        }
    }

    /**
     * 관리자 권한으로 예약 삭제
     */
    async function deleteReservation(id) {
        if (!confirm(`${id}번 예약을 삭제하시겠습니까?`)) return;

        try {
            // 💡 관리자용 API 규칙: ?role=admin 쿼리 파라미터 포함
            const res = await fetch(`/reservations/${id}?role=admin`, {
                method: 'DELETE'
            });

            if (res.ok) {
                alert("삭제되었습니다.");
                loadReservations(); // 목록 새로고침
            } else {
                const err = await res.json();
                alert(err.message || "삭제에 실패했습니다.");
            }
        } catch (error) {
            console.error("Delete Error:", error);
            alert("서버와 통신 중 오류가 발생했습니다.");
        }
    }

    // 페이지 로드 시 즉시 실행
    document.addEventListener('DOMContentLoaded', loadReservations);
</script>
</body>
</html>
