<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>예약 관리 - 방탈출</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5">
    <h2 class="fw-bold mb-4">예약 관리</h2>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>이름</th>
                        <th>날짜</th>
                        <th>시간</th>
                        <th>테마</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="reservation-list"></tbody>
            </table>
        </div>
    </div>

    <div id="empty-msg" class="text-center text-muted py-4 d-none">예약 내역이 없습니다.</div>
    <div id="delete-error" class="alert alert-danger mt-3 d-none"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function loadReservations() {
        const res = await fetch('/reservations');
        const reservations = await res.json();
        const tbody = document.getElementById('reservation-list');
        tbody.innerHTML = '';

        if (reservations.length === 0) {
            document.getElementById('empty-msg').classList.remove('d-none');
            return;
        }

        reservations.forEach(r => {
            tbody.innerHTML += `
                <tr>
                    <td class="align-middle">${r.id}</td>
                    <td class="align-middle">${r.name}</td>
                    <td class="align-middle">${r.date}</td>
                    <td class="align-middle">${r.time.startAt}</td>
                    <td class="align-middle">${r.theme.name}</td>
                    <td class="align-middle text-end">
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteReservation(${r.id}, '${r.name}')">삭제</button>
                    </td>
                </tr>`;
        });
    }

    async function deleteReservation(id, name) {
        if (!confirm('예약을 삭제하시겠습니까?')) return;
        document.getElementById('delete-error').classList.add('d-none');

        const res = await fetch(`/reservations/${id}?name=${encodeURIComponent(name)}`, { method: 'DELETE' });
        if (res.ok) {
            loadReservations();
        } else {
            const err = await res.json();
            const msg = Array.isArray(err.message) ? err.message.join(', ') : err.message;
            const el = document.getElementById('delete-error');
            el.textContent = msg;
            el.classList.remove('d-none');
        }
    }

    loadReservations();
</script>
</body>
</html>
