<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="data:,"/>
    <title>관리자 — 예약</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header th:replace="~{fragments/site :: siteHeader}"></header>
<main>
    <h1>예약 목록</h1>
    <p class="muted"><a th:href="@{/view/admin}">← 관리자 홈</a></p>
    <div class="panel">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>이름</th>
                <th>날짜</th>
                <th>시간 ID</th>
                <th>시작</th>
                <th>테마</th>
                <th>취소 가능</th>
                <th></th>
            </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
        <p id="empty" class="muted" style="display:none;">등록된 예약이 없습니다.</p>
        <p id="err" class="status-msg err" style="display:none;"></p>
    </div>
</main>
<script>
    const tbody = document.getElementById('rows');
    const empty = document.getElementById('empty');
    const err = document.getElementById('err');

    async function load() {
        err.style.display = 'none';
        try {
            const res = await fetch('/admin/reservations');
            if (!res.ok) throw new Error('조회 실패');
            const list = await res.json();
            tbody.innerHTML = '';
            empty.style.display = list.length ? 'none' : 'block';
            for (const r of list) {
                const canCancel = !!r.cancelable;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.id}</td>
                    <td>${escapeHtml(r.name)}</td>
                    <td>${r.date}</td>
                    <td>${r.time.id}</td>
                    <td>${r.time.startAt}</td>
                    <td>${escapeHtml(r.theme.name)}</td>
                    <td>${canCancel ? '가능' : '불가'}</td>
                    <td><button type="button" class="btn btn-danger" data-id="${r.id}" ${canCancel ? '' : 'disabled'}>취소</button></td>`;
                tbody.appendChild(tr);
            }
            tbody.querySelectorAll('button[data-id]').forEach(btn => {
                btn.addEventListener('click', () => cancelReservation(btn.dataset.id));
            });
        } catch (e) {
            err.textContent = e.message;
            err.style.display = 'block';
        }
    }

    async function cancelReservation(id) {
        if (!confirm('이 예약을 취소할까요?')) return;
        err.style.display = 'none';
        try {
            const res = await fetch('/admin/reservations/' + id, {method: 'DELETE'});
            if (!res.ok) throw new Error('취소 실패');
            await load();
        } catch (e) {
            err.textContent = e.message;
            err.style.display = 'block';
        }
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    load();
</script>
</body>
</html>
