<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>관리자 — 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header th:replace="~{fragments/site :: siteHeader}"></header>
<main>
    <h1>관리자</h1>
    <p class="lead">API와 동일한 JSON 엔드포인트(<code>/times</code>, <code>/themes</code>, <code>/reservations</code>)를 화면에서 호출합니다.</p>
    <div class="card-grid">
        <article class="card">
            <h2>예약 시간</h2>
            <p>시작 시각을 등록하고 목록에서 삭제합니다.</p>
            <a class="btn btn-primary" th:href="@{/admin/times}">시간 관리</a>
        </article>
        <article class="card">
            <h2>테마</h2>
            <p>이름, 설명, 썸네일 URL로 테마를 추가·삭제합니다.</p>
            <a class="btn btn-primary" th:href="@{/admin/themes}">테마 관리</a>
        </article>
        <article class="card">
            <h2>예약</h2>
            <p>등록된 예약을 조회하고 삭제합니다.</p>
            <a class="btn btn-primary" th:href="@{/admin/reservations}">예약 목록</a>
        </article>
    </div>
</main>
</body>
</html>
