<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>예약 신청</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<div style="max-width: 500px; margin: auto;">
  <h3>방탈출 예약</h3>
  <form id="resForm" class="mt-4">
    <div class="mb-3">
      <label>이름</label>
      <input type="text" id="name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">선택한 테마</label>
      <select id="themeSelect" class="form-select" disabled>
        <!-- JS가 selectedTheme.name을 여기에 채울 것입니다 -->
        <option id="themeOption">테마 로딩 중...</option>
      </select>

      <!-- 폼 전송 시 themeId가 담길 곳 (ID를 'themeId'로 통일) -->
      <input type="hidden" id="themeId">
    </div>
    <div class="mb-3">
      <label>날짜</label>
      <input type="date" id="date" class="form-control" onchange="loadTimes()" required>
    </div>
    <div class="mb-3">
      <label>시간</label>
      <select id="timeId" class="form-select" required>
        <option value="">날짜와 테마를 선택하세요</option>
      </select>
    </div>
    <button type="button" class="btn btn-primary w-100" onclick="submitReservation()">예약하기</button>
  </form>
</div>

<script>
  // 공통 함수: 요소의 값을 안전하게 가져오기
  function getVal(id) {
    const el = document.getElementById(id);
    if (!el) {
      console.error(`ID가 '${id}'인 요소를 찾을 수 없습니다.`);
      return null;
    }
    return el.value;
  }

  document.addEventListener('DOMContentLoaded', async () => {
    const urlParams = new URLSearchParams(window.location.search);
    const themeIdFromUrl = urlParams.get('themeId');

    if (!themeIdFromUrl) {
      alert('잘못된 접근입니다.');
      location.href = '/';
      return;
    }

    // 1. 전송용 hidden input에 URL의 themeId를 즉시 주입
    const hiddenInput = document.getElementById('themeId');
    if (hiddenInput) {
      hiddenInput.value = themeIdFromUrl;
    }

    // 2. 테마 정보 fetch
    try {
      const response = await fetch(`/api/themes`);
      const themes = await response.json();
      const selectedTheme = themes.find(t => t.id == themeIdFromUrl);

      if (selectedTheme) {
        const themeOption = document.getElementById('themeOption');
        if (themeOption) {
          themeOption.innerText = selectedTheme.name;
          themeOption.value = selectedTheme.id; // option에도 id 부여
        }
      }
    } catch (error) {
      console.error('테마 정보를 불러오는데 실패했습니다:', error);
    }
  });

  // 날짜 변경 시 호출
  async function loadTimes() {
    const date = getVal('date');
    const themeId = getVal('themeId'); // hidden input 값 읽기

    if (!date || !themeId) return;

    try {
      const response = await fetch(`/api/times?date=${date}&themeId=${themeId}`);
      const times = await response.json();

      const timeSelect = document.getElementById('timeId');
      if (!timeSelect) return;

      if (times.length === 0) {
        timeSelect.innerHTML = '<option value="">예약 가능한 시간이 없습니다</option>';
        return;
      }

      timeSelect.innerHTML = times.map(t => `<option value="${t.id}">${t.startAt}</option>`).join('');
    } catch (error) {
      console.error("시간 로드 중 오류:", error);
    }
  }

  // 예약 생성 요청
  async function submitReservation() {
    const name = getVal('name');
    const date = getVal('date');
    const timeId = getVal('timeId');
    const themeId = getVal('themeId');

    if (!name || !date || !timeId || !themeId) {
      alert("모든 항목을 입력해주세요.");
      return;
    }

    const body = { name, date, timeId, themeId };

    try {
      const response = await fetch('/api/reservations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (response.ok) {
        alert('예약이 완료되었습니다!');
        location.href = '/'; // reload 대신 메인 이동 권장
      } else {
        const errorData = await response.json();
        alert('예약 실패: ' + (errorData.message || '알 수 없는 오류'));
      }
    } catch (error) {
      console.error("전송 중 오류:", error);
    }
  }
</script>
</body>
</html>
