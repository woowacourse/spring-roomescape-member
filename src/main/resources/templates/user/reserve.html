<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="data:,"/>
    <title>사용자 — 예약</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header th:replace="~{fragments/site :: siteHeader}"></header>
<main>
    <h1>예약하기</h1>
    <p class="muted"><a th:href="@{/view/user}">← 사용자 홈</a></p>
    <div class="panel">
        <h2>1. 날짜</h2>
        <div class="form-row">
            <label>게임 날짜
                <input type="date" id="gameDate"/>
            </label>
        </div>
    </div>
    <div class="panel">
        <h2>2. 테마</h2>
        <p id="themeHint" class="muted">테마 목록을 불러오는 중…</p>
        <div id="themePick" class="theme-pick" style="display:none;"></div>
    </div>
    <div class="panel">
        <h2>3. 예약 가능한 시간</h2>
        <p class="muted">같은 날짜·시간이라도 테마가 다르면 각각 예약할 수 있습니다.</p>
        <div id="timeChips" class="time-chips"></div>
        <p id="timeHint" class="muted">날짜와 테마를 먼저 선택하세요.</p>
    </div>
    <div class="panel">
        <h2>4. 이름으로 예약</h2>
        <div class="form-row">
            <label>예약자 이름
                <input type="text" id="memberName" maxlength="255" placeholder="이름"/>
            </label>
            <button type="button" class="btn btn-primary" id="submitBtn" disabled>예약 요청</button>
        </div>
        <p id="status" class="status-msg" style="display:none;"></p>
    </div>
    <details class="dev-panel">
        <summary>🧪 에러 응답 테스트</summary>
        <p class="trigger-desc">존재하지 않는 UUID로 예약을 시도합니다. → <code>RESERVATION_TIME_NOT_FOUND</code></p>
        <div class="form-row">
            <button type="button" class="btn btn-test" id="triggerErrBtn">존재하지 않는 시간으로 예약 시도</button>
        </div>
        <p id="testErr" class="status-msg" style="display:none;"></p>
    </details>
</main>
<div th:replace="~{fragments/site :: errorModal}"></div>
<script th:src="@{/js/common.js}"></script>
<script>
    const gameDate = document.getElementById('gameDate');
    const themePick = document.getElementById('themePick');
    const themeHint = document.getElementById('themeHint');
    const timeChips = document.getElementById('timeChips');
    const timeHint = document.getElementById('timeHint');
    const memberName = document.getElementById('memberName');
    const submitBtn = document.getElementById('submitBtn');
    const status = document.getElementById('status');

    const ERROR_MESSAGES = {
        BAD_REQUEST: '잘못된 요청입니다.',
        INVALID_INPUT: '입력값이 올바르지 않습니다.',
        INVALID_REQUEST: '요청 형식이 올바르지 않습니다.',
        INVALID_ID: 'ID 형식이 올바르지 않습니다.',
        INVALID_DURATION: '조회 기간이 올바르지 않습니다. 시작일은 종료일보다 늦을 수 없습니다.',
        INVALID_RESERVATION: '예약 정보가 올바르지 않습니다.',
        INVALID_RESERVATION_TIME: '예약 시간 정보가 올바르지 않습니다.',
        INVALID_THEME: '테마 정보가 올바르지 않습니다.',
        TIME_IN_USE: '해당 시간은 예약에 사용 중이라 삭제할 수 없습니다.',
        THEME_IN_USE: '해당 테마는 예약에 사용 중이라 삭제할 수 없습니다.',
        DATA_INTEGRITY_VIOLATION: '데이터 처리 중 오류가 발생했습니다.',
        PAST_RESERVATION: '지난 시간의 예약은 생성·변경·취소할 수 없습니다.',
        NOT_RESERVATION_OWNER: '본인의 예약만 변경하거나 취소할 수 있습니다.',
        RESERVATION_NOT_FOUND: '해당 예약을 찾을 수 없습니다.',
        RESERVATION_TIME_NOT_FOUND: '해당 예약 시간을 찾을 수 없습니다.',
        THEME_NOT_FOUND: '해당 테마를 찾을 수 없습니다.',
        DUPLICATE_RESERVATION: '이미 같은 날짜·시간·테마에 예약이 존재합니다.',
        DATABASE_ERROR: '데이터베이스 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.',
        INTERNAL_SERVER_ERROR: '서버 내부 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.',
    };

    async function readApiError(res) {
        const text = await res.text();
        if (!text) return '요청 실패 (' + res.status + ')';
        try {
            const j = JSON.parse(text);
            if (j && j.errorCode && ERROR_MESSAGES[j.errorCode]) return ERROR_MESSAGES[j.errorCode];
            if (j && j.message) return j.message;
        } catch (_) {}
        return text || '요청 실패 (' + res.status + ')';
    }

    let themes = [];
    let selectedThemeId = null;
    let selectedTimeId = null;
    let availableTimesAbort = null;

    function localYmd(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function showStatus(text, ok) {
        if (!ok) { showErrorModal(text); return; }
        status.textContent = text;
        status.className = 'status-msg ok';
        status.style.display = 'block';
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    function timeChipLabel(startAt) {
        if (typeof startAt === 'string') return startAt.slice(0, 5);
        if (Array.isArray(startAt) && startAt.length >= 2) {
            return String(startAt[0]).padStart(2, '0') + ':' + String(startAt[1]).padStart(2, '0');
        }
        return String(startAt).slice(0, 5);
    }

    async function loadAvailableTimes() {
        timeChips.innerHTML = '';
        selectedTimeId = null;
        submitBtn.disabled = true;
        const dateStr = gameDate.value;
        if (!dateStr || selectedThemeId == null) {
            timeHint.textContent = '날짜와 테마를 먼저 선택하세요.';
            return;
        }
        if (availableTimesAbort) {
            availableTimesAbort.abort();
        }
        availableTimesAbort = new AbortController();
        const { signal } = availableTimesAbort;
        timeHint.textContent = '예약 가능한 시간을 불러오는 중…';
        try {
            const params = new URLSearchParams({
                themeId: String(selectedThemeId),
                date: dateStr
            });
            const res = await fetch('/times/available-times?' + params.toString(), { signal });
            if (!res.ok) throw new Error(await readApiError(res));
            const list = await res.json();
            timeHint.textContent = list.length
                ? '시간을 선택하세요.'
                : '이 날짜·테마에 예약 가능한 시간이 없습니다. (관리자에게 시간 등록을 요청하세요)';
            for (const t of list) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'time-chip';
                btn.textContent = timeChipLabel(t.startAt);
                btn.addEventListener('click', () => {
                    selectedTimeId = t.id;
                    timeChips.querySelectorAll('.time-chip').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    submitBtn.disabled = !memberName.value.trim();
                });
                timeChips.appendChild(btn);
            }
        } catch (e) {
            if (e.name === 'AbortError') return;
            showErrorModal(e.message);
        }
    }

    function renderThemes() {
        themePick.innerHTML = '';
        if (!themes.length) {
            themeHint.textContent = '등록된 테마가 없습니다. 관리자 화면에서 테마를 추가하세요.';
            themePick.style.display = 'none';
            return;
        }
        themeHint.textContent = '테마를 선택하세요.';
        themePick.style.display = 'grid';
        for (const th of themes) {
            const b = document.createElement('button');
            b.type = 'button';
            b.className = 'theme-option' + (selectedThemeId === th.id ? ' selected' : '');
            b.innerHTML = `
                <img src="${escapeHtml(th.imageUrl)}" alt=""/>
                <div class="t-name">${escapeHtml(th.name)}</div>
                <div class="t-desc">${escapeHtml(th.description)}</div>`;
            b.addEventListener('click', () => {
                selectedThemeId = th.id;
                themePick.querySelectorAll('.theme-option').forEach(el => el.classList.remove('selected'));
                b.classList.add('selected');
                void loadAvailableTimes();
            });
            themePick.appendChild(b);
        }
    }

    gameDate.addEventListener('change', () => {
        void loadAvailableTimes();
    });

    memberName.addEventListener('input', () => {
        submitBtn.disabled = !(selectedTimeId && memberName.value.trim());
    });

    submitBtn.addEventListener('click', async () => {
        status.style.display = 'none';
        const body = {
            name: memberName.value.trim(),
            date: gameDate.value,
            timeId: selectedTimeId,
            themeId: selectedThemeId
        };
        try {
            const res = await fetch('/reservations', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error(await readApiError(res));
            showStatus('예약이 완료되었습니다.', true);
            await loadAvailableTimes();
            memberName.value = '';
            submitBtn.disabled = true;
        } catch (e) {
            showStatus(e.message, false);
        }
    });

    (async function init() {
        const today = new Date();
        gameDate.value = localYmd(today);
        try {
            const tr = await fetch('/themes');
            if (!tr.ok) throw new Error(await readApiError(tr));
            themes = await tr.json();
            renderThemes();
            await loadAvailableTimes();
        } catch (e) {
            showErrorModal(e.message);
        }
    })();

    document.getElementById('triggerErrBtn').addEventListener('click', async () => {
        const testErr = document.getElementById('testErr');
        testErr.style.display = 'none';
        try {
            // 존재하지 않는 timeId/themeId(모두 0 UUID)와 미래 날짜로 예약 시도 → RESERVATION_TIME_NOT_FOUND
            const res = await fetch('/reservations', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: '에러테스트',
                    date: '2099-01-01',
                    timeId: '00000000-0000-0000-0000-000000000000',
                    themeId: '00000000-0000-0000-0000-000000000000'
                })
            });
            if (!res.ok) throw new Error(await readApiError(res));
            testErr.textContent = '성공 응답을 받았습니다.';
            testErr.className = 'status-msg ok';
            testErr.style.display = 'block';
        } catch (e) {
            showErrorModal(e.message);
        }
    });
</script>
</body>
</html>
