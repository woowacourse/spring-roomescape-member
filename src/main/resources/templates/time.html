<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>시간 관리 — ESCAPE ROOM ADMIN</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <a href="/theme" class="admin-entry is-admin" title="관리자 페이지">
      <i class="fas fa-user-shield"></i><span>관리자 모드</span>
    </a>
    <a href="/" class="brand">
      <span class="brand-mark"><i class="fas fa-key"></i></span>
      ESCAPE ROOM
    </a>
    <button type="button" class="nav-toggle" aria-label="메뉴"><i class="fas fa-bars"></i></button>
    <nav class="nav">
      <a href="/theme">테마 관리</a>
      <a href="/time" class="active">시간 관리</a>
      <a href="/">사용자 페이지</a>
    </nav>
  </div>
</header>

<main class="container">
  <h1 class="page-title"><i class="fas fa-hourglass-half" style="color:var(--accent);margin-right:10px;"></i>시간 관리</h1>
  <p class="page-subtitle">예약 가능한 시간대를 추가하거나 삭제할 수 있습니다.</p>

  <div class="table-header">
    <div></div>
    <button id="add-time" class="btn btn-primary"><i class="fas fa-plus"></i> 시간 추가</button>
  </div>

  <div class="table-container">
    <table class="table">
      <thead>
        <tr>
          <th style="width:80px;">번호</th>
          <th>시작 시간</th>
          <th style="width:160px;text-align:right;">관리</th>
        </tr>
      </thead>
      <tbody id="time-table-body"></tbody>
    </table>
  </div>
</main>

<script src="/js/scripts.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/time.js"></script>
</body>
</html>
