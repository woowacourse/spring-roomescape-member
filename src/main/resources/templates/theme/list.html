<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>테마 관리</title>
    <style>
        :root {
            --bg: #f3efe6;
            --card: #fffdf8;
            --line: #d9ccb6;
            --text: #2b2117;
            --point: #1d6f5f;
            --warn: #c44536;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif;
            background: linear-gradient(135deg, #f4efe7 0%, #ece5d8 100%);
            color: var(--text);
        }
        .wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 20px 64px;
        }
        .eyebrow {
            display: inline-flex;
            width: fit-content;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.75);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.04em;
            margin-bottom: 14px;
        }
        .nav {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .nav a {
            text-decoration: none;
            color: var(--text);
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid var(--line);
            padding: 10px 14px;
            border-radius: 999px;
        }
        .user-link {
            margin-left: auto;
            color: var(--point) !important;
            border-color: rgba(29, 111, 95, 0.24) !important;
            background: rgba(29, 111, 95, 0.08) !important;
            font-weight: 700;
        }
        .hero h1 { margin: 0 0 8px; font-size: 42px; }
        .hero p { margin: 0 0 24px; color: rgba(43, 33, 23, 0.72); }
        .layout {
            display: grid;
            grid-template-columns: minmax(320px, 380px) 1fr;
            gap: 20px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 20px;
        }
        form { display: grid; gap: 12px; }
        label { display: grid; gap: 6px; font-weight: 600; }
        input, textarea, button {
            font: inherit;
            border-radius: 12px;
            border: 1px solid var(--line);
            padding: 12px 14px;
        }
        textarea { min-height: 120px; resize: vertical; }
        button {
            border: 0;
            background: var(--point);
            color: white;
            cursor: pointer;
            font-weight: 700;
        }
        button.delete { background: var(--warn); }
        .list { display: grid; gap: 14px; }
        .theme {
            display: grid;
            gap: 12px;
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
            background: rgba(255,255,255,0.78);
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .actions a {
            text-decoration: none;
            color: var(--text);
            border: 1px solid var(--line);
            padding: 10px 12px;
            border-radius: 12px;
            background: white;
        }
        @media (max-width: 900px) {
            .layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="wrap">
    <nav class="nav">
        <a th:href="@{/pages/admin/themes}">관리자 홈</a>
        <a class="user-link" th:href="@{/pages/user/reservations}">사용자 예약 페이지</a>
        <a th:href="@{/pages/admin/themes}">테마 관리</a>
    </nav>

    <section class="hero">
        <span class="eyebrow">ADMIN PAGE</span>
        <h1>테마 관리</h1>
        <p>관리자 영역입니다. 테마 생성과 삭제, 그리고 각 테마의 예약 시간 슬롯 관리로 이어지는 작업을 이 화면에서 시작할 수 있습니다.</p>
    </section>

    <section class="layout">
        <article class="card">
            <h2>새 테마 추가</h2>
            <form method="post" th:action="@{/pages/admin/themes}">
                <label>
                    테마 이름
                    <input name="name" required type="text">
                </label>
                <label>
                    설명
                    <textarea name="description" required></textarea>
                </label>
                <label>
                    썸네일 URL
                    <input name="thumbnailUrl" required type="url">
                </label>
                <button type="submit">테마 저장</button>
            </form>
        </article>

        <article class="card">
            <h2>테마 목록</h2>
            <div class="list" th:if="${!#lists.isEmpty(themes)}">
                <div class="theme" th:each="theme : ${themes}">
                    <div>
                        <strong th:text="${theme.name}">미술관의 밤</strong>
                        <p th:text="${theme.description}">설명</p>
                        <small th:text="${theme.thumbnailUrl}">썸네일</small>
                    </div>
                    <div class="actions">
                        <a th:href="@{/pages/admin/themes/{id}/times(id=${theme.id})}">시간 관리</a>
                        <form method="post" th:action="@{/pages/admin/themes/{id}/delete(id=${theme.id})}">
                            <button class="delete" type="submit">삭제</button>
                        </form>
                    </div>
                </div>
            </div>
            <p th:if="${#lists.isEmpty(themes)}">등록된 테마가 없습니다.</p>
        </article>
    </section>
</div>
</body>
</html>
