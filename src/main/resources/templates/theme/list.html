<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>테마 관리</title>
    <style>
        :root { --bg: #f3efe6; --card: #fffdf8; --line: #d9ccb6; --text: #2b2117; --point: #1d6f5f; --warn: #c44536; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: "Pretendard", "Apple SD Gothic Neo", sans-serif; background: linear-gradient(135deg, #f4efe7 0%, #ece5d8 100%); color: var(--text); }
        .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 20px 64px; }
        .eyebrow { display: inline-flex; width: fit-content; padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line); background: rgba(255,255,255,.75); font-size: 13px; font-weight: 700; letter-spacing: .04em; margin-bottom: 14px; }
        .nav { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
        .nav a { text-decoration: none; color: var(--text); background: rgba(255,255,255,.8); border: 1px solid var(--line); padding: 10px 14px; border-radius: 999px; }
        .user-link { margin-left: auto; color: var(--point) !important; border-color: rgba(29,111,95,.24) !important; background: rgba(29,111,95,.08) !important; font-weight: 700; }
        .hero h1 { margin: 0 0 8px; font-size: 42px; }
        .hero p { margin: 0 0 24px; color: rgba(43,33,23,.72); }
        .layout { display: grid; grid-template-columns: minmax(320px, 380px) 1fr; gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 20px; box-shadow: 0 16px 32px rgba(43,33,23,.07); }
        form { display: grid; gap: 12px; }
        label { display: grid; gap: 6px; font-weight: 600; }
        input, textarea, button { font: inherit; border-radius: 12px; border: 1px solid var(--line); padding: 12px 14px; }
        textarea { min-height: 120px; resize: vertical; }
        button { border: 0; background: var(--point); color: white; cursor: pointer; font-weight: 700; }
        button.delete { background: var(--warn); }
        .list { display: grid; gap: 14px; }
        .theme { display: grid; gap: 12px; border: 1px solid var(--line); border-radius: 18px; padding: 16px; background: rgba(255,255,255,.78); }
        .theme img { width: 100%; max-height: 180px; object-fit: cover; border-radius: 14px; border: 1px solid var(--line); background: #f8f2e7; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .actions a { text-decoration: none; color: var(--text); border: 1px solid var(--line); padding: 10px 12px; border-radius: 12px; background: white; }
        .message { margin: 0 0 14px; padding: 12px 14px; border-radius: 14px; background: rgba(29,111,95,.08); color: var(--point); }
        .message.error { background: rgba(196,69,54,.1); color: var(--warn); }
        .empty { color: rgba(43,33,23,.64); }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .user-link { margin-left: 0; } }
    </style>
</head>
<body>
<div class="wrap">
    <nav class="nav">
        <a th:href="@{/pages/admin/themes}">관리자 홈</a>
        <a class="user-link" th:href="@{/pages/user/reservations}">사용자 예약 페이지</a>
        <a th:href="@{/pages/admin/themes}">테마 관리</a>
    </nav>

    <section class="hero">
        <span class="eyebrow">ADMIN PAGE</span>
        <h1>테마 관리</h1>
        <p>현재 REST API 구조에 맞춰 JavaScript로 테마 목록을 불러오고 생성/삭제 요청을 보냅니다.</p>
    </section>

    <p class="message" id="message" hidden></p>

    <section class="layout">
        <article class="card">
            <h2>새 테마 추가</h2>
            <form id="theme-form">
                <label>테마 이름 <input id="name" required type="text"></label>
                <label>설명 <textarea id="description" required></textarea></label>
                <label>썸네일 URL <input id="thumbnailUrl" required type="url"></label>
                <button type="submit">테마 저장</button>
            </form>
        </article>

        <article class="card">
            <h2>테마 목록</h2>
            <div class="list" id="theme-list"></div>
            <p class="empty" id="empty" hidden>등록된 테마가 없습니다.</p>
        </article>
    </section>
</div>

<script>
    const themeList = document.querySelector('#theme-list');
    const empty = document.querySelector('#empty');
    const message = document.querySelector('#message');

    const showMessage = (text, error = false) => {
        message.textContent = text;
        message.classList.toggle('error', error);
        message.hidden = false;
    };

    const request = async (url, options = {}) => {
        const response = await fetch(url, {
            headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
            ...options
        });
        if (!response.ok) {
            const body = await response.json().catch(() => ({}));
            throw new Error(body.message || body.validationErrors?.join(', ') || `요청 실패 (${response.status})`);
        }
        return response.status === 204 ? null : response.json();
    };

    const renderThemes = (themes) => {
        themeList.innerHTML = '';
        empty.hidden = themes.length !== 0;
        themes.forEach((theme) => {
            const card = document.createElement('div');
            card.className = 'theme';
            card.innerHTML = `
                <img src="${theme.thumbnailUrl}" alt="${theme.name} 썸네일" onerror="this.style.display='none'">
                <div>
                    <strong>${theme.name}</strong>
                    <p>${theme.description}</p>
                    <small>${theme.thumbnailUrl}</small>
                </div>
                <div class="actions">
                    <a href="/pages/admin/themes/${theme.id}/times">시간 관리</a>
                    <button class="delete" type="button" data-id="${theme.id}">삭제</button>
                </div>`;
            themeList.appendChild(card);
        });
    };

    const loadThemes = async () => {
        try {
            renderThemes(await request('/admin/themes'));
        } catch (error) {
            showMessage(error.message, true);
        }
    };

    document.querySelector('#theme-form').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
            await request('/admin/themes', {
                method: 'POST',
                body: JSON.stringify({
                    name: document.querySelector('#name').value,
                    description: document.querySelector('#description').value,
                    thumbnailUrl: document.querySelector('#thumbnailUrl').value
                })
            });
            event.target.reset();
            showMessage('테마가 저장되었습니다.');
            await loadThemes();
        } catch (error) {
            showMessage(error.message, true);
        }
    });

    themeList.addEventListener('click', async (event) => {
        if (!event.target.matches('button.delete')) return;
        try {
            await request(`/admin/themes/${event.target.dataset.id}`, { method: 'DELETE' });
            showMessage('테마가 삭제되었습니다.');
            await loadThemes();
        } catch (error) {
            showMessage(error.message, true);
        }
    });

    loadThemes();
</script>
</body>
</html>
