<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('내 예약')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <h1>내 예약 조회</h1>

    <div class="form-inline">
        <div class="form-row">
            <label for="search-name">이름</label>
            <input id="search-name" placeholder="예약자 이름" type="text"/>
        </div>
        <button class="btn" id="search-btn" type="button">검색</button>
    </div>

    <table class="data-table">
        <thead>
        <tr>
            <th>번호</th>
            <th>이름</th>
            <th>테마</th>
            <th>날짜</th>
            <th>시간</th>
            <th></th>
        </tr>
        </thead>
        <tbody id="reservation-rows">
        <tr>
            <td colspan="6" style="text-align:center; color:#888;">이름을 입력해 검색하세요.</td>
        </tr>
        </tbody>
    </table>
</main>

<div class="modal-overlay" hidden id="edit-modal">
    <div class="modal">
        <h2>예약 변경</h2>
        <p class="modal-current" id="edit-current"></p>

        <div class="form-row">
            <label for="edit-date">날짜 선택</label>
            <input id="edit-date" type="date"/>
        </div>

        <div class="form-row">
            <label>변경할 시간</label>
            <div class="time-list" id="edit-time-list">
                <span style="color:#888; font-size:13px;">날짜를 먼저 선택하세요.</span>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn btn-outline" id="edit-close" type="button">닫기</button>
            <button class="btn" id="edit-save" type="button">변경 저장</button>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: toast}"></div>
<script th:src="@{/js/reservation-mine.js}"></script>
</body>
</html>
