<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roomescape | 홈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
	    .hero-section { background: #f8f9fa; padding: 60px 0; border-bottom: 1px solid #dee2e6; }
	    .card-img-top { height: 200px; object-fit: cover; }
	    .rank-badge { position: absolute; top: 10px; left: 10px; background: rgba(220, 53, 69, 0.9); color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
	    .popular-scroll {
	      display: flex;
	      flex-wrap: nowrap;
	      gap: 1.5rem;
	      overflow-x: auto;
	      scroll-behavior: smooth;
	      scroll-snap-type: x mandatory;
	      padding-bottom: 1rem;
	      scrollbar-width: none;
	      -ms-overflow-style: none;
	    }
	    .popular-scroll::-webkit-scrollbar { display: none; }
	    .popular-scroll-item {
	      flex: 0 0 320px;
	      max-width: 320px;
	      scroll-snap-align: start;
	    }
	    @media (max-width: 576px) {
	      .popular-scroll-item {
	        flex-basis: 85%;
	        max-width: 85%;
	      }
	    }
	  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Roomescape</a>
    <div class="navbar-nav">
      <a class="nav-link active" href="/">테마예약</a>
      <a class="nav-link" href="/admin">관리자패널</a>
    </div>
  </div>
</nav>

<header class="hero-section text-center">
  <div class="container">
    <h1 class="display-4">최고의 방탈출을 경험하세요</h1>
    <p class="lead text-muted">인기 테마부터 신규 테마까지 한눈에 확인하세요.</p>
  </div>
</header>

<main class="container my-5">
  <section class="mb-5">
    <h2 class="mb-4">🔥 실시간 인기 테마 TOP 10</h2>
	    <div id="popular-themes-list" class="popular-scroll">
	      <div class="text-center w-100">로딩 중...</div>
	    </div>
  </section>

  <hr class="my-5">

  <section>
    <h2 class="mb-4">전체 테마</h2>
    <div id="all-themes-list" class="row row-cols-1 row-cols-md-4 g-4">
    </div>
  </section>
</main>

<footer class="py-4 bg-light text-center border-top">
  <p class="text-muted">&copy; 2026 Roomescape Project. All rights reserved.</p>
</footer>

<script>
  document.addEventListener('DOMContentLoaded', async () => {
    try {
      const now = new Date();

      const end = new Date();
      end.setDate(now.getDate() - 1);

      const start = new Date();
      start.setDate(now.getDate() - 7);

      const params = new URLSearchParams({
        startDate: start.toISOString().split('T')[0],
        endDate: end.toISOString().split('T')[0],
        limit: 10
      });

      const response = await fetch(`/api/themes/popular?${params.toString()}`);
      if (!response.ok) throw new Error("데이터를 불러오지 못했습니다.");

      const popularThemes = await response.json();
      const listContainer = document.getElementById('popular-themes-list');

      if (popularThemes.length === 0) {
        listContainer.innerHTML = '<p class="text-center w-100">인기 테마가 없습니다.</p>';
        return;
      }

	      listContainer.innerHTML = popularThemes.map((theme, index) => `
	            <div class="popular-scroll-item">
	                <div class="card h-100 shadow-sm">
	                    <div class="rank-badge">TOP ${index + 1}</div>
                    <img src="${theme.imageUrl}" class="card-img-top" alt="${theme.name}">
                    <div class="card-body">
                        <h5 class="card-title">${theme.name}</h5>
                        <p class="card-text text-muted">${theme.description}</p>
                        <a href="/reservations?themeId=${theme.id}" class="btn btn-primary w-100">지금 예약</a>
                    </div>
                </div>
	            </div>
	        `).join('');

	      startPopularAutoScroll(listContainer);

	    } catch (error) {
      console.error('인기 테마 로드 실패:', error);
      document.getElementById('popular-themes-list').innerHTML =
          '<p class="text-center w-100 text-danger">테마를 불러오는 중 오류가 발생했습니다.</p>';
    }
	  });

	  function startPopularAutoScroll(container) {
	    const items = container.querySelectorAll('.popular-scroll-item');
	    if (items.length <= 1) return;

	    let currentIndex = 0;
	    setInterval(() => {
	      currentIndex = (currentIndex + 1) % items.length;
	      container.scrollTo({
	        left: items[currentIndex].offsetLeft - container.offsetLeft,
	        behavior: 'smooth'
	      });
	    }, 3000);
	  }

  async function loadAllThemes() {
    try {
      const response = await fetch('/api/themes');
      const themes = await response.json();
      const container = document.getElementById('all-themes-list');

      if (themes.length === 0) {
        container.innerHTML = '<p class="text-center w-100">등록된 테마가 없습니다.</p>';
        return;
      }

      container.innerHTML = themes.map(theme => `
                <div class="col">
                    <div class="card h-100 border-0 shadow-sm">
                        <img src="${theme.imageUrl}" class="card-img-top rounded" alt="${theme.name}">
                        <div class="card-body text-center">
                            <h6 class="card-title mb-3 font-weight-bold">${theme.name}</h6>
                            <a href="/reservations?themeId=${theme.id}" class="btn btn-outline-dark btn-sm px-4">선택</a>
                        </div>
                    </div>
                </div>
            `).join('');
    } catch (error) {
      console.error('테마 로드 실패:', error);
    }
  }

  window.onload = loadAllThemes;
</script>

</body>
</html>
