<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('방탈출 홈')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="container">
    <section class="carousel" th:if="${!popularThemes.isEmpty()}">
        <div class="carousel-track">
            <div class="carousel-slide" th:each="t : ${popularThemes}">
                <img th:src="${t.thumbnailUrl()}" th:alt="${t.name()}"/>
                <div class="carousel-caption">
                    <h2 th:text="${t.name()}"></h2>
                    <p th:text="${t.description()}"></p>
                    <a class="btn" th:href="@{/reservation(themeId=${t.id()})}">예약하러 가기</a>
                </div>
            </div>
        </div>
        <button class="carousel-arrow prev" type="button" aria-label="이전">‹</button>
        <button class="carousel-arrow next" type="button" aria-label="다음">›</button>
        <div class="carousel-dots"></div>
    </section>

    <div class="cta-row">
        <a class="btn btn-outline btn-lg" th:href="@{/popular}">인기 방탈출 보기</a>
    </div>

    <h2 class="section-title">예약 가능한 방탈출</h2>
    <div class="theme-grid">
        <div class="theme-card" th:each="t : ${themes}">
            <img th:src="${t.thumbnailUrl()}" th:alt="${t.name()}"/>
            <div class="theme-card-body">
                <p class="theme-card-name" th:text="${t.name()}"></p>
                <p class="theme-card-desc" th:text="${t.description()}"></p>
                <a class="btn btn-sm" th:href="@{/reservation(themeId=${t.id()})}">예약</a>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/home-carousel.js}"></script>
</body>
</html>
