<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>방탈출 예약 — 웰컴</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header th:replace="~{fragments/site :: siteHeader}"></header>
<main>
    <h1>방탈출 예약 서비스</h1>
    <p class="lead">관리자는 시간·테마·예약을 관리하고, 사용자는 날짜와 테마를 골라 직접 예약할 수 있습니다.</p>
    <div class="card-grid">
        <article class="card">
            <h2>관리자 페이지</h2>
            <p>예약 시간, 테마, 전체 예약 목록을 등록하고 삭제합니다.</p>
            <a class="btn btn-primary" th:href="@{/admin}">관리자로 이동</a>
        </article>
        <article class="card">
            <h2>사용자 페이지</h2>
            <p>이름으로 식별하여 예약하고, 최근 일주일 인기 테마를 확인합니다.</p>
            <a class="btn btn-primary" th:href="@{/user}">사용자로 이동</a>
        </article>
    </div>
</main>
</body>
</html>
