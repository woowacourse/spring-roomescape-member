<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>방탈출 예약</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .entry-panel { max-width: 520px; margin: 120px auto; }
  </style>
</head>
<body>
<main class="container">
  <section class="entry-panel bg-white border rounded p-4">
    <h1 class="h3 mb-4 text-center">방탈출 예약</h1>
    <form id="entryForm">
      <div class="mb-3">
        <label for="visitorName" class="form-label">사용자 이름</label>
        <input type="text" id="visitorName" class="form-control" placeholder="이름을 입력하세요" required>
      </div>
      <div class="mb-4">
        <label for="visitorRole" class="form-label">역할</label>
        <select id="visitorRole" class="form-select" required>
          <option value="">역할 선택</option>
          <option value="USER">사용자</option>
          <option value="ADMIN">관리자</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-100">입장</button>
    </form>
  </section>
</main>

<script>
  const PROFILE_NAME_KEY = 'roomescapeVisitorName';
  const PROFILE_ROLE_KEY = 'roomescapeVisitorRole';

  document.addEventListener('DOMContentLoaded', () => {
    const savedName = localStorage.getItem(PROFILE_NAME_KEY);
    const savedRole = localStorage.getItem(PROFILE_ROLE_KEY);

    if (savedName) {
      document.getElementById('visitorName').value = savedName;
    }
    if (savedRole) {
      document.getElementById('visitorRole').value = savedRole;
    }

    document.getElementById('entryForm').addEventListener('submit', enterPage);
  });

  function enterPage(event) {
    event.preventDefault();

    const name = document.getElementById('visitorName').value.trim();
    const role = document.getElementById('visitorRole').value;

    if (!name) {
      alert('사용자 이름을 입력해주세요.');
      return;
    }
    if (!role) {
      alert('역할을 선택해주세요.');
      return;
    }

    localStorage.setItem(PROFILE_NAME_KEY, name);
    localStorage.setItem(PROFILE_ROLE_KEY, role);

    if (role === 'USER') {
      location.href = `/themes?name=${encodeURIComponent(name)}`;
      return;
    }
    location.href = '/admin';
  }
</script>
</body>
</html>
