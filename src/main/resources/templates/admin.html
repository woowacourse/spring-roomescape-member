<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN — ESCAPE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--sur:#101010;--sur2:#181818;--sur3:#202020;
  --border:#525252;--border2:#646464;--text:#d4d4d4;--muted:#aaa;
  --white:#ebebeb;--acc:#c22235;--acc-h:#e5485a;
  --glow:rgba(194,34,53,.3);--ok:#2d6a4f;--ok-t:#74c69d;
}
body{
  background-color:#080808;
  background-image:
    radial-gradient(ellipse at 0% 0%,rgba(140,20,45,.3) 0%,transparent 50%),
    radial-gradient(ellipse at 100% 100%,rgba(110,15,35,.2) 0%,transparent 50%);
  background-attachment:fixed;
  color:var(--text);font-family:'Inter',sans-serif;font-weight:300;line-height:1.6;min-height:100vh;
}

/* ── NAV ── */
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.25rem 4rem;
  background:var(--sur);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.logo{font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:.42em;color:var(--white);text-decoration:none}
.logo-badge{font-size:.55rem;letter-spacing:.4em;text-transform:uppercase;color:var(--acc);margin-left:.75rem}
.nav-r{display:flex;align-items:center;gap:2rem}
.nav-link{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s}
.nav-link:hover{color:var(--white)}

/* ── STATS ROW ── */
.stats-row{
  display:flex;gap:1px;border-bottom:1px solid var(--border);
  background:var(--border);
}
.stat{
  flex:1;background:var(--sur);padding:1.75rem 3rem;
  display:flex;flex-direction:column;gap:.5rem;
}
.stat-label{font-size:.78rem;letter-spacing:.35em;text-transform:uppercase;color:var(--muted)}
.stat-val{font-family:'Cinzel',serif;font-size:1.7rem;color:var(--white);letter-spacing:.04em}
.stat-sub{font-size:.85rem;color:var(--muted)}

/* ── TABS ── */
.tabs{
  display:flex;background:var(--sur);
  border-bottom:1px solid var(--border);padding:0 4rem;
}
.tab{
  padding:1.1rem 0;margin-right:3rem;
  font-size:.82rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);
  background:transparent;border:none;cursor:pointer;font-family:'Inter',sans-serif;
  border-bottom:2px solid transparent;transition:all .3s;
}
.tab:hover{color:var(--text)}
.tab.active{color:var(--white);border-bottom-color:var(--acc)}

/* ── PANEL ── */
.panel{padding:3rem 4rem;max-width:1280px;margin:0 auto}
.panel-title{
  font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:.3em;
  text-transform:uppercase;color:var(--white);margin-bottom:2rem;
}

/* ── ADD FORM ── */
.add-box{border:1px solid var(--border);background:var(--sur);padding:2rem;margin-bottom:2.5rem}
.add-label{font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;color:var(--acc);margin-bottom:1.25rem;display:block}
.form-row{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:.45rem}
.fl{font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.fi{
  background:transparent;border:1px solid var(--border2);color:var(--white);
  padding:.62rem 1rem;font-size:.92rem;font-family:'Inter',sans-serif;
  outline:none;transition:border-color .3s;min-width:160px;
}
.fi:focus{border-color:var(--acc)}
.fi-sm{min-width:100px}
.fi-lg{min-width:240px}
select.fi{color:var(--text);background:var(--sur2)}
select.fi option{background:var(--sur2)}
.btn-add{
  padding:.62rem 1.75rem;border:1px solid var(--acc);color:var(--acc);
  background:transparent;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .3s;
}
.btn-add:hover{background:var(--acc);color:var(--white);box-shadow:0 0 20px var(--glow)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{
  font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--muted);padding:.75rem 1rem;text-align:left;
  border-bottom:1px solid var(--border);font-weight:400;white-space:nowrap;
}
td{
  padding:.9rem 1rem;border-bottom:1px solid var(--border);
  font-size:.92rem;color:var(--text);
}
tr:hover td{background:var(--sur2)}
.td-id{color:var(--muted);font-size:.7rem;font-variant-numeric:tabular-nums}
.td-del{
  width:40px;padding:.6rem .75rem;border:1px solid var(--border);color:var(--muted);
  background:transparent;font-size:.72rem;cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .3s;
}
.td-del:hover{border-color:var(--acc);color:var(--acc)}
.empty-row td{text-align:center;color:var(--muted);font-size:.72rem;letter-spacing:.2em;padding:2.5rem}

/* ── INLINE MSG ── */
.form-err{font-size:.7rem;color:var(--acc);margin-top:.75rem;letter-spacing:.08em}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:2rem;right:2rem;
  padding:.82rem 1.75rem;font-size:.72rem;letter-spacing:.1em;
  border:1px solid;z-index:300;opacity:0;transition:opacity .3s;
}
.toast.show{opacity:1}
.toast.ok{background:rgba(5,18,12,.95);border-color:var(--ok);color:var(--ok-t)}
.toast.err{background:rgba(18,5,7,.95);border-color:var(--acc);color:var(--acc-h)}

/* ── CONFIRM DIALOG ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;
  display:none;align-items:center;justify-content:center;
}
.overlay.open{display:flex}
.dialog{background:var(--sur);border:1px solid var(--border);padding:2.5rem;max-width:380px;width:100%;margin:2rem}
.d-title{font-family:'Cinzel',serif;font-size:.95rem;color:var(--white);margin-bottom:.75rem}
.d-msg{font-size:.78rem;color:var(--muted);margin-bottom:2rem;line-height:1.7}
.d-actions{display:flex;gap:.75rem;justify-content:flex-end}
.btn-ghost{
  padding:.65rem 1.5rem;border:1px solid var(--border);color:var(--muted);
  background:transparent;font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .3s;
}
.btn-ghost:hover{border-color:var(--white);color:var(--white)}
.btn-danger{
  padding:.65rem 1.5rem;border:1px solid var(--acc);color:var(--acc);
  background:transparent;font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .3s;
}
.btn-danger:hover{background:var(--acc);color:var(--white)}

@media(max-width:700px){
  nav,.panel,.tabs{padding-left:1.5rem;padding-right:1.5rem}
  .stat{padding:1.5rem}
  .form-row{flex-direction:column}
  .fi,.fi-sm,.fi-lg{min-width:unset;width:100%}
  .btn-add{width:100%}
}
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:baseline;gap:.5rem">
    <a href="/" class="logo">ESCAPE</a>
    <span class="logo-badge">Admin</span>
  </div>
  <div class="nav-r">
    <a href="/" class="nav-link">← 사용자 페이지</a>
  </div>
</nav>

<!-- Stats -->
<div class="stats-row" id="stats-row">
  <div class="stat">
    <span class="stat-label">총 예약</span>
    <span class="stat-val" id="stat-total">—</span>
    <span class="stat-sub">전체 예약 건수</span>
  </div>
  <div class="stat">
    <span class="stat-label">등록 테마</span>
    <span class="stat-val" id="stat-themes">—</span>
    <span class="stat-sub">활성 테마 수</span>
  </div>
  <div class="stat">
    <span class="stat-label">인기 테마 Top 1</span>
    <span class="stat-val" id="stat-popular" style="font-size:1.1rem;letter-spacing:.02em">—</span>
    <span class="stat-sub">최근 7일 기준</span>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" data-tab="reservations">예약 관리</button>
  <button class="tab" data-tab="themes">테마 관리</button>
  <button class="tab" data-tab="times">시간 관리</button>
</div>

<!-- ── 예약 관리 ── -->
<div class="panel" id="panel-reservations">
  <p class="panel-title">예약 관리</p>

  <div class="add-box">
    <span class="add-label">새 예약 추가</span>
    <div class="form-row">
      <div class="fg">
        <label class="fl">예약자 이름</label>
        <input class="fi" id="r-name" type="text" placeholder="이름" maxlength="20">
      </div>
      <div class="fg">
        <label class="fl">날짜</label>
        <input class="fi fi-sm" id="r-date" type="date">
      </div>
      <div class="fg">
        <label class="fl">테마</label>
        <select class="fi" id="r-theme"></select>
      </div>
      <div class="fg">
        <label class="fl">시간</label>
        <select class="fi fi-sm" id="r-time"></select>
      </div>
      <button class="btn-add" onclick="addReservation()">추가</button>
    </div>
    <p class="form-err" id="r-err"></p>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>예약자</th>
          <th>날짜</th>
          <th>테마</th>
          <th>시간</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="r-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ── 테마 관리 ── -->
<div class="panel" id="panel-themes" hidden>
  <p class="panel-title">테마 관리</p>

  <div class="add-box">
    <span class="add-label">새 테마 추가</span>
    <div class="form-row">
      <div class="fg">
        <label class="fl">이름</label>
        <input class="fi" id="th-name" type="text" placeholder="테마 이름" maxlength="40">
      </div>
      <div class="fg">
        <label class="fl">썸네일 URL</label>
        <input class="fi fi-lg" id="th-url" type="text" placeholder="https://...">
      </div>
      <div class="fg">
        <label class="fl">설명</label>
        <input class="fi fi-lg" id="th-desc" type="text" placeholder="설명 (최소 2자)" maxlength="200">
      </div>
      <button class="btn-add" onclick="addTheme()">추가</button>
    </div>
    <p class="form-err" id="th-err"></p>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>이름</th>
          <th>설명</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="th-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ── 시간 관리 ── -->
<div class="panel" id="panel-times" hidden>
  <p class="panel-title">시간 관리</p>

  <div class="add-box">
    <span class="add-label">새 시간 추가</span>
    <div class="form-row">
      <div class="fg">
        <label class="fl">시작 시각</label>
        <input class="fi fi-sm" id="ti-start" type="time">
      </div>
      <button class="btn-add" onclick="addTime()">추가</button>
    </div>
    <p class="form-err" id="ti-err"></p>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>시작 시각</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="ti-tbody"></tbody>
    </table>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <h2 class="d-title" id="d-title">삭제 확인</h2>
    <p class="d-msg" id="d-msg">정말 삭제하시겠습니까?</p>
    <div class="d-actions">
      <button class="btn-ghost" onclick="closeDialog()">취소</button>
      <button class="btn-danger" id="d-confirm">삭제</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── utils ── */
function fmt(t) {
  if (!t) return '';
  if (Array.isArray(t)) return `${String(t[0]).padStart(2,'0')}:${String(t[1]).padStart(2,'0')}`;
  return String(t).substring(0, 5);
}

function toast(type, msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  setTimeout(() => { el.className = 'toast'; }, 3500);
}

function confirm(title, msg, onOk) {
  document.getElementById('d-title').textContent = title;
  document.getElementById('d-msg').textContent = msg;
  document.getElementById('d-confirm').onclick = async () => { closeDialog(); await onOk(); };
  document.getElementById('overlay').classList.add('open');
}

function closeDialog() {
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDialog();
});

/* ── stats ── */
async function loadStats() {
  try {
    const [rr, tr, pr] = await Promise.all([
      fetch('/admin/reservations'),
      fetch('/admin/themes'),
      fetch('/themes/populars?limit=1&days=7')
    ]);
    if (rr.ok) {
      const data = await rr.json();
      document.getElementById('stat-total').textContent = data.length + '건';
    }
    if (tr.ok) {
      const data = await tr.json();
      document.getElementById('stat-themes').textContent = data.length + '개';
    }
    if (pr.ok) {
      const data = await pr.json();
      document.getElementById('stat-popular').textContent = data.length ? data[0].name : '—';
    }
  } catch {}
}

/* ── RESERVATIONS ── */
async function loadReservations() {
  const tbody = document.getElementById('r-tbody');
  tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--muted);font-size:.75rem">불러오는 중...</td></tr>';
  try {
    const r = await fetch('/admin/reservations');
    if (!r.ok) {
      const text = await r.text();
      console.error('[예약 목록] API 오류', r.status, text);
      throw new Error(`HTTP ${r.status}`);
    }
    const data = await r.json();
    console.log('[예약 목록] 응답 데이터:', data);
    tbody.innerHTML = '';
    if (!data.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">예약이 없습니다</td></tr>';
      return;
    }
    data.forEach(rv => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-id">${rv.id}</td>
        <td>${rv.name}</td>
        <td>${rv.date || ''}</td>
        <td>${rv.themeResponseDto?.name || ''}</td>
        <td>${fmt(rv.timeDto?.startAt)}</td>
        <td><button class="td-del" onclick="delReservation(${rv.id},'${(rv.name||'').replace(/'/g,"\\'")}')">×</button></td>
      `;
      tbody.appendChild(tr);
    });
  } catch (e) {
    console.error('[예약 목록] 렌더링 오류:', e);
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">오류: ${e.message}</td></tr>`;
  }
}

async function loadReservationSelects() {
  const thSel = document.getElementById('r-theme');
  const tiSel = document.getElementById('r-time');
  try {
    const [tr, ti] = await Promise.all([
      fetch('/admin/themes').then(r => r.json()),
      fetch('/admin/times').then(r => r.json())
    ]);
    thSel.innerHTML = '<option value="">테마 선택</option>' +
      tr.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    tiSel.innerHTML = '<option value="">시간 선택</option>' +
      ti.map(t => `<option value="${t.id}">${fmt(t.startAt)}</option>`).join('');
  } catch {}
}

async function addReservation() {
  const name = document.getElementById('r-name').value.trim();
  const date = document.getElementById('r-date').value;
  const themeId = document.getElementById('r-theme').value;
  const timeId = document.getElementById('r-time').value;
  const errEl = document.getElementById('r-err');
  errEl.textContent = '';
  if (!name) { errEl.textContent = '이름을 입력하세요'; return; }
  if (!date) { errEl.textContent = '날짜를 선택하세요'; return; }
  if (!themeId) { errEl.textContent = '테마를 선택하세요'; return; }
  if (!timeId) { errEl.textContent = '시간을 선택하세요'; return; }
  try {
    const r = await fetch('/admin/reservations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, date, timeId: Number(timeId), themeId: Number(themeId) })
    });
    if (!r.ok) {
      let msg = '예약 추가에 실패했습니다';
      try { const e = await r.json(); msg = e.message || msg; } catch {}
      errEl.textContent = msg;
      return;
    }
    document.getElementById('r-name').value = '';
    document.getElementById('r-date').value = '';
    document.getElementById('r-theme').value = '';
    document.getElementById('r-time').value = '';
    toast('ok', '예약이 추가되었습니다');
    loadReservations();
    loadStats();
  } catch {
    errEl.textContent = '네트워크 오류가 발생했습니다';
  }
}

function delReservation(id, name) {
  confirm('예약 삭제', `"${name}" 예약을 삭제하시겠습니까?`, async () => {
    try {
      const r = await fetch(`/admin/reservations/${id}`, { method: 'DELETE' });
      if (!r.ok) throw new Error();
      toast('ok', '예약이 삭제되었습니다');
      loadReservations();
      loadStats();
    } catch {
      toast('err', '삭제에 실패했습니다');
    }
  });
}

/* ── THEMES ── */
async function loadThemes() {
  const tbody = document.getElementById('th-tbody');
  tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--muted);font-size:.75rem">불러오는 중...</td></tr>';
  try {
    const r = await fetch('/admin/themes');
    if (!r.ok) throw new Error();
    const data = await r.json();
    tbody.innerHTML = '';
    if (!data.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="4">등록된 테마가 없습니다</td></tr>';
      return;
    }
    data.forEach(t => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-id">${t.id}</td>
        <td>${t.name}</td>
        <td style="color:var(--muted);font-size:.72rem">${t.description || ''}</td>
        <td><button class="td-del" onclick="delTheme(${t.id},'${t.name.replace(/'/g,"\\'")}')">×</button></td>
      `;
      tbody.appendChild(tr);
    });
  } catch {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="4">데이터를 불러올 수 없습니다</td></tr>';
  }
}

async function addTheme() {
  const name = document.getElementById('th-name').value.trim();
  const thumbnailUrl = document.getElementById('th-url').value.trim();
  const description = document.getElementById('th-desc').value.trim();
  const errEl = document.getElementById('th-err');
  errEl.textContent = '';
  if (!name) { errEl.textContent = '이름을 입력하세요'; return; }
  try {
    const r = await fetch('/admin/themes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, thumbnailUrl, description })
    });
    if (!r.ok) {
      let msg = '테마 추가에 실패했습니다';
      try { const e = await r.json(); msg = e.message || msg; } catch {}
      errEl.textContent = msg;
      return;
    }
    document.getElementById('th-name').value = '';
    document.getElementById('th-url').value = '';
    document.getElementById('th-desc').value = '';
    toast('ok', '테마가 추가되었습니다');
    loadThemes();
    loadStats();
  } catch {
    errEl.textContent = '네트워크 오류가 발생했습니다';
  }
}

function delTheme(id, name) {
  confirm('테마 삭제', `"${name}" 테마를 삭제하시겠습니까?\n이 테마의 예약이 있으면 삭제할 수 없습니다.`, async () => {
    try {
      const r = await fetch(`/admin/themes/${id}`, { method: 'DELETE' });
      if (!r.ok) {
        let msg = '삭제에 실패했습니다';
        try { const e = await r.json(); msg = e.message || msg; } catch {}
        toast('err', msg);
        return;
      }
      toast('ok', '테마가 삭제되었습니다');
      loadThemes();
      loadStats();
    } catch {
      toast('err', '삭제에 실패했습니다');
    }
  });
}

/* ── TIMES ── */
async function loadTimes() {
  const tbody = document.getElementById('ti-tbody');
  tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:2rem;color:var(--muted);font-size:.75rem">불러오는 중...</td></tr>';
  try {
    const r = await fetch('/admin/times');
    if (!r.ok) throw new Error();
    const data = await r.json();
    tbody.innerHTML = '';
    if (!data.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="3">등록된 시간이 없습니다</td></tr>';
      return;
    }
    data.forEach(t => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="td-id">${t.id}</td>
        <td>${fmt(t.startAt)}</td>
        <td><button class="td-del" onclick="delTime(${t.id},'${fmt(t.startAt)}')">×</button></td>
      `;
      tbody.appendChild(tr);
    });
  } catch {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="3">데이터를 불러올 수 없습니다</td></tr>';
  }
}

async function addTime() {
  const val = document.getElementById('ti-start').value;
  const errEl = document.getElementById('ti-err');
  errEl.textContent = '';
  if (!val) { errEl.textContent = '시작 시각을 입력하세요'; return; }
  try {
    const r = await fetch('/admin/times', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ startAt: val })
    });
    if (!r.ok) {
      let msg = '시간 추가에 실패했습니다';
      try { const e = await r.json(); msg = e.message || msg; } catch {}
      errEl.textContent = msg;
      return;
    }
    document.getElementById('ti-start').value = '';
    toast('ok', '시간이 추가되었습니다');
    loadTimes();
  } catch {
    errEl.textContent = '네트워크 오류가 발생했습니다';
  }
}

function delTime(id, label) {
  confirm('시간 삭제', `${label} 시간을 삭제하시겠습니까?\n이 시간을 사용하는 예약이 있으면 삭제할 수 없습니다.`, async () => {
    try {
      const r = await fetch(`/admin/times/${id}`, { method: 'DELETE' });
      if (!r.ok) {
        let msg = '삭제에 실패했습니다';
        try { const e = await r.json(); msg = e.message || msg; } catch {}
        toast('err', msg);
        return;
      }
      toast('ok', '시간이 삭제되었습니다');
      loadTimes();
    } catch {
      toast('err', '삭제에 실패했습니다');
    }
  });
}

/* ── TABS ── */
function loadTab(tab) {
  if (tab === 'reservations') { loadReservations(); loadReservationSelects(); }
  else if (tab === 'themes') loadThemes();
  else loadTimes();
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.hidden = true);
    btn.classList.add('active');
    const panelId = `panel-${btn.dataset.tab}`;
    document.getElementById(panelId).hidden = false;
    loadTab(btn.dataset.tab);
  });
});

/* ── init ── */
const today = new Date().toISOString().split('T')[0];
document.getElementById('r-date').value = today;
document.getElementById('r-date').min = today;

loadStats();
loadReservations();
loadReservationSelects();
</script>
</body>
