<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roomescape Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<header class="admin-topbar">
    <div class="admin-topbar-inner">
        <a href="/admin" class="admin-brand">ROOMESCAPE ADMIN</a>
        <nav class="admin-nav">
            <button type="button" class="admin-nav-button active" data-tab-target="themes-panel">테마 관리</button>
            <button type="button" class="admin-nav-button" data-tab-target="dates-panel">예약 날짜 관리</button>
            <button type="button" class="admin-nav-button" data-tab-target="times-panel">예약 시간 관리</button>
            <button type="button" class="admin-nav-button" data-tab-target="reservations-panel">예약 관리</button>
        </nav>
    </div>
</header>

<main class="admin-shell">
    <section class="admin-hero">
        <div>
            <p class="admin-kicker">관리자 페이지</p>
            <h1>테마, 날짜, 시간을 관리할 수 있습니다.</h1>
            <p class="admin-hero-description">각 항목을 추가하거나 삭제하여 시스템을 관리하세요.</p>
        </div>
    </section>

    <section id="themes-panel" class="admin-panel">
        <div class="panel-header">
            <div>
                <p class="admin-kicker">테마 관리</p>
                <h2>테마 목록</h2>
            </div>
            <button type="button" class="secondary-button" data-refresh-target="themes">새로고침</button>
        </div>
        <form id="theme-form" class="admin-form">
            <div class="field-grid field-grid-theme">
                <label>
                    <span>테마 이름</span>
                    <input type="text" name="name" placeholder="예: 공포" required>
                </label>
                <label>
                    <span>테마 설명</span>
                    <input type="text" name="content" placeholder="테마 설명을 입력하세요" required>
                </label>
                <label>
                    <span>이미지 URL</span>
                    <input type="text" name="url" placeholder="dummy" required>
                </label>
            </div>
            <div class="form-actions">
                <button type="submit" class="primary-button">테마 추가</button>
                <p id="theme-form-message" class="form-message"></p>
            </div>
        </form>
        <div id="themes-list" class="card-list"></div>
    </section>

    <section id="dates-panel" class="admin-panel" hidden>
        <div class="panel-header">
            <div>
                <p class="admin-kicker">예약 날짜 관리</p>
                <h2>예약 날짜 목록</h2>
            </div>
            <button type="button" class="secondary-button" data-refresh-target="dates">새로고침</button>
        </div>
        <form id="date-form" class="admin-form">
            <div class="field-grid field-grid-single">
                <label>
                    <span>예약 날짜</span>
                    <input type="date" name="playDay" required>
                </label>
            </div>
            <div class="form-actions">
                <button type="submit" class="primary-button">날짜 추가</button>
                <p id="date-form-message" class="form-message"></p>
            </div>
        </form>
        <div id="dates-list" class="simple-list"></div>
    </section>

    <section id="times-panel" class="admin-panel" hidden>
        <div class="panel-header">
            <div>
                <p class="admin-kicker">예약 시간 관리</p>
                <h2>예약 시간 목록</h2>
            </div>
            <button type="button" class="secondary-button" data-refresh-target="times">새로고침</button>
        </div>
        <form id="time-form" class="admin-form">
            <div class="field-grid field-grid-single">
                <label>
                    <span>예약 시간</span>
                    <input type="time" name="startAt" required>
                </label>
            </div>
            <div class="form-actions">
                <button type="submit" class="primary-button">시간 추가</button>
                <p id="time-form-message" class="form-message"></p>
            </div>
        </form>
        <div id="times-list" class="simple-list"></div>
    </section>

    <section id="reservations-panel" class="admin-panel" hidden>
        <div class="panel-header">
            <div>
                <p class="admin-kicker">예약 관리</p>
                <h2>예약 목록</h2>
            </div>
            <button type="button" class="secondary-button" data-refresh-target="reservations">새로고침</button>
        </div>
        <div id="reservations-list" class="simple-list"></div>
    </section>
</main>

<div id="admin-modal" class="admin-modal" hidden>
    <div class="admin-modal-backdrop" data-admin-modal-close></div>
    <div class="admin-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="admin-modal-title">
        <div class="admin-modal-header">
            <h2 id="admin-modal-title">알림</h2>
            <button type="button" class="secondary-button" data-admin-modal-close>닫기</button>
        </div>
        <p id="admin-modal-message" class="admin-modal-message"></p>
    </div>
</div>

<script th:src="@{/js/admin.js}"></script>
</body>
</html>
