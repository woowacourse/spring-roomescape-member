<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 관리</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #f6f7fb; color: #1f2937; }
        .page { width: min(1100px, calc(100% - 32px)); margin: 32px auto; }
        .nav, .card { background: #fff; border: 1px solid #dde3f0; border-radius: 18px; padding: 20px; margin-bottom: 16px; }
        .grid { display: grid; gap: 20px; grid-template-columns: minmax(320px, 420px) 1fr; }
        form { display: grid; gap: 12px; }
        label { display: grid; gap: 6px; font-weight: 600; }
        input, select, button { width: 100%; border: 1px solid #dde3f0; border-radius: 12px; padding: 11px 13px; font: inherit; background: white; }
        button { border: none; background: #4f46e5; color: white; font-weight: 700; cursor: pointer; }
        button.danger { background: #dc2626; width: auto; }
        ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
        li { border: 1px solid #dde3f0; border-radius: 14px; padding: 14px; background: #fbfcff; }
        .flash { padding: 14px 16px; border-radius: 12px; margin-bottom: 16px; font-weight: 600; }
        .success { background: #ecfdf3; color: #027a48; }
        .error { background: #fef3f2; color: #b42318; }
        .head { display: flex; justify-content: space-between; align-items: start; gap: 12px; }
        .inline-form { display: inline-block; }
        .links a { margin-right: 12px; color: #4f46e5; text-decoration: none; }
        .empty { color: #667085; font-style: italic; }
    </style>
</head>
<body>
<div class="page">
    <section class="nav">
        <h1>예약 관리</h1>
        <div class="links"><a href="/dashboard">홈</a><a href="/dashboard/availability">예약 가능 시간 조회</a></div>
    </section>
    <div th:if="${successMessage}" class="flash success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="flash error" th:text="${errorMessage}"></div>
    <section class="grid">
        <article class="card">
            <h2>예약 생성</h2>
            <form method="post" th:action="@{/dashboard/reservations}">
                <label>예약자 이름<input type="text" name="name" required></label>
                <label>예약 날짜<input type="date" name="date" required></label>
                <label>테마
                    <select name="themeId" required>
                        <option value="">테마 선택</option>
                        <option th:each="theme : ${themes}" th:value="${theme.id()}" th:text="|${theme.name()} (#${theme.id()})|"></option>
                    </select>
                </label>
                <label>시작 시간
                    <select name="time" required>
                        <option value="">시간 선택</option>
                        <option th:each="time : ${times}" th:value="${time.startAt()}" th:text="|${time.startAt()} ~ ${time.endAt()}|"></option>
                    </select>
                </label>
                <button type="submit">예약 생성</button>
            </form>
        </article>
        <article class="card">
            <h2>예약 목록</h2>
            <ul>
                <li th:if="${#lists.isEmpty(reservations)}" class="empty">예약 없음</li>
                <li th:each="reservation : ${reservations}">
                    <div class="head">
                        <div>
                            <strong th:text="${reservation.name()}"></strong>
                            <p th:text="|${reservation.time().startAt()} ~ ${reservation.time().endAt()} · ${reservation.theme().name()}|"></p>
                        </div>
                        <form class="inline-form" method="post" th:action="@{|/dashboard/reservations/${reservation.id()}/cancel|}">
                            <button type="submit" class="danger">취소</button>
                        </form>
                    </div>
                </li>
            </ul>
        </article>
    </section>
</div>
</body>
</html>
