<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예약 관리 — ESCAPE ROOM</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="/css/reservation.css">
</head>
<body>
<div class="container-fluid page">
  <div class="row no-gutters">
    <div id="sidebar-container" class="col-md-2">
      <nav id="sidebar">
        <div class="sidebar-brand">
          <i class="fas fa-lock brand-icon"></i>
          <span class="brand-title">Escape</span>
          <span class="brand-subtitle">Admin</span>
        </div>
        <ul>
          <li><a href="/reservation" class="active-menu"><i class="fas fa-lock"></i>예약 관리</a></li>
          <li><a href="/time"><i class="fas fa-hourglass-half"></i>시간 관리</a></li>
          <li><a href="/theme"><i class="fas fa-theater-masks"></i>테마 관리</a></li>
        </ul>
      </nav>
    </div>
    <div id="content-container" class="col-md-10">
      <h1 class="page-title"><i class="fas fa-lock mr-3" style="color:var(--accent);font-size:1.2rem;"></i>예약 관리</h1>

      <div class="filter-card">
        <div class="row align-items-end">
          <div class="col-md-4">
            <label class="form-label">날짜 선택</label>
            <input type="date" id="filter-date" class="form-control">
          </div>
          <div class="col-md-4">
            <label class="form-label">테마 선택</label>
            <select id="filter-theme" class="form-control">
              <option value="">테마를 선택하세요</option>
            </select>
          </div>
          <div class="col-md-4">
            <button id="search-btn" class="btn btn-primary w-100">
              <i class="fas fa-search mr-2"></i>예약 가능 시간 조회
            </button>
          </div>
        </div>
      </div>

      <div id="result-section" class="d-none">
        <div class="table-container">
          <table class="table">
            <thead>
              <tr>
                <th>예약 가능 시간</th>
                <th style="width:240px;"></th>
              </tr>
            </thead>
            <tbody id="reservation-table-body"></tbody>
          </table>
        </div>
        <p id="no-times-msg" class="text-muted mt-3 d-none" style="padding-left:4px;">
          <i class="fas fa-info-circle mr-1"></i>선택한 날짜와 테마에 예약 가능한 시간이 없습니다.
        </p>
      </div>
    </div>
  </div>
</div>
<script src="/js/reservation.js"></script>
</body>
</html>
