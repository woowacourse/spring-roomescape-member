<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>예약 페이지</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      margin-top: 50px;
    }
    .container {
      border: 2px solid #000;
      padding: 20px;
      width: 400px;
      text-align: center;
      margin-bottom: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
      margin-bottom: 15px;
    }
    input[type="date"], input[type="text"] {
      padding: 10px;
      font-size: 16px;
      margin-bottom: 20px;
      width: 80%;
      box-sizing: border-box;
    }
    .time-btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      font-size: 16px;
      cursor: pointer;
      background-color: #f0f0f0;
      border: 1px solid #ccc;
    }
    .time-btn.selected {
      background-color: #000;
      color: #fff;
    }
    .time-btn:disabled {
      background-color: #e0e0e0;
      color: #a0a0a0;
      cursor: not-allowed;
      opacity: 0.6;
    }
    #reserve-btn {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 10px;
    }
    /* 에러 모달 스타일 */
    #error-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 30px;
      border: 2px solid #000;
      z-index: 1100;
      text-align: center;
      min-width: 300px;
      max-width: 500px;
    }
    #error-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1099;
    }
    #error-modal-title {
      color: #d9534f;
      margin-top: 0;
      font-size: 20px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }
    #error-modal-detail {
      margin-bottom: 25px;
      line-height: 1.5;
    }
    #error-close-btn {
      padding: 10px 20px;
      cursor: pointer;
      background-color: #333;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h2 id="theme-name"></h2>
  <img id="theme-image" src="" alt="Theme Image" style="display: none;">
  <p id="theme-desc"></p>
  <p id="theme-time"></p>
</div>

<div class="container">
  <h3>예약자 정보</h3>
  <input type="text" id="user-name" placeholder="이름을 입력하세요">

  <h3>예약 날짜 선택</h3>
  <input type="date" id="date-picker">

  <h3>예약 시간 선택</h3>
  <div id="time-list"></div>

  <button id="reserve-btn">예약하기</button>
</div>

<!-- 에러 모달 -->
<div id="error-modal-overlay"></div>
<div id="error-modal">
  <h3 id="error-modal-title"></h3>
  <p id="error-modal-detail"></p>
  <button id="error-close-btn">확인</button>
</div>

<script>
  let selectedTimeId = null;
  let allTimes = [];

  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const themeId = params.get('themeId');
    const datePicker = document.getElementById('date-picker');

    document.getElementById('error-close-btn').addEventListener('click', closeErrorModal);

    if (!themeId) return;

    function showErrorModal(title, detail) {
      document.getElementById('error-modal-title').textContent = title;
      document.getElementById('error-modal-detail').textContent = detail;
      document.getElementById('error-modal-overlay').style.display = 'block';
      document.getElementById('error-modal').style.display = 'block';
    }

    function closeErrorModal() {
      document.getElementById('error-modal-overlay').style.display = 'none';
      document.getElementById('error-modal').style.display = 'none';
    }

    fetch(`/themes/${themeId}`)
    .then(async res => {
      if (res.ok) {
        return res.json();
      } else {
        const errorData = await res.json().catch(() => null);
        showErrorModal(errorData?.title || '오류', errorData?.detail || '테마 정보를 불러올 수 없습니다.');
        throw new Error('테마 정보 조회 실패');
      }
    })
    .then(theme => {
      document.getElementById('theme-name').textContent = theme.name;
      document.getElementById('theme-desc').textContent = theme.description;
      document.getElementById('theme-time').textContent = theme.runningTime + '분';
      const img = document.getElementById('theme-image');
      img.src = theme.imageUrl;
      img.style.display = 'block';
    })
    .catch(err => console.error(err));

    fetch('/times')
    .then(res => res.json())
    .then(times => {
      allTimes = times;
      renderTimeButtons([]);
    });

    datePicker.addEventListener('change', () => {
      const selectedDate = datePicker.value;
      fetch(`/times/reserved?themeId=${themeId}&selectedDate=${selectedDate}`)
      .then(async res => {
        if (res.ok) {
          return res.json();
        } else {
          const errorData = await res.json().catch(() => null);
          showErrorModal(errorData?.title || '오류', errorData?.detail || '예약 가능 시간을 불러올 수 없습니다.');
          throw new Error('예약 시간 조회 실패');
        }
      })
      .then(bookedTimes => {
        const bookedTimeIds = bookedTimes.map(t => t.id);
        renderTimeButtons(bookedTimeIds);
      })
      .catch(err => console.error(err));
    });

    function renderTimeButtons(bookedTimeIds) {
      const timeList = document.getElementById('time-list');
      timeList.innerHTML = '';
      selectedTimeId = null;

      allTimes.forEach(time => {
        const btn = document.createElement('button');
        btn.className = 'time-btn';
        btn.textContent = time.startAt;

        if (bookedTimeIds.includes(time.id)) {
          btn.disabled = true;
        }

        btn.addEventListener('click', () => {
          document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          selectedTimeId = time.id;
        });
        timeList.appendChild(btn);
      });
    }

    document.getElementById('reserve-btn').addEventListener('click', () => {
      const name = document.getElementById('user-name').value;
      const date = datePicker.value;

      if (!name || !date || !selectedTimeId) {
        alert('모든 정보를 입력해주세요.');
        return;
      }

      fetch('/api/reservations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ themeId: parseInt(themeId), name, date, timeId: selectedTimeId })
      })
      .then(async res => {
        if (res.status === 201) {
          alert('예약 성공!');
          location.href = '/';
        } else {
          const errorData = await res.json().catch(() => null);
          showErrorModal(errorData?.title || '예약 실패', errorData?.detail || '알 수 없는 오류가 발생했습니다.');
        }
      });
    });
  });
</script>
</body>
</html>
