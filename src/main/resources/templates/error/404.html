<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>페이지를 찾을 수 없습니다</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="error-page">
<header>
    <a href="/" class="escape-logo">ESC<span>A</span>PE</a>
    <button type="button" class="header-link header-button" onclick="history.back()">뒤로가기</button>
</header>

<main class="error-main">
    <div class="error-code">404</div>
    <h1>길을 잃었습니다</h1>
    <p>
        요청한 페이지를 찾을 수 없습니다.<br>
        홈으로 돌아가거나 이전 페이지에서 다시 시작해주세요.
    </p>
    <div class="error-actions">
        <a href="/" class="error-primary">홈으로</a>
        <button type="button" class="header-link header-button" onclick="history.back()">뒤로가기</button>
    </div>
</main>
</body>
</html>
