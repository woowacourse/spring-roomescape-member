<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>내 예약 조회 - 방탈출</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="container py-5">
    <h2 class="fw-bold mb-4">내 예약 조회</h2>

    <!-- 이름 검색 폼 -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <div class="row g-2 align-items-center">
                <div class="col-auto"><label class="col-form-label fw-bold">예약자 이름</label></div>
                <div class="col-auto"><input type="text" id="search-name" class="form-control" placeholder="이름 입력"></div>
                <div class="col-auto"><button class="btn btn-primary" onclick="searchReservations()">조회</button></div>
            </div>
        </div>
    </div>

    <!-- 예약 목록 -->
    <div id="reservation-container" class="card shadow-sm d-none">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th>번호</th><th>테마</th><th>날짜</th><th>시간</th><th class="text-end">관리</th>
                </tr>
                </thead>
                <tbody id="my-reservation-list"></tbody>
            </table>
        </div>
    </div>
    <div id="empty-msg" class="text-center text-muted py-4 d-none">조회된 예약이 없습니다.</div>
</main>

<!-- 수정 모달 -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold">예약 수정</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-id">
                <div class="mb-3">
                    <label class="form-label fw-semibold">테마 선택</label>
                    <select id="edit-themeId" class="form-select" onchange="loadAvailableTimes()"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">날짜 선택</label>
                    <input type="date" id="edit-date" class="form-control" onchange="loadAvailableTimes()">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">시간 선택</label>
                    <div id="edit-time-buttons" class="d-flex flex-wrap gap-2"></div>
                    <input type="hidden" id="edit-selectedTimeId">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary" onclick="updateReservation()">변경 저장</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentName = '';
    let editModalObj = null;

    async function initThemes() {
        try {
            const res = await fetch('/themes');
            const data = await res.json();
            const sel = document.getElementById('edit-themeId');
            if (data.themes) {
                data.themes.forEach(t => {
                    sel.innerHTML += `<option value="${t.id}">${t.name}</option>`;
                });
            }
        } catch (e) { console.error("테마 로드 실패:", e); }
    }
    initThemes();

    function openEditModal(id, themeId, date) {
        if (!editModalObj) {
            editModalObj = new bootstrap.Modal(document.getElementById('editModal'));
        }
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-themeId').value = themeId;
        document.getElementById('edit-date').value = date;
        document.getElementById('edit-selectedTimeId').value = '';
        loadAvailableTimes();
        editModalObj.show();
    }

    async function searchReservations() {
        const nameInput = document.getElementById('search-name').value.trim();
        if (!nameInput) return alert("이름을 입력해주세요.");
        currentName = nameInput;
        loadMyReservations();
    }

    async function loadMyReservations() {
        const res = await fetch(`/reservations?name=${currentName}`);
        if (!res.ok) {
            alert("조회에 실패했습니다. (서버 에러)");
            return;
        }
        const data = await res.json();
        const reservations = data.reservations || [];
        const tbody = document.getElementById('my-reservation-list');

        tbody.innerHTML = '';
        document.getElementById('reservation-container').classList.toggle('d-none', reservations.length === 0);
        document.getElementById('empty-msg').classList.toggle('d-none', reservations.length > 0);

        reservations.forEach(r => {
            tbody.innerHTML += `
                <tr>
                    <td class="align-middle">${r.id}</td>
                    <td class="align-middle fw-bold text-primary">${r.theme.name}</td>
                    <td class="align-middle">${r.date}</td>
                    <td class="align-middle">${r.time.startAt}</td>
                    <td class="align-middle text-end">
                        <button class="btn btn-sm btn-outline-primary me-1"
                                onclick="openEditModal(${r.id}, ${r.theme.id}, '${r.date}')">수정</button>
                        <button class="btn btn-sm btn-outline-danger"
                                onclick="cancelReservation(${r.id})">취소</button>
                    </td>
                </tr>`;
        });
    }

    async function loadAvailableTimes() {
        const date = document.getElementById('edit-date').value;
        const themeId = document.getElementById('edit-themeId').value;
        const container = document.getElementById('edit-time-buttons');
        container.innerHTML = '';
        if (!date || !themeId) return;

        const res = await fetch(`/times/available?date=${date}&themeId=${themeId}`);
        const data = await res.json();

        if (data.times) {
            data.times.forEach(t => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = t.available ? 'btn btn-outline-primary btn-sm' : 'btn btn-outline-secondary btn-sm disabled';
                btn.textContent = t.startAt || t.StartAt;
                if (t.available) btn.onclick = () => selectTime(t.id, btn);
                container.appendChild(btn);
            });
        }
    }

    function selectTime(timeId, btn) {
        document.querySelectorAll('#edit-time-buttons button').forEach(b => {
            b.classList.remove('btn-primary');
            b.classList.add('btn-outline-primary');
        });
        btn.classList.replace('btn-outline-primary', 'btn-primary');
        document.getElementById('edit-selectedTimeId').value = timeId;
    }

    async function updateReservation() {
        const id = document.getElementById('edit-id').value;
        const themeId = document.getElementById('edit-themeId').value;
        const date = document.getElementById('edit-date').value;
        const timeId = document.getElementById('edit-selectedTimeId').value;

        if (!timeId) return alert("변경할 시간을 선택해주세요.");

        const res = await fetch(`/reservations?name=${currentName}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                id: Number(id),
                name: currentName,
                date: date,
                themeId: Number(themeId),
                timeId: Number(timeId)
            })
        });

        if (res.ok) {
            alert("예약이 수정되었습니다.");
            if (editModalObj) editModalObj.hide();
            loadMyReservations();
        } else {
            const err = await res.json();
            alert(err.message || "수정에 실패했습니다.");
        }
    }

    async function cancelReservation(id) {
        if (!confirm('정말 예약을 취소하시겠습니까?')) return;
        const res = await fetch(`/reservations/${id}?name=${currentName}`, { method: 'DELETE' });
        if (res.ok) { alert("예약이 취소되었습니다."); loadMyReservations(); }
    }
</script>
</body>
</html>
