<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>내 예약 — ESCAPE</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap"
          rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #080808;
            --sur: #0f0f0f;
            --sur2: #181818;
            --border: #525252;
            --text: #d4d4d4;
            --muted: #aaa;
            --white: #ebebeb;
            --acc: #c22235;
            --acc-h: #e5485a;
            --glow: rgba(194, 34, 53, .3);
        }

        body {
            background-color: #080808;
            background-image: radial-gradient(ellipse at 0% 0%, rgba(140, 20, 45, .32) 0%, transparent 52%),
            radial-gradient(ellipse at 100% 100%, rgba(110, 15, 35, .22) 0%, transparent 52%);
            background-attachment: fixed;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            line-height: 1.7;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 4rem;
            background: rgba(7, 7, 7, .92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Cinzel', serif;
            font-size: .95rem;
            letter-spacing: .42em;
            color: var(--white);
            text-decoration: none
        }

        .back {
            font-size: .82rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            transition: color .3s
        }

        .back:hover {
            color: var(--white)
        }

        .page-header {
            margin-top: 64px;
            padding: 4rem 4rem 3rem;
            border-bottom: 1px solid var(--border);
            background: var(--sur);
        }

        .page-eye {
            font-size: .8rem;
            letter-spacing: .45em;
            text-transform: uppercase;
            color: var(--acc);
            margin-bottom: 1rem
        }

        .page-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            color: var(--white);
            letter-spacing: .06em
        }

        .content {
            max-width: 760px;
            margin: 0 auto;
            padding: 4.5rem 2rem 7rem
        }

        .step {
            margin-bottom: 3.5rem
        }

        .step-num {
            font-size: .8rem;
            letter-spacing: .45em;
            text-transform: uppercase;
            color: var(--acc);
            margin-bottom: .85rem
        }

        .step-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: var(--white);
            margin-bottom: 1.75rem;
            letter-spacing: .04em
        }

        .search-row {
            display: flex;
            gap: 1rem;
            align-items: stretch
        }

        .s-input {
            flex: 1;
            background: var(--sur);
            border: 1px solid var(--border);
            color: var(--white);
            padding: .8rem 1.2rem;
            font-size: .9rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color .3s;
        }

        .s-input:focus {
            border-color: var(--acc)
        }

        .s-input::placeholder {
            color: var(--muted)
        }

        .rsv-list {
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .rsv-card {
            background: var(--sur);
            border: 1px solid var(--border);
            padding: 1.6rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
            transition: border-color .3s;
        }

        .rsv-card:hover {
            border-color: var(--border)
        }

        .rsv-info {
            flex: 1
        }

        .rsv-theme {
            font-family: 'Cinzel', serif;
            font-size: 1.05rem;
            color: var(--white);
            margin-bottom: .4rem;
            letter-spacing: .04em
        }

        .rsv-meta {
            font-size: .88rem;
            color: var(--muted);
            letter-spacing: .05em
        }

        .rsv-actions {
            display: flex;
            gap: .75rem;
            flex-shrink: 0
        }

        .msg {
            font-size: .9rem;
            color: var(--muted);
            letter-spacing: .1em;
            padding: 1.5rem 0
        }

        .btn-g {
            padding: .6rem 1.2rem;
            border: 1px solid var(--border);
            color: var(--muted);
            background: transparent;
            font-size: .62rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .3s;
        }

        .btn-g:hover {
            border-color: var(--white);
            color: var(--white)
        }

        .btn-s {
            padding: .6rem 1.2rem;
            border: 1px solid var(--acc);
            color: var(--acc);
            background: transparent;
            font-size: .62rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .3s;
        }

        .btn-s:hover {
            background: var(--acc);
            color: var(--white);
            box-shadow: 0 0 20px var(--glow)
        }

        .btn-s:disabled {
            opacity: .4;
            cursor: not-allowed
        }

        .btn-s:disabled:hover {
            background: transparent;
            color: var(--acc);
            box-shadow: none
        }

        .btn-primary {
            padding: .8rem 1.8rem;
            border: 1px solid var(--acc);
            color: var(--acc);
            background: transparent;
            font-size: .62rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .3s;
        }

        .btn-primary:hover {
            background: var(--acc);
            color: var(--white);
            box-shadow: 0 0 20px var(--glow)
        }

        .btn-danger {
            padding: .6rem 1.2rem;
            border: 1px solid #7f1d1d;
            color: #f87171;
            background: transparent;
            font-size: .62rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all .3s;
        }

        .btn-danger:hover {
            background: #7f1d1d;
            color: var(--white)
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .overlay.open {
            display: flex
        }

        .modal {
            background: var(--sur);
            border: 1px solid var(--border);
            padding: 3rem;
            width: 100%;
            max-width: 480px
        }

        .m-eye {
            font-size: .75rem;
            letter-spacing: .45em;
            text-transform: uppercase;
            color: var(--acc);
            margin-bottom: 1rem
        }

        .m-title {
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
            color: var(--white);
            margin-bottom: .5rem
        }

        .m-info {
            font-size: .9rem;
            color: var(--muted);
            margin-bottom: 2rem;
            letter-spacing: .05em
        }

        .m-label {
            font-size: .78rem;
            letter-spacing: .28em;
            text-transform: uppercase;
            color: var(--muted);
            display: block;
            margin-bottom: .75rem
        }

        .m-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2.5rem
        }

        input[type="date"] {
            background: var(--sur);
            border: 1px solid var(--border);
            color: var(--white);
            padding: .8rem 1.2rem;
            font-size: .82rem;
            font-family: 'Inter', sans-serif;
            width: 100%;
            outline: none;
            transition: border-color .3s;
            color-scheme: dark;
            margin-bottom: 1.75rem;
        }

        input[type="date"]:focus {
            border-color: var(--acc)
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(.5)
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 8px;
            margin-bottom: 1rem
        }

        .slot {
            padding: .7rem .8rem;
            text-align: center;
            border: 1px solid;
            font-size: .85rem;
            letter-spacing: .04em;
            transition: all .3s;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            background: transparent;
        }

        .slot.avail {
            border-color: var(--acc);
            color: var(--acc)
        }

        .slot.avail:hover, .slot.avail.sel {
            background: var(--acc);
            color: var(--white);
            box-shadow: 0 0 20px var(--glow)
        }

        .slot.booked {
            border-color: var(--border);
            color: var(--muted);
            cursor: not-allowed
        }

        .slot-hint {
            font-size: .72rem;
            display: block;
            margin-top: .2rem;
            opacity: .7
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: .85rem 2rem;
            font-size: .72rem;
            letter-spacing: .1em;
            border: 1px solid;
            z-index: 300;
            opacity: 0;
            transition: opacity .3s;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1
        }

        .toast.ok {
            background: rgba(5, 20, 12, .9);
            border-color: #2d6a4f;
            color: #74c69d
        }

        .toast.err {
            background: rgba(20, 5, 8, .9);
            border-color: var(--acc);
            color: var(--acc-h)
        }

        @media (max-width: 600px) {
            nav {
                padding: 1rem 1.5rem
            }

            .page-header {
                padding: 3rem 1.5rem 2rem
            }

            .content {
                padding: 2.5rem 1.25rem 5rem
            }

            .rsv-card {
                flex-direction: column;
                align-items: flex-start
            }
        }
    </style>
</head>
<body>

<nav>
    <a class="logo" href="/">ESCAPE</a>
    <a class="back" href="/">← 목록으로</a>
</nav>

<div class="page-header">
    <p class="page-eye">My Reservations</p>
    <h1 class="page-title">내 예약 관리</h1>
</div>

<div class="content">
    <div class="step">
        <p class="step-num">Step 01</p>
        <h2 class="step-title">예약자 이름을 입력하세요</h2>
        <div class="search-row">
            <input class="s-input" id="name-input" maxlength="20" placeholder="이름을 입력하세요" type="text"
                   onkeydown="if(event.key==='Enter') search()">
            <button class="btn-primary" onclick="search()">조회</button>
        </div>
    </div>

    <div class="step" id="result-section" style="display:none">
        <p class="step-num">Step 02</p>
        <h2 class="step-title">예약 목록</h2>
        <div class="rsv-list" id="rsv-list"></div>
    </div>
</div>

<!-- 변경 모달 -->
<div class="overlay" id="change-overlay">
    <div class="modal">
        <p class="m-eye">날짜·시간 변경</p>
        <h2 class="m-title" id="ch-theme">—</h2>
        <p class="m-info" id="ch-info">—</p>
        <label class="m-label">새 날짜</label>
        <input id="ch-date" type="date" oninput="loadChangeTimes(this.value)">
        <label class="m-label">새 시간</label>
        <div class="time-grid" id="ch-time-grid"><p class="msg">날짜를 선택하세요</p></div>
        <div class="m-actions">
            <button class="btn-g" onclick="closeChange()">닫기</button>
            <button class="btn-s" id="ch-confirm" disabled onclick="doChange()">변경 확정</button>
        </div>
    </div>
</div>

<!-- 취소 확인 모달 -->
<div class="overlay" id="cancel-overlay">
    <div class="modal">
        <p class="m-eye">예약 취소</p>
        <h2 class="m-title" id="ca-theme">—</h2>
        <p class="m-info" id="ca-info">—</p>
        <div class="m-actions">
            <button class="btn-g" onclick="closeCancel()">닫기</button>
            <button class="btn-danger" onclick="doCancel()">취소 확정</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let currentName = '';
    let changeTarget = null;
    let cancelTarget = null;
    let selTimeId = null;

    function fmt(t) {
        if (!t) return '';
        if (Array.isArray(t)) return `${String(t[0]).padStart(2, '0')}:${String(t[1]).padStart(2, '0')}`;
        return String(t).substring(0, 5);
    }

    async function search() {
        const name = document.getElementById('name-input').value.trim();
        if (!name) return;
        currentName = name;
        const sec = document.getElementById('result-section');
        const list = document.getElementById('rsv-list');
        sec.style.display = 'block';
        list.innerHTML = '<p class="msg">불러오는 중...</p>';
        try {
            const r = await fetch(`/reservations?name=${encodeURIComponent(name)}`);
            if (r.status === 404) {
                list.innerHTML = '<p class="msg">해당 이름의 예약이 없습니다</p>';
                return;
            }
            if (!r.ok) throw new Error();
            const data = await r.json();
            renderList(Array.isArray(data) ? data : [data]);
        } catch {
            list.innerHTML = '<p class="msg">예약 정보를 불러올 수 없습니다</p>';
        }
    }

    function renderList(items) {
        const list = document.getElementById('rsv-list');
        const sec = document.getElementById('result-section');
        if (!items.length) {
            sec.style.display = 'none';
            toast('ok', '예약이 모두 취소되었습니다');
            return;
        }
        list.innerHTML = '';
        items.forEach(r => {
            const timeStr = fmt(r.timeDto?.startAt);
            const el = document.createElement('div');
            el.className = 'rsv-card';
            el.innerHTML = `
                <div class="rsv-info">
                    <p class="rsv-theme">${r.themeResponseDto?.name || '—'}</p>
                    <p class="rsv-meta">${r.date} &nbsp;·&nbsp; ${timeStr}</p>
                </div>
                <div class="rsv-actions">
                    <button class="btn-g"
                        onclick="openChange(${r.id}, ${r.themeResponseDto?.id}, '${esc(r.themeResponseDto?.name)}', '${r.date}', '${timeStr}')">
                        날짜·시간 변경
                    </button>
                    <button class="btn-danger"
                        onclick="openCancel(${r.id}, '${esc(r.themeResponseDto?.name)}', '${r.date}', '${timeStr}')">
                        예약 취소
                    </button>
                </div>
            `;
            list.appendChild(el);
        });
    }

    function esc(s) {
        return (s || '').replace(/'/g, "\\'");
    }

    /* ── 변경 ── */
    function openChange(id, themeId, themeName, date, timeStr) {
        changeTarget = {id, themeId};
        selTimeId = null;
        document.getElementById('ch-theme').textContent = themeName;
        document.getElementById('ch-info').textContent = `현재: ${date}  ·  ${timeStr}`;
        const today = new Date().toISOString().split('T')[0];
        const di = document.getElementById('ch-date');
        di.min = today;
        di.value = '';
        document.getElementById('ch-time-grid').innerHTML = '<p class="msg">날짜를 선택하세요</p>';
        document.getElementById('ch-confirm').disabled = true;
        document.getElementById('change-overlay').classList.add('open');
    }

    function closeChange() {
        document.getElementById('change-overlay').classList.remove('open');
        changeTarget = null;
        selTimeId = null;
    }

    async function loadChangeTimes(date) {
        if (!date || !changeTarget) return;
        selTimeId = null;
        document.getElementById('ch-confirm').disabled = true;
        const grid = document.getElementById('ch-time-grid');
        grid.innerHTML = '<p class="msg">불러오는 중...</p>';
        try {
            const r = await fetch(`/themes/${changeTarget.themeId}/times?localDate=${date}`);
            if (!r.ok) throw new Error();
            const times = await r.json();
            grid.innerHTML = '';
            if (!times.length) {
                grid.innerHTML = '<p class="msg">예약 가능한 시간이 없습니다</p>';
                return;
            }
            times.forEach(t => {
                const btn = document.createElement('button');
                btn.className = `slot ${t.alreadyBooked ? 'booked' : 'avail'}`;
                btn.disabled = t.alreadyBooked;
                btn.innerHTML = `${fmt(t.startAt)}<span class="slot-hint">${t.alreadyBooked ? '예약됨' : '예약 가능'}</span>`;
                if (!t.alreadyBooked) {
                    btn.onclick = () => {
                        grid.querySelectorAll('.slot').forEach(s => s.classList.remove('sel'));
                        btn.classList.add('sel');
                        selTimeId = t.id;
                        document.getElementById('ch-confirm').disabled = false;
                    };
                }
                grid.appendChild(btn);
            });
        } catch {
            grid.innerHTML = '<p class="msg">시간 정보를 불러올 수 없습니다</p>';
        }
    }

    async function doChange() {
        if (!changeTarget || !selTimeId) return;
        const date = document.getElementById('ch-date').value;
        const btn = document.getElementById('ch-confirm');
        btn.disabled = true;
        try {
            const r = await fetch(`/reservations/${changeTarget.id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({timeId: selTimeId, themeId: changeTarget.themeId, date})
            });
            if (!r.ok) {
                let msg = '변경에 실패했습니다';
                try {
                    const e = await r.json();
                    msg = e.message || msg;
                } catch {
                }
                closeChange();
                toast('err', msg);
                return;
            }
            closeChange();
            toast('ok', '예약이 변경되었습니다');
            await search();
        } catch {
            closeChange();
            toast('err', '네트워크 오류가 발생했습니다');
        } finally {
            btn.disabled = false;
        }
    }

    /* ── 취소 ── */
    function openCancel(id, themeName, date, timeStr) {
        cancelTarget = {id};
        document.getElementById('ca-theme').textContent = themeName;
        document.getElementById('ca-info').textContent = `${date}  ·  ${timeStr} — 정말 취소하시겠습니까?`;
        document.getElementById('cancel-overlay').classList.add('open');
    }

    function closeCancel() {
        document.getElementById('cancel-overlay').classList.remove('open');
        cancelTarget = null;
    }

    async function doCancel() {
        if (!cancelTarget) return;
        try {
            const r = await fetch(`/reservations/${cancelTarget.id}`, {method: 'DELETE'});
            if (!r.ok) {
                let msg = '취소에 실패했습니다';
                try {
                    const e = await r.json();
                    msg = e.message || msg;
                } catch {
                }
                closeCancel();
                toast('err', msg);
                return;
            }
            closeCancel();
            toast('ok', '예약이 취소되었습니다');
            await search();
        } catch {
            closeCancel();
            toast('err', '네트워크 오류가 발생했습니다');
        }
    }

    function toast(type, msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${type}`;
        setTimeout(() => {
            el.className = 'toast';
        }, 3500);
    }

    document.getElementById('change-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeChange();
    });
    document.getElementById('cancel-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) closeCancel();
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            closeChange();
            closeCancel();
        }
    });
</script>
</body>
</html>
